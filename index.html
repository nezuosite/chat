<script>
window.SYSTEM_SALT = "NEZU_PRO_SYS_SALT_2026_V1";

window.sha256 = (s) => {
  const ascii = unescape(encodeURIComponent(s)); 
  const rightRotate = (value, amount) => (value >>> amount) | (value << (32 - amount));
  const mathPow = Math.pow;
  const maxWord = mathPow(2, 32);
  const lengthProperty = 'length';
  let i, j;
  let result = '';
  const words = [];
  const asciiBitLength = ascii[lengthProperty] * 8;
  
  const hash = [];
  const k = [];
  let primeCounter = 0;

  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) {
        isComposite[i] = candidate;
      }
      hash[primeCounter] = (mathPow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++] = (mathPow(candidate, 1 / 3) * maxWord) | 0;
    }
  }
  
  let paddedAscii = ascii + '\x80';
  while (paddedAscii[lengthProperty] % 64 - 56) paddedAscii += '\x00';
  for (i = 0; i < paddedAscii[lengthProperty]; i++) {
    j = paddedAscii.charCodeAt(i);
    if (j >> 8) return ""; 
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words[lengthProperty]] = ((asciiBitLength / maxWord) | 0);
  words[words[lengthProperty]] = (asciiBitLength | 0);
  
  for (j = 0; j < words[lengthProperty];) {
    const w = words.slice(j, j += 16);
    let oldHash = hash.slice(0, 8);
    
    for (i = 0; i < 64; i++) {
      const r1 = oldHash[0], r2 = oldHash[1], r3 = oldHash[2], r4 = oldHash[3],
            r5 = oldHash[4], r6 = oldHash[5], r7 = oldHash[6], r8 = oldHash[7];
            
      const temp1 = r8 + (rightRotate(r5, 6) ^ rightRotate(r5, 11) ^ rightRotate(r5, 25)) +
                  ((r5 & r6) ^ (~r5 & r7)) +
                  k[i] +
                  (w[i] = (i < 16) ? ~~w[i] : (
                      w[i - 16] +
                      (rightRotate(w[i - 15], 7) ^ rightRotate(w[i - 15], 18) ^ (w[i - 15] >>> 3)) +
                      w[i - 7] +
                      (rightRotate(w[i - 2], 17) ^ rightRotate(w[i - 2], 19) ^ (w[i - 2] >>> 10))
                  ) | 0);
                  
      const temp2 = (rightRotate(r1, 2) ^ rightRotate(r1, 13) ^ rightRotate(r1, 22)) +
                  ((r1 & r2) ^ (r1 & r3) ^ (r2 & r3));
      
      oldHash = [ (temp1 + temp2) | 0, r1, r2, r3, (r4 + temp1) | 0, r5, r6, r7 ];
    }
    
    for (i = 0; i < 8; i++) {
      hash[i] = (hash[i] + oldHash[i]) | 0;
    }
  }
  
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? '0' : '') + b.toString(16);
    }
  }
  return result;
};

window.makeTrip = (name, tripKey) => {
  if (!tripKey) return "";
  const revKey = tripKey.split("").reverse().join("");
  const mixed = window.SYSTEM_SALT + "_" + name + "_[SALT]_" + revKey;
  const hashHex = window.sha256(mixed);
  if (!hashHex) return "";

  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let res = "";
  for (let i = 0; i < 10; i++) {
    const sub = hashHex.substring(i * 6, i * 6 + 6);
    const val = parseInt(sub, 16);
    res += chars[val % 62];
  }
  return "◆" + res;
};

// =========================================================================
// localStorage のSecurityError防止
// =========================================================================
var _localStorage;
try {
  _localStorage = window.localStorage;
  _localStorage.getItem("__nz_test_key__");
} catch (e) {
  var mockLS = {};
  _localStorage = {
    getItem: function(k) { return mockLS[k] || null; },
    setItem: function(k, v) { mockLS[k] = String(v); },
    removeItem: function(k) { delete mockLS[k]; },
    clear: function() { mockLS = {}; }
  };
}

var _sessionStorage = _localStorage;
</script>

function checkActivityTimeout() {
  if (!isJoined) return;
  const lastPost = parseInt(safeSS.get("nz_last_post_time") || "0");
  if (!lastPost) return;

  const elapsed = getTrueTime() - lastPost;
  if (elapsed >= 30 * 60 * 1000) {
    stopAutoExitTimer();
    doExit(true); 
  }
}

async function doExit(isAuto = false) {
  if (!isJoined) return;

  const cleanName = myName || "名無し";
  const cleanTrip = myTrip || "";
  const cleanUid = myUid;
  const cleanColor = curColor;

  const logText = "[SYS]::" + `${cleanName} ${cleanTrip}`.trim() + (isAuto ? " が退室しました (自動退室)" : " が退室しました");
  
  // 自動退室時は「最後の発言（または入室）から30分後の時刻」に完全に時間を書き換える
  const lastPost = parseInt(safeSS.get("nz_last_post_time") || "0");
  const exitTimeMillis = isAuto ? (lastPost + 30 * 60 * 1000) : getTrueTime();

  const tempId = "pnd_sys_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
  const tempObj = {
    id: tempId,
    u: cleanUid || "sys_exit",
    n: cleanName,
    p: cleanTrip,
    c: cleanColor,
    m: logText,
    t: exitTimeMillis
  };
  pendingMsgs.set(tempId, tempObj);
  displayedMsgIds.add(tempId);

  const tempEl = cMsg(tempObj, true);
  D.tli.appendChild(tempEl);
  scBottom(true);

  // 他のタブとの即時同期のため、まずはローカル情報を更新
  isJoined = false;
  stopAutoExitTimer();

  safeSS.remove("nz_is_joined");
  safeSS.remove("nz_last_post_time");

  renderPresence(currentPresenceMap);
  switchUIMode("guest");
  updateAdminUI(); 

  // サーバー上のデータを削除
  if (cleanUid) {
    await db.ref(`presence/official/${cleanUid}`).remove().catch(() => {});
  }

  await db.ref(`chat/official`).push({
    u: cleanUid || "sys_exit",
    pnd: tempId, 
    n: cleanName,
    p: cleanTrip,
    c: cleanColor,
    m: logText,
    t: exitTimeMillis
  }).catch(() => {});
}

function stopAutoExitTimer() {
  if (autoExitTimer) {
    clearInterval(autoExitTimer);
    autoExitTimer = null;
  }
}

// 他端末の代行自動退室処理（安全な合意・トランザクション処理）
function triggerOtherExit(targetId, targetUser, calculatedTimeoutTime) {
  if (targetUser.exiting) return;
  targetUser.exiting = true;

  db.ref(`presence/official/${targetId}`).transaction((current) => {
    if (current === null) return null; 
    if (current.exiting) return null; 
    current.exiting = true;
    return current;
  }, (error, committed, snapshot) => {
    if (error) {
      targetUser.exiting = false;
      return;
    }
    if (committed && snapshot.exists()) {
      const actualUser = snapshot.val();
      const rawLog = `${actualUser.n} ${actualUser.p || ""}`.trim() + " が退室しました (自動退室)";
      const encLog = "[SYS]::" + rawLog;

      db.ref(`chat/official`).push({
        u: targetId,
        n: actualUser.n,
        p: actualUser.p || "",
        c: actualUser.c || "#94a3b8",
        m: encLog,
        t: calculatedTimeoutTime 
      }).catch(() => {});

      db.ref(`presence/official/${targetId}`).remove().catch(() => {});
    } else {
      targetUser.exiting = false;
    }
  });
}

    await db.ref(`chat/official`).push({

  const txt = overrideText !== null ? overrideText : D.mi.value.trim();
  if (!txt && !imgData) return;
  
  const now = Date.now(); 
  if (now - lastSendTime < 350) return; 
  lastSendTime = now;
  
  D.mi.value = ""; 
  D.mi.style.height = "auto";

    D.mi.blur();

    u: myUid,
    n: myName,
    p: myTrip,
    c: curColor,
    m: imgData ? "IMG::" + imgData : txt,
    t: nowTime
  };

  pendingMsgs.set(tempId, tempObj);
  displayedMsgIds.add(tempId);

  // 通信完了を待たずに画面へ仮出力
  const tempEl = cMsg(tempObj, true);

  isAutoScroll = true;
  unreadMsgIds.clear();

  db.ref(`presence/official/${myUid}/p_t`).set(firebase.database.ServerValue.TIMESTAMP).catch(() => {});
  // 切断復帰や瞬断時のデータ修復のために t も更新（生存確認はこれだけで完了）
  db.ref(`presence/official/${myUid}/t`).set(firebase.database.ServerValue.TIMESTAMP).catch(() => {});

  let payloadMsg = imgData ? "IMG::" + imgData : txt;

  const pushData = { 
    u: myUid, 
    pnd: tempId, 
    n: myName,
    p: myTrip,
    c: curColor,
    m: payloadMsg, 
    t: firebase.database.ServerValue.TIMESTAMP
  };

  await db.ref(`chat/official`).push(pushData).catch(() => {
    const localEl = renderedMwNodes.get(tempId);
    if (localEl) localEl.remove();
    renderedMwNodes.delete(tempId);
    pendingMsgs.delete(tempId);
    displayedMsgIds.delete(tempId);
    alert("送信に失敗しました。");
  });
}

const renderedMwNodes = new Map();

// =========================================================================
// 差分同期（Reconciliation）アルゴリズム
// =========================================================================
function syncMessagesDOM(targetMsgs) {
  const currentNodes = Array.from(D.tli.children);
  const targetIds = new Set(targetMsgs.map(m => m.id));

  // 1. 不要ノードの削除
  currentNodes.forEach(node => {
    const mid = node.dataset.mid;
    if (!mid || mid.startsWith("pnd_")) return;
    if (!targetIds.has(mid)) {
      node.remove();
      renderedMwNodes.delete(mid);
      displayedMsgIds.delete(mid);
    }
  });

  // 2. 順序の整合と高速差分アップデート
  targetMsgs.forEach((m, idx) => {
    let el = renderedMwNodes.get(m.id);
    if (el) {
      updateExistingMsgNode(m, el);
    } else {
      el = cMsg(m, !isFirstLoad);
      renderedMwNodes.set(m.id, el);
      displayedMsgIds.add(m.id);
    }

    const currentChildren = D.tli.children;
    const expectedSibling = currentChildren[idx];
    if (expectedSibling !== el) {
      D.tli.insertBefore(el, expectedSibling || null);
    }
  });

  // 3. 送信中の仮メッセージを常に最末尾に保持
  pendingMsgs.forEach((pMsg, tempId) => {
    let pNode = renderedMwNodes.get(tempId);
    if (!pNode) {
      pNode = cMsg(pMsg, true);
      pNode.style.opacity = "0.7";
      renderedMwNodes.set(tempId, pNode);
    }
    if (D.tli.lastElementChild !== pNode) {
      D.tli.appendChild(pNode);
    }
  });

  scBottom();
  updateJumpBtns();
}

function updateExistingMsgNode(m, el) {
  const isSys = m.sys === true || (typeof m.m === "string" && m.m.startsWith("[SYS]::"));
  const currentIsSys = el.querySelector(".sys-msg") !== null;

  if (isSys !== currentIsSys) {
    const newEl = cMsg(m, false);
    el.replaceWith(newEl);
    renderedMwNodes.set(m.id, newEl);
    return;
  }

  if (isSys) {
    const sysDiv = el.querySelector(".sys-msg");
    if (sysDiv) {
      const displayTxt = m.m.startsWith("[SYS]::") ? m.m.substring(7) : m.m;
      if (sysDiv.firstChild && sysDiv.firstChild.textContent !== displayTxt) {
        sysDiv.firstChild.textContent = displayTxt;
      }
    }
  } else {
    const mm = el.querySelector(".mm");
    if (mm) {
      const targetColor = m.c || "#94a3b8";
      if (mm.style.color !== targetColor) mm.style.color = targetColor;
      
      const nameSpan = mm.querySelector(".mm-name");
      if (nameSpan && nameSpan.textContent !== m.n) nameSpan.textContent = m.n || "名無し";
      
      const tripSpan = mm.querySelector(".mm-trip");
      if (tripSpan) {
        if (m.p) {
          if (tripSpan.textContent !== m.p) tripSpan.textContent = m.p;
          if (tripSpan.style.display === "none") tripSpan.style.display = "inline";
        } else {
          tripSpan.style.display = "none";
        }
      }
    }
    
    const mb = el.querySelector(".mb");
    if (mb) {
      const targetColor = m.c || "#94a3b8";
      if (mb.style.borderColor !== targetColor) mb.style.borderLeftColor = targetColor;
      
      if (el.dataset.rawMsg !== m.m) {
        el.dataset.rawMsg = m.m;
        mb.innerHTML = "";
        if (m.m && m.m.startsWith("IMG::")) {
          const base64Img = m.m.substring(5);
          const img = document.createElement("img");
          img.className = "inline-img";
          img.src = base64Img;
          img.onload = () => scBottom();
          img.onclick = () => {
            D.imgViewSrc.src = base64Img;
            resetZoom();
            D.imgViewMod.classList.add("show");
          };
          mb.appendChild(img);
        } else if (m.m) {
          const parsedNodes = parseTxtSplit(m.m);
          parsedNodes.forEach(node => mb.appendChild(node));
          if (m.m.includes("http")) {
            const urls = m.m.match(UR);
            if (urls) {
              urls.forEach(url => {
                const mediaContainer = createMediaContainer(url);
                if (mediaContainer) mb.appendChild(mediaContainer);
              });
            }
          }
        }
      }
    }
  }
}

function cMsg(m, isNewIncoming = false) {
  const el = document.createElement("div");
  el.className = "mw" + (isNewIncoming ? " new-msg-anim" : "");
  el.dataset.mid = m.id;
  const msgTime = getMsgTime(m);
  el.dataset.ts = msgTime;
  el.dataset.rawMsg = m.m;

  const isSys = m.sys === true || (typeof m.m === "string" && m.m.startsWith("[SYS]::"));

  if (isSys) {
    let displayTxt = m.m.startsWith("[SYS]::") ? m.m.substring(7) : m.m;
    el.innerHTML = `<div class="sys-msg">${escapeHtml(displayTxt)}<span class="sys-ts">[${fDT(msgTime)}]</span></div>`;
    
    // 自分のお知らせ(システムメッセージ)または管理者であれば削除ボタンを表示

        D.delConfirmMod.classList.add("show");
      };
      sysDiv.appendChild(delBtn);
    }
    renderedMwNodes.set(m.id, el);
    return el;
  }

  const name = m.n || "名無し";
  const trip = m.p || "";
  const color = m.c || "#94a3b8";

  el.innerHTML = `
    <div class="mm" style="color: ${color}">
      <span class="mm-name">${escapeHtml(name)}</span>
      <span class="mm-trip" style="display: ${trip ? 'inline' : 'none'}">${escapeHtml(trip)}</span>
      <span class="ts">${fDT(msgTime)}</span>
    </div>
    <div class="mb" style="border-left: 2px solid ${color}; padding-left: 8px;"></div>
  `;

  const mb = el.querySelector(".mb");
  
  if (m.m && m.m.startsWith("IMG::")) {
    const base64Img = m.m.substring(5);
    const img = document.createElement("img");
    img.className = "inline-img";
    img.src = base64Img;
    img.onload = () => scBottom();
    img.onclick = () => {
      D.imgViewSrc.src = base64Img;
      resetZoom();
      D.imgViewMod.classList.add("show");
    };
    mb.appendChild(img);
  } else if (m.m) {
    const parsedNodes = parseTxtSplit(m.m);
    parsedNodes.forEach(node => mb.appendChild(node));

    if (m.m.includes("http")) {
      const urls = m.m.match(UR);
      if (urls) {
        urls.forEach(url => {
          const mediaContainer = createMediaContainer(url);
          if (mediaContainer) mb.appendChild(mediaContainer);
        });
      }
    }
  }

  // 自分の発言(過去ログ含む)または管理者であれば削除ボタンを表示
  if (m.u === myUid || isAdmin()) {
    const delBtn = document.createElement("button");
    delBtn.className = "del-btn-inline";
    delBtn.textContent = "🗑 削除";
    delBtn.onclick = (e) => {
      e.stopPropagation();
      targetDelId = m.id;
      D.delConfirmPreview.textContent = m.m && m.m.startsWith("IMG::") ? "[画像]" : (m.m || "");
      D.delConfirmMod.classList.add("show");
    };
    el.appendChild(delBtn);
  }

  renderedMwNodes.set(m.id, el);
  return el;
}

function scBottom(force = false) {
  if (!isAutoScroll && !force) return;
  if (_scPending) return;
  _scPending = true;
  requestAnimationFrame(() => {
    const tl = D.tl;
    if (tl) {
      tl.scrollTop = tl.scrollHeight; 
    }
    _scPending = false;
  });
}

function updateUnreadBadge() {
  const badge = D.unreadBadge;
  if (!badge) return;
  const count = unreadMsgIds.size;
  if (count > 0) {
    badge.textContent = count > 99 ? "99+" : count;
    badge.style.display = "inline-flex";
  } else {

  }
}

function updateJumpBtns() {
  if (!D.tl) return;
  const scrollTop = D.tl.scrollTop;
  const clientHeight = D.tl.clientHeight;
  const scrollHeight = D.tl.scrollHeight;
  const isScrollable = scrollHeight > clientHeight;

  if (!isScrollable) {
    D.jumpUpBtn.disabled = true;
    D.jumpDownBtn.disabled = true;
  } else {
    D.jumpUpBtn.disabled = (scrollTop <= 2);
    D.jumpDownBtn.disabled = (scrollTop + clientHeight >= scrollHeight - 2);
  }
}

D.tl.addEventListener("scroll", () => {
  const scrollTop = D.tl.scrollTop;
  const clientHeight = D.tl.clientHeight;
  const scrollHeight = D.tl.scrollHeight;

  const isNearBottom = scrollTop + clientHeight >= scrollHeight - 40;

  if (!_scPending) {
    if (isNearBottom) {
      isAutoScroll = true;
      if (unreadMsgIds.size > 0) {
        unreadMsgIds.clear(); 
        updateUnreadBadge();
      }
    } else {
      isAutoScroll = false;
    }
  }

  updateJumpBtns();
});

function parseTxtSplit(txt) {
  if (!txt.includes("http")) return [document.createTextNode(txt)];
  const norm = txt.replace(/[\u3000]/g, " ");
  const elements = [];
  let last = 0, m;
  UR.lastIndex = 0;
  while ((m = UR.exec(norm)) !== null) {
    if (m.index > last) elements.push(document.createTextNode(norm.slice(last, m.index)));
    const a = document.createElement("a");
    a.href = m[0]; a.target = "_blank"; a.rel = "noopener noreferrer";
    a.style.color = "#60a5fa"; a.style.textDecoration = "underline"; a.textContent = m[0];
    elements.push(a);
    last = m.index + m[0].length;
  }
  if (last < norm.length) elements.push(document.createTextNode(norm.slice(last)));
  return elements;
}

const getYoutubeId = (url) => {
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/|live\/)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
};

const getNicoId = (url) => {
  const regExp = /(?:nicovideo\.jp\/watch\/|nico\.ms\/|embed\.nicovideo\.jp\/watch\/)(sm[0-9]+|so[0-9]+|nm[0-9]+|[0-9]+)/i;
  const match = url.match(regExp);
  return match ? match[1] : null;
};

function createMediaContainer(url) {
  const ytId = getYoutubeId(url);
  const nicoId = getNicoId(url);
  if (!ytId && !nicoId) return null;

  const container = document.createElement("div");
  container.className = "media-link-container";
  const row = document.createElement("div");
  row.className = "media-inline-row";

  const badge = document.createElement("span");
  badge.className = "media-badge";
  let type = "";
  if (ytId) { type = "youtube"; badge.textContent = "YouTube"; badge.style.background = "#ef4444"; }
  else if (nicoId) { type = "niconico"; badge.textContent = "ニコニコ"; badge.style.background = "#2563eb"; }
  row.appendChild(badge);

  const playBtn = document.createElement("button");
  playBtn.className = "open-player-btn";
  playBtn.textContent = "▶ プレイヤーで再生";
  playBtn.onclick = (e) => {
    e.preventDefault();
    openFloatingPlayer(url, type);
  };
  row.appendChild(playBtn);
  container.appendChild(row);
  return container;
}

const closePlayer = () => {
  D.fixedPlayer.style.display = "none";
  D.playerContent.innerHTML = "";
  updateJumpBtns();
};

function openFloatingPlayer(url, type) {
  D.fixedPlayer.style.display = "flex";
  D.playerContent.innerHTML = ""; 

  if (type === "youtube") {
    const ytId = getYoutubeId(url);
    if (ytId) {
      const iframe = document.createElement("iframe");
      let originParam = "";
      if (window.location.protocol.startsWith("http")) {
        originParam = `&origin=${encodeURIComponent(window.location.origin)}`;
      }
      iframe.src = `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=0&enablejsapi=1${originParam}`;
      iframe.frameBorder = "0";
      iframe.allow = "autoplay; encrypted-media";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%"; iframe.style.height = "100%";
      D.playerContent.appendChild(iframe);
    }
  } else if (type === "niconico") {
    const nicoId = getNicoId(url);
    if (nicoId) {
      const iframe = document.createElement("iframe");
      iframe.src = `https://embed.nicovideo.jp/watch/${nicoId}?jsapi=1&autoplay=0&playerId=nezu_inline`;
      iframe.frameBorder = "0";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%"; iframe.style.height = "100%";
      D.playerContent.appendChild(iframe);
    }
  }
  scBottom();
  updateJumpBtns();
}

window.addEventListener("message", (e) => {
  if (typeof e.origin === "string" && (e.origin.includes("youtube.com") || e.origin.includes("youtube-nocookie.com"))) {
    try {
      const data = typeof e.data === "string" ? JSON.parse(e.data) : e.data;
      if (data) {
        if (data.event === "infoDelivery" && data.info && data.info.playerState === 0) closePlayer();
        if (data.event === "onStateChange" && (data.info === 0 || data.data === 0)) closePlayer();
      }
    } catch (err) {}
  }
  if (typeof e.origin === "string" && e.origin.includes("nicovideo.jp")) {
    try {
      if (e.data && e.data.eventName === "playerStatusChange" && e.data.data && e.data.data.playerStatus === 4) {
        closePlayer();
      }
    } catch (err) {}
  }
});

function renderPresence(serverListMap) {
  const cleanMap = { ...serverListMap };

  if (isJoined && myUid) {
    if (!cleanMap[myUid]) {
      cleanMap[myUid] = {
        id: myUid,
        n: myName,
        p: myTrip,
        c: curColor,
        t: getTrueTime(),
        p_t: getTrueTime()
      };
    }
  } else if (!isJoined && myUid) {
    delete cleanMap[myUid];
  }

  const members = Object.values(cleanMap).filter(m => m && m.n);
  populatePresenceList(members);
}

let lastPresenceHash = "";

function populatePresenceList(membersList) {
  const sortedList = [...membersList].sort((a, b) => a.id.localeCompare(b.id));
  const currentHash = sortedList.map(m => `${m.id}_${m.n}_${m.p || ""}_${m.c}`).join("|");
  if (currentHash === lastPresenceHash) {
    return; 
  }
  lastPresenceHash = currentHash;

  const fragment = document.createDocumentFragment();
  const mLen = sortedList.length;
  for (let i = 0; i < mLen; i++) {
    const m = sortedList[i];
    const sp = document.createElement("span");
    sp.className = "chip";
    sp.style.color = m.c || "#94a3b8";
    sp.style.borderColor = (m.c || "#94a3b8") + "44";
    sp.textContent = m.p ? `${m.n} ${m.p}` : m.n;
    sp.onclick = () => {
      if (m.id !== myUid && isJoined) {
        D.mi.value += `@${m.n} `;
        D.mi.focus();
      }
    };
    fragment.appendChild(sp);
  }
  D.pl.innerHTML = "";
  D.pl.appendChild(fragment);
  D.pcnt.textContent = `${mLen}人`;
  updateJumpBtns(); 
}

    img.onload = async () => {
      const cvs = document.createElement("canvas"); 
      let w = img.width, h = img.height; const maxDim = 640; 
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round((h * maxDim) / w); w = maxDim; }
        else { w = Math.round((w * maxDim) / h); h = maxDim; }
      }
      cvs.width = w; cvs.height = h; 
      cvs.getContext("2d").drawImage(img, 0, 0, w, h);
      await sendMsg(null, cvs.toDataURL("image/jpeg", 0.6)); 
      spin.remove(); if (svgEl) svgEl.style.display = "";
      D.imgBtn.disabled = false; D.fileInput.value = "";

    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

function buildPicker(con, sel, cls, onChange) {

  COLORS.forEach(({v,n}) => {
    const b = document.createElement("button");
    b.className = cls + (v === sel ? " sel" : ""); b.style.background = v; b.title = n; b.dataset.color = v;
    b.addEventListener("click", () => onChange(v)); con.appendChild(b);
  });
}

function updateModalColorPreview(color) {
  const con = D.clrPrev; if (!con) return; con.innerHTML = "";
  con.style.background = "rgba(0, 0, 0, 0.25)"; con.style.border = "1px solid var(--bd)"; con.style.borderRadius = "4px"; con.style.padding = "8px"; con.style.textAlign = "left";
  const n = myName || "名無し";
  const t = myTrip || "";
  const wrap = document.createElement("div"); wrap.style.fontSize = "12px"; wrap.style.color = color; wrap.style.fontWeight = "bold"; 
  wrap.textContent = t ? `${n} ${t}` : n;
  con.appendChild(wrap);
  const bodyMock = document.createElement("div"); bodyMock.style.fontSize = "13px"; bodyMock.style.color = "var(--tx)"; bodyMock.style.marginTop = "4px"; bodyMock.style.borderLeft = `2px solid ${color}`; bodyMock.style.paddingLeft = "8px"; bodyMock.textContent = "この色で発言が表示されます。";
  con.appendChild(bodyMock);
}

const overlayEl = $("zoomViewport"); const imgEl = D.imgViewSrc;
function resetZoom() { scale = 1; panX = 0; panY = 0; imgEl.style.transformOrigin = "center center"; updateTransform(); }
function updateTransform() { imgEl.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }
function clampPan() {
  if (scale <= 1) { panX = 0; panY = 0; return; }
  const cw = overlayEl.clientWidth, ch = overlayEl.clientHeight;
  const ir = imgEl.naturalWidth / imgEl.naturalHeight, cr = cw / ch;
  let iw, ih;
  if (ir > cr) { iw = cw; ih = cw / ir; } else { ih = ch; iw = ch * ir; }
  const currentWidth = iw * scale, currentHeight = ih * scale;
  let limitX = currentWidth > cw ? (currentWidth - cw) / 2 : 0;
  let limitY = currentHeight > ch ? (currentHeight - ch) / 2 : 0;
  panX = Math.max(-limitX, Math.min(limitX, panX)); panY = Math.max(-limitY, Math.min(limitY, panY));
}
function getDistance(t1, t2) { return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY); }

overlayEl.addEventListener('touchstart', (e) => {
  if (e.target === D.imgViewCloseBtn) return;
  if (e.touches.length === 2) { isPanning = false; initialDistance = getDistance(e.touches[0], e.touches[1]); }
  else if (e.touches.length === 1 && scale > 1) { isPanning = true; lastPanX = e.touches[0].clientX; lastPanY = e.touches[0].clientY; }
}, { passive: true });

overlayEl.addEventListener('touchmove', (e) => {
  if (e.target === D.imgViewCloseBtn) return;
  if (e.touches.length === 2) {
    const dist = getDistance(e.touches[0], e.touches[1]); scale = Math.max(1, Math.min(5, scale * (dist / initialDistance)));
    initialDistance = dist; clampPan(); updateTransform();
  } else if (e.touches.length === 1 && isPanning) {
    panX += e.touches[0].clientX - lastPanX; panY += e.touches[0].clientY - lastPanY;
    lastPanX = e.touches[0].clientX; lastPanY = e.touches[0].clientY; clampPan(); updateTransform();
  }
}, { passive: true });

overlayEl.addEventListener('wheel', (e) => {
  e.preventDefault(); scale = Math.max(1, Math.min(5, scale * (e.deltaY > 0 ? 0.9 : 1.1))); clampPan(); updateTransform();
}, { passive: false });

overlayEl.addEventListener("click", (e) => {
  if (e.target === overlayEl) {
    D.imgViewMod.classList.remove("show");
  }
});

D.imgViewCloseBtn.onclick = () => D.imgViewMod.classList.remove("show");

D.ni.addEventListener("input", () => {
  safeLS.set("nz_ni", D.ni.value.trim());
  syncProfileValues();
});
D.tripi.addEventListener("input", () => {
  safeLS.set("nz_tripi", D.tripi.value.trim());
  syncProfileValues();
});

D.joinBtn.onclick = () => joinRoom();

const handleJoinKey = (e) => {
  if (e.key === "Enter") {
    joinRoom();
  }
};
D.ni.addEventListener("keydown", handleJoinKey);
D.tripi.addEventListener("keydown", handleJoinKey);

let lastBoostTime = 0;
const boostSync = () => { 
  const now = Date.now();
  if (now - lastBoostTime < 1000) return; 
  lastBoostTime = now;

  if (db) {
    db.goOffline(); 
    db.goOnline(); 
  }
  checkActivityTimeout(); 
  if (db && isJoined && myUid) { 
    startAutoExitChecker(); 
  } 
};

document.addEventListener("visibilitychange", () => { 
  if (document.visibilityState === "visible") {
    boostSync(); 
  }
});

window.addEventListener("focus", boostSync); window.addEventListener("pageshow", boostSync);

const adjustViewport = () => {
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-viewport-height', `${h}px`);
};
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    adjustViewport();
    scBottom(true);
  });
  window.visualViewport.addEventListener('scroll', () => {
    if (document.activeElement === D.mi) {
      window.scrollTo(0, 0); 
    }
  });
}
window.addEventListener('resize', adjustViewport);

// =========================================================================
// 同一ブラウザ内・複数タブ間でのリアルタイム同期処理
// =========================================================================
window.addEventListener('storage', (e) => {
  if (e.key === "nz_is_joined") {
    const joined = e.newValue === "true";
    if (joined !== isJoined) {
      isJoined = joined;
      if (isJoined) {
        // 他のタブで入室した場合：状態を読み込んでUIを同期
        myName = safeLS.get("nz_ni") || "";
        const tk = safeLS.get("nz_tripi") || "";
        myTrip = window.makeTrip(myName, tk);
        curColor = safeLS.get("nz_color") || "#94a3b8";
        setGlobalColor(curColor);
        switchUIMode("joined");
        startAutoExitChecker();
      } else {
        // 他のタブで退室（または自動退室）した場合：UIを未参加に戻す
        stopAutoExitTimer();
        switchUIMode("guest");
      }
      renderPresence(currentPresenceMap);
    }
  }
  // 入力欄の入力内容のリアルタイム同期
  if (e.key === "nz_ni" || e.key === "nz_tripi") {
    syncProfileValues();
  }
  // 色設定の変更の同期
  if (e.key === "nz_color") {
    curColor = e.newValue || "#94a3b8";
    setGlobalColor(curColor);
    updateModalColorPreview(curColor);
  }
  // キーボード維持設定の同期
  if (e.key === "nz_keep_kb_open") {
    keepKbOpen = e.newValue === "true";
    if (D.kbKeepOpenChk) D.kbKeepOpenChk.checked = keepKbOpen;
  }
});

let isFirstLoad = true; 

function loadCachedPresence() {
  try {
    const cachedStr = safeSS.get("nz_presence_cache");
    if (cachedStr) {
      const cachedPres = JSON.parse(cachedStr);
      currentPresenceMap = cachedPres;
      renderPresence(cachedPres);
    }
  } catch (e) {
    console.warn("キャッシュ読み込み失敗:", e);
  }
}

function loadCachedChat() {
  try {
    const cachedStr = safeSS.get("nz_chat_cache");
    if (cachedStr) {
      const cachedMsgs = JSON.parse(cachedStr);
      if (Array.isArray(cachedMsgs) && cachedMsgs.length > 0) {
        syncMessagesDOM(cachedMsgs);
      }
    }
  } catch (e) {
    console.warn("キャッシュ読み込み失敗:", e);
  }
}

function setupFirebaseListeners() {
  const chatRef = db.ref(`chat/official`);
  const presenceRef = db.ref(`presence/official`);

  chatRef.off();
  presenceRef.off();

  const chatQuery = chatRef.limitToLast(50); 
  chatQuery.on("value", snap => {
    const serverMsgs = [];
    snap.forEach(child => {
      const m = child.val(); 
      if (m) { 
        m.id = child.key; 
        serverMsgs.push(m); 
      }
    });

    try {
      const cacheData = serverMsgs.map(m => ({
        id: m.id,
        u: m.u,
        n: m.n,
        p: m.p,
        c: m.c,
        m: m.m,
        t: m.t,
        deleted: m.deleted,
        sys: m.sys
      }));
      safeSS.set("nz_chat_cache", JSON.stringify(cacheData));
    } catch (e) {}

    const activeServerMsgIds = new Set();
    serverMsgs.forEach(m => {
      if (!m.deleted) activeServerMsgIds.add(m.id);
    });

    let unreadChanged = false;

    unreadMsgIds.forEach(mid => {
      if (!activeServerMsgIds.has(mid)) {
        unreadMsgIds.delete(mid);
        unreadChanged = true;
      }
    });

    if (!isFirstLoad) {
      serverMsgs.forEach(m => {
        if (m.deleted) return;
        if (!displayedMsgIds.has(m.id) && m.u !== myUid && !isAutoScroll) {
          if (!unreadMsgIds.has(m.id)) {
            unreadMsgIds.add(m.id);
            unreadChanged = true;
          }
        }
      });
    }

    serverMsgs.forEach(m => {
      if (m.pnd && pendingMsgs.has(m.pnd)) {
        pendingMsgs.delete(m.pnd);
        const tempEl = renderedMwNodes.get(m.pnd);
        if (tempEl) {
          tempEl.remove();
          renderedMwNodes.delete(m.pnd);
          displayedMsgIds.delete(m.pnd);
        }
      }
    });

    const activeMsgs = serverMsgs.filter(m => !m.deleted);

    syncMessagesDOM(activeMsgs);

    if (unreadChanged) {
      updateUnreadBadge();
    }

    if (isFirstLoad) {
      isFirstLoad = false;
    }
  }, (error) => {
    console.error("Firebaseデータ受信エラー:", error);
  });

  presenceRef.on("value", s => {
    const list = s.val() || {}; 
    const membersMap = {};
    const nowTrue = getTrueTime();

    for (const [id, u] of Object.entries(list)) {
      if (u && u.n) {
        let ut = u.t;
        if (ut && typeof ut === "object") ut = nowTrue;
        if (!ut || typeof ut !== "number") continue;

        let pt = u.p_t || ut;

        if (isJoined && id !== myUid && (nowTrue - pt >= 1800000)) {
          triggerOtherExit(id, u, pt + 1800000);
          continue; 
        }

        membersMap[id] = { id, ...u, t: ut, p_t: pt };
      }
    }

    currentPresenceMap = membersMap;

    try {
      safeSS.set("nz_presence_cache", JSON.stringify(membersMap));
    } catch (e) {}

    renderPresence(membersMap);
  });
}

const initAuthProcess = async () => {
  myUid = safeLS.get("nz_permanent_uid");
  if (!myUid) {
    myUid = "user_" + Math.random().toString(36).slice(2, 10) + "_" + Date.now();
    safeLS.set("nz_permanent_uid", myUid);
  }

  loadCachedPresence();
  loadCachedChat();

  syncProfileValues();

  if (auth) {
    try {
      if (!auth.currentUser) {
        const userCredential = await auth.signInAnonymously();
        myUid = userCredential.user.uid;
        safeLS.set("nz_permanent_uid", myUid);
      } else {
        myUid = auth.currentUser.uid;
      }
    } catch (err) {
      console.warn("認証制限稼働:", err);
    }
  }

  setupFirebaseListeners();

  const savedJoined = safeSS.get("nz_is_joined") === "true";
  const hasNi = safeLS.get("nz_ni");

  if (savedJoined && hasNi) {
    await joinRoom(true);
  } else {
    switchUIMode("guest");
  }

  D.tl.style.opacity = "1";

  if (!isConnectedBound) {
    try {
      db.ref(".info/serverTimeOffset").on("value", (snap) => { serverTimeOffset = snap.val() || 0; });
      
      db.ref(".info/connected").on("value", (snap) => {
        if (snap.val() === true && isJoined && myUid) {
          const myPresRef = db.ref(`presence/official/${myUid}`);
          
          myPresRef.set({
            n: myName,
            p: myTrip,
            c: curColor,
            t: firebase.database.ServerValue.TIMESTAMP,
            p_t: firebase.database.ServerValue.TIMESTAMP
          }).catch(() => {});
        }
      });
      isConnectedBound = true;
    } catch (e) {
      console.warn("接続情報監視の設定に失敗:", e);
    }
  }
};

initAuthProcess();
</script>
