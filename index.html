<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>NEZU ONETIME CHAT</title>
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;
  --surface:#151820;
  --surface2:#1c2030;
  --surface3:#232840;
  --border:#2a3050;
  --border2:#3a4570;
  --accent:#5b8fff;
  --accent2:#7b6fff;
  --red:#ff5555;
  --green:#55ff9f;
  --yellow:#ffd060;
  --text:#e8eaf2;
  --text2:#9aa3c0;
  --text3:#5a6380;
  --font-mono:'Courier New',monospace;
  --radius:8px;
  --radius2:12px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:14px;line-height:1.5}
/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.screen.hidden{display:none!important}

/* ── Lobby ── */
#lobbyScreen{background:var(--bg)}
.lobby-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:28px 24px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.lobby-logo{font-size:11px;letter-spacing:.18em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.lobby-title{font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--text);margin-bottom:2px}
.lobby-sub{font-size:12px;color:var(--text3);margin-bottom:24px}
.lobby-section{margin-bottom:18px}
.lobby-label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.lobby-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.lobby-input:focus{border-color:var(--accent)}
.lobby-input::placeholder{color:var(--text3)}
.lobby-row{display:flex;gap:8px;align-items:center}
.color-strip{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;flex-shrink:0}
.color-dot.sel{border-color:#fff;transform:scale(1.2)}
.lobby-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,background .2s}
.lobby-btn:hover{opacity:.88}
.lobby-btn:disabled{opacity:.4;cursor:not-allowed}
.lobby-btn.sec{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.lobby-btn.sec:hover{border-color:var(--border2)}
.lobby-sep{height:1px;background:var(--border);margin:16px 0}
.lobby-info-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.lobby-info-box strong{color:var(--accent)}
.lobby-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.04em}
.badge-open{background:rgba(85,255,159,.12);color:var(--green)}
.badge-approval{background:rgba(255,208,96,.12);color:var(--yellow)}
.badge-pending{background:rgba(255,208,96,.12);color:var(--yellow)}
.badge-approved{background:rgba(85,255,159,.12);color:var(--green)}
.badge-denied{background:rgba(255,85,85,.12);color:var(--red)}
.err-msg{font-size:12px;color:var(--red);margin-top:6px;min-height:16px}
.lobby-room-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ── Chat Layout ── */
#chatScreen{display:flex;flex-direction:column;background:var(--bg);padding:0}
.chat-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:48px;flex-wrap:wrap}
.chat-header-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.chat-room-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.chat-header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;color:var(--text2);font-size:12px;cursor:pointer;transition:border-color .2s,color .2s;white-space:nowrap}
.hdr-btn:hover{border-color:var(--accent);color:var(--text)}
.hdr-btn.danger:hover{border-color:var(--red);color:var(--red)}
.presence-bar{display:flex;align-items:center;gap:4px;flex-shrink:0}
.presence-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.presence-count{font-size:12px;color:var(--text2)}

/* ── Chat Body ── */
.chat-body{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:180px;border-right:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:8px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.user-list{flex:1;overflow-y:auto;padding:6px}
.user-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;margin-bottom:2px}
.user-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:2px solid transparent}
.user-name-text{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.user-badge{font-size:9px;background:rgba(91,143,255,.15);color:var(--accent);padding:1px 4px;border-radius:3px}
.user-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-active{background:var(--green)}
.status-idle{background:var(--yellow)}
.status-timeout{background:var(--red)}

/* ── Messages ── */
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#msgList{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:2px}
.msg-row{display:flex;gap:8px;padding:3px 0;border-radius:6px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.msg-content{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-bottom:1px}
.msg-name{font-size:12px;font-weight:600}
.msg-id-chip{font-size:10px;font-family:var(--font-mono);opacity:.65}
.msg-time{font-size:10px;color:var(--text3)}
.msg-text{font-size:13px;color:var(--text);word-break:break-word;white-space:pre-wrap;line-height:1.55}
.msg-self .msg-text{color:#dbeaff}

/* ── System messages ── */
.sys-msg{font-size:11px;text-align:center;padding:3px 8px;border-radius:4px;margin:3px auto;max-width:420px}
.sys-msg.sm-join{color:#7eb8ff;background:rgba(91,143,255,.07)}
.sys-msg.sm-leave{color:var(--text3);background:rgba(255,255,255,.03)}
.sys-msg.sm-auto{color:#ff8080;background:rgba(255,85,85,.07)}
.sys-msg.sm-host{color:var(--yellow);background:rgba(255,208,96,.07)}

/* ── Input ── */
.chat-footer{padding:8px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-wrap{display:flex;gap:8px;align-items:flex-end}
#msgInput{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;resize:none;outline:none;max-height:120px;min-height:38px;transition:border-color .2s;line-height:1.5}
#msgInput:focus{border-color:var(--accent)}
#msgInput::placeholder{color:var(--text3)}
#sendBtn{background:var(--accent);border:none;border-radius:var(--radius);padding:9px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;flex-shrink:0;height:38px}
#sendBtn:hover{opacity:.85}
#sendBtn:disabled{opacity:.4;cursor:not-allowed}
.footer-info{display:flex;justify-content:space-between;align-items:center;padding:3px 0 0;font-size:11px;color:var(--text3)}
.timer-bar{display:flex;align-items:center;gap:4px}
.timer-ring{display:inline-block;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--yellow)}
.timer-warn .timer-ring{border-color:var(--red);animation:blink .8s infinite}
@keyframes blink{50%{opacity:.2}}

/* ── Panels / Modals ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none!important}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.panel-title{font-size:15px;font-weight:700;margin-bottom:14px}
.panel-close{float:right;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;line-height:1;margin-left:8px}
.panel-close:hover{color:var(--text)}
.panel-label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;margin-top:12px}
.panel-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.panel-input:focus{border-color:var(--accent)}
.panel-btn{padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s,background .2s;border:none}
.panel-btn.primary{background:var(--accent);color:#fff}
.panel-btn.primary:hover{opacity:.85}
.panel-btn.sec{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.panel-btn.sec:hover{border-color:var(--border2)}
.panel-btn.danger{background:rgba(255,85,85,.15);border:1px solid rgba(255,85,85,.3);color:var(--red)}
.panel-btn.danger:hover{background:rgba(255,85,85,.25)}
.panel-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}

/* ── Pending list ── */
.pending-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px}
.pending-item-name{font-size:13px;font-weight:600;margin-bottom:4px}
.pending-item-time{font-size:11px;color:var(--text3)}
.pending-item-actions{display:flex;gap:6px;margin-top:8px}

/* ── Toast ── */
#toastWrap{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--text);max-width:260px;box-shadow:var(--shadow);pointer-events:none;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
.toast.toast-ok{border-color:rgba(85,255,159,.3);color:var(--green)}
.toast.toast-err{border-color:rgba(255,85,85,.3);color:var(--red)}
.toast.toast-warn{border-color:rgba(255,208,96,.3);color:var(--yellow)}

/* ── Pagination ── */
.page-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.page-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer;transition:border-color .2s}
.page-btn:hover{border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-size:11px;color:var(--text3)}

/* ── Mode toggle ── */
.mode-toggle{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:3px}
.mode-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:background .2s,color .2s}
.mode-btn.active{background:var(--accent);color:#fff}

/* ── Timer select ── */
.timer-select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;color:var(--text);font-size:12px;outline:none}

/* ── Invite link ── */
.invite-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:11px;font-family:var(--font-mono);color:var(--accent);word-break:break-all;margin-top:8px;cursor:pointer;transition:background .2s}
.invite-box:hover{background:var(--surface3)}

/* ── Responsive ── */
@media(max-width:600px){
  .sidebar{display:none}
  .chat-room-name{max-width:100px}
}
@media(max-width:380px){
  .lobby-card{padding:20px 14px}
}
/* ── Scrollback button ── */
#scrollBackBtn{position:absolute;bottom:12px;right:12px;background:var(--accent);border:none;border-radius:20px;padding:6px 14px;font-size:12px;color:#fff;cursor:pointer;box-shadow:var(--shadow);z-index:10;display:none}
.chat-main{position:relative}
</style>
</head>
<body>

<!-- ════════════════════════════════
     LOBBY SCREEN
════════════════════════════════ -->
<div id="lobbyScreen" class="screen">
  <div class="lobby-card" id="lobbyCard">
    <div class="lobby-logo">NEZU ONETIME CHAT</div>
    <div class="lobby-title">チャットルームに参加</div>
    <div class="lobby-sub" id="lobbySubtitle">接続中...</div>

    <!-- 表示名 -->
    <div class="lobby-section" id="sectionName">
      <div class="lobby-label">表示名</div>
      <input class="lobby-input" id="inputName" maxlength="20" placeholder="ニックネームを入力">
      <div class="color-strip" id="colorStrip"></div>
    </div>

    <!-- トリップ -->
    <div class="lobby-section" id="sectionTrip">
      <div class="lobby-label">トリップキー（任意）</div>
      <input class="lobby-input" id="inputTrip" type="password" maxlength="64" placeholder="# 省略可（匿名参加）">
    </div>

    <!-- ルーム情報 -->
    <div class="lobby-info-box" id="lobbyInfoBox" style="display:none"></div>

    <!-- 自動退室タイマー -->
    <div class="lobby-section" id="sectionTimer">
      <div class="lobby-label">自動退室タイマー</div>
      <select class="timer-select" id="selectTimer" style="width:100%">
        <option value="0">なし</option>
        <option value="5">5分</option>
        <option value="10">10分</option>
        <option value="15">15分</option>
        <option value="20">20分</option>
        <option value="30">30分</option>
        <option value="45">45分</option>
        <option value="60">60分</option>
      </select>
    </div>

    <div class="err-msg" id="lobbyErr"></div>

    <!-- ボタン群 -->
    <div id="lobbyBtnArea"></div>
  </div>
</div>

<!-- ════════════════════════════════
     CHAT SCREEN
════════════════════════════════ -->
<div id="chatScreen" class="screen hidden">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="presence-bar">
        <span class="presence-dot"></span>
        <span class="presence-count" id="presenceCount">0</span>
      </div>
      <div class="chat-room-name" id="chatRoomName">-</div>
      <span id="roomModeBadge" class="lobby-badge badge-open">OPEN</span>
    </div>
    <div class="chat-header-right">
      <button class="hdr-btn" id="btnPending" style="display:none">承認待ち <span id="pendingCount">0</span></button>
      <button class="hdr-btn" id="btnInvite">招待リンク</button>
      <button class="hdr-btn" id="btnSettings">⚙ 設定</button>
      <button class="hdr-btn danger" id="btnLeave">退室</button>
    </div>
  </div>

  <!-- Body -->
  <div class="chat-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">参加者</div>
      </div>
      <div class="user-list" id="userList"></div>
    </div>

    <!-- Main -->
    <div class="chat-main">
      <!-- Pagination -->
      <div class="page-bar" id="pageBar">
        <button class="page-btn" id="btnPrevPage" disabled>← 前</button>
        <span class="page-info" id="pageInfo">-</span>
        <button class="page-btn" id="btnNextPage" disabled>次 →</button>
      </div>
      <div id="msgList" role="log" aria-live="polite"></div>
      <button id="scrollBackBtn">↓ 新着</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="chat-footer">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="メッセージを入力… (Enter送信 / Shift+Enterで改行)" maxlength="4000"></textarea>
      <button id="sendBtn">送信</button>
    </div>
    <div class="footer-info">
      <div class="timer-bar" id="timerBar" style="display:none">
        <span class="timer-ring" id="timerRing"></span>
        <span id="timerText">--:--</span>
      </div>
      <span id="charCount" style="margin-left:auto">0 / 4000</span>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     OVERLAYS / MODALS
════════════════════════════════ -->
<!-- Pending管理 -->
<div class="overlay hidden" id="pendingOverlay">
  <div class="panel">
    <div class="panel-title"><button class="panel-close" id="closePending">✕</button>承認待ちリスト</div>
    <div id="pendingList"></div>
  </div>
</div>

<!-- Settings -->
<div class="overlay hidden" id="settingsOverlay">
  <div class="panel">
    <div class="panel-title"><button class="panel-close" id="closeSettings">✕</button>設定</div>
    <div class="panel-label">ルームモード（ホストのみ）</div>
    <div class="mode-toggle" id="modeToggle">
      <button class="mode-btn active" data-mode="open">OPEN</button>
      <button class="mode-btn" data-mode="approval">承認制</button>
    </div>
    <div class="panel-label">表示名変更</div>
    <input class="panel-input" id="settingName" maxlength="20">
    <div class="color-strip" id="colorStrip2" style="margin-top:6px"></div>
    <div class="panel-label">トリップキー変更</div>
    <input class="panel-input" id="settingTrip" type="password" placeholder="空欄でリセット">
    <div class="panel-label">自動退室タイマー</div>
    <select class="timer-select" id="settingTimer" style="width:100%">
      <option value="0">なし</option>
      <option value="5">5分</option>
      <option value="10">10分</option>
      <option value="15">15分</option>
      <option value="20">20分</option>
      <option value="30">30分</option>
      <option value="45">45分</option>
      <option value="60">60分</option>
    </select>
    <div class="panel-label">ホスト移譲（ホストのみ）</div>
    <select class="panel-input" id="transferTarget"></select>
    <div class="panel-row">
      <button class="panel-btn sec" id="closeSettings2">閉じる</button>
      <button class="panel-btn danger" id="btnTransferHost">移譲</button>
      <button class="panel-btn primary" id="applySettings">適用</button>
    </div>
  </div>
</div>

<!-- Invite -->
<div class="overlay hidden" id="inviteOverlay">
  <div class="panel">
    <div class="panel-title"><button class="panel-close" id="closeInvite">✕</button>招待リンク</div>
    <div style="font-size:12px;color:var(--text2)">このリンクを共有してください。パスワードは別途共有する必要があります。</div>
    <div class="invite-box" id="inviteLink" title="クリックでコピー"></div>
    <div class="panel-row">
      <button class="panel-btn primary" id="copyInvite">コピー</button>
      <button class="panel-btn sec" id="closeInvite2">閉じる</button>
    </div>
  </div>
</div>

<!-- Toast wrap -->
<div id="toastWrap"></div>

<!-- ════════════════════════════════
     SCRIPTS
════════════════════════════════ -->
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- CryptoJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<script>
"use strict";
/* ═══════════════════════════════════════════════════
   FIREBASE CONFIG  ←← ★ここに実際の設定を入れてください★
═══════════════════════════════════════════════════ */
const FB_CFG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  databaseURL:       "https://YOUR_PROJECT-default-rtdb.asia-southeast1.firebasedatabase.app",

/* ═══════════════════════════════════════════════════
   CRYPTO
═══════════════════════════════════════════════════ */
function deriveSalt(roomId){
  return CryptoJS.SHA256(NEZU_SALT_BASE + roomId).toString();
}

async function deriveKey(password, salt){
  const cacheKey = password + ":" + salt;
  if(keyCache[cacheKey]) return keyCache[cacheKey];
  const key = CryptoJS.PBKDF2(password, salt, {
    keySize: PBKDF2_KS/32,
    iterations: PBKDF2_ITER,
    hasher: CryptoJS.algo.SHA256
  });
  keyCache[cacheKey] = key;
  return key;
}

function encryptV2(text, key){
  const iv = CryptoJS.lib.WordArray.random(16);
  const enc = CryptoJS.AES.encrypt(text, key, {
    iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
  });
  const ivHex   = iv.toString(CryptoJS.enc.Hex);
  const cipherB64 = enc.ciphertext.toString(CryptoJS.enc.Base64);
  const hmacData  = ivHex + ":" + cipherB64;
  const hmac    = CryptoJS.HmacSHA256(hmacData, key).toString(CryptoJS.enc.Hex);
  return `v2:${ivHex}:${cipherB64}:${hmac}`;
}

function decryptV2(payload, key){
  try{
    if(payload.startsWith("v2:")){
      const parts = payload.split(":");
      if(parts.length < 4) return null;
      const [,ivHex,cipherB64,...hmacParts] = parts;
      const hmac = hmacParts.join(":");
      const hmacCheck = CryptoJS.HmacSHA256(ivHex+":"+cipherB64, key).toString(CryptoJS.enc.Hex);
      if(hmac !== hmacCheck) return null;
      const iv  = CryptoJS.enc.Hex.parse(ivHex);
      const dec = CryptoJS.AES.decrypt({ciphertext: CryptoJS.enc.Base64.parse(cipherB64)}, key,
        {iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7});
      return dec.toString(CryptoJS.enc.Utf8) || null;
    }
    // v1 compat
    const dec = CryptoJS.AES.decrypt(payload, key);
    return dec.toString(CryptoJS.enc.Utf8) || null;
  }catch{return null}
}

function enc(t){ return encryptV2(t, cryptoKey) }
function dec(p){ return decryptV2(p, cryptoKey) }

/* ═══════════════════════════════════════════════════
   TRIP CODE
═══════════════════════════════════════════════════ */
function computeTrip(tripKey, roomSalt){
  if(!tripKey) return "";
  const raw = CryptoJS.PBKDF2(tripKey, NEZU_SALT_BASE + roomSalt, {
    keySize: 4, iterations: PBKDF2_ITER, hasher: CryptoJS.algo.SHA256
  }).toString(CryptoJS.enc.Base64).substring(0,8);
  return "◆" + raw;
}

/* ═══════════════════════════════════════════════════
   ID COLOR (timestamp based)
═══════════════════════════════════════════════════ */
function timeToColor(ts){
  // timestamp → hue 0-360
  const hue = ((ts / 1000) % 360 + 360) % 360;
  return `hsl(${Math.round(hue)},70%,70%)`;
}

function toast(msg, type="", dur=3000){
  const w = document.getElementById("toastWrap");
  const t = document.createElement("div");
  t.className = `toast${type?" toast-"+type:""}`;
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(),300); }, dur);
}

function buildColorPalette(containerId, getColorFn, setColorFn){
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  COLORS.forEach(c=>{
    const d = document.createElement("div");
    d.className = "color-dot" + (c===getColorFn()?" sel":"");
    d.style.background = c;
    d.onclick = ()=>{
      el.querySelectorAll(".color-dot").forEach(x=>x.classList.remove("sel"));
      d.classList.add("sel");
      setColorFn(c);
    };
    el.appendChild(d);
  });
}

/* ═══════════════════════════════════════════════════
   URL PARSING
═══════════════════════════════════════════════════ */
function parseToken(){
  const hash = location.hash.slice(1);
  if(!hash) return null;
  try{
    // format: base64(roomId:password) or just roomId
    const decoded = atob(hash);
    const idx = decoded.indexOf(":");
    if(idx < 0) return {roomId: decoded, password:""};
    return {roomId: decoded.substring(0,idx), password: decoded.substring(idx+1)};
  }catch{return {roomId: hash, password:""}}
}

function buildInviteToken(roomId, password){
  return btoa(roomId + ":" + password);
}

    // APPROVAL mode: check if already pending/approved

    };
    document.getElementById("btnCheckStatus").onclick = ()=>{
      checkPendingStatus(lobbyErr);
    };

let myPendingId = null;

async function checkPendingStatus(lobbyErr){
  const statusEl = document.getElementById("pendingStatus");
  const approvedArea = document.getElementById("approvedJoinArea");
  if(!statusEl) return;

  // savedPendingId
  const savedPending = localStorage.getItem("nezu_pending_"+roomId);
  if(savedPending) myPendingId = savedPending;

  if(!myPendingId){
    statusEl.textContent = "リクエストを送ってください";
    return;
  }

  try{
    const snap = await db.ref("pending/"+roomId+"/"+myPendingId).get();
    if(!snap.exists()){
      statusEl.textContent = "リクエスト情報が見つかりません";
      myPendingId = null;
      localStorage.removeItem("nezu_pending_"+roomId);
      return;
    }
    const p = snap.val();
    const status = p.status;
    if(status==="approved"){
      statusEl.innerHTML = `<span class="lobby-badge badge-approved">✓ 承認済み</span>`;
      if(approvedArea){
        approvedArea.style.display = "block";
        document.getElementById("btnApprovedJoin").onclick = async ()=>{
          const name  = document.getElementById("inputName").value.trim();
          const trip  = document.getElementById("inputTrip").value;
          const timerMin = parseInt(document.getElementById("selectTimer").value)||0;
          if(!name){ lobbyErr.textContent="表示名を入力してください"; return; }
          lobbyErr.textContent="";
          await doJoinRoom(name, trip, timerMin);
        };
      }
    } else if(status==="denied"){
      statusEl.innerHTML = `<span class="lobby-badge badge-denied">✗ 拒否されました</span>`;
    } else {
      statusEl.innerHTML = `<span class="lobby-badge badge-pending">⏳ 承認待ち</span>`;
    }
  }catch(e){
    statusEl.textContent = "確認エラー: " + e.message;
  }
}

async function doRequestApproval(lobbyErr){
  const name  = document.getElementById("inputName").value.trim();
  const trip  = document.getElementById("inputTrip").value;
  if(!name){ lobbyErr.textContent="表示名を入力してください"; return; }
  lobbyErr.textContent = "送信中...";
  try{
    const reqRef = db.ref("pending/"+roomId).push();
    myPendingId = reqRef.key;
    localStorage.setItem("nezu_pending_"+roomId, myPendingId);
    await reqRef.set({
      uid: myUid,
      encName: enc(name),
      encColor: enc(myColor),
      status: "pending",
      requestedAt: firebase.database.ServerValue.TIMESTAMP
    });
    lobbyErr.textContent = "";
    toast("承認リクエストを送信しました", "ok");
    checkPendingStatus(lobbyErr);
  }catch(e){
    lobbyErr.textContent = "送信エラー: " + e.message;
  }
}

/* ═══════════════════════════════════════════════════
   CREATE ROOM
═══════════════════════════════════════════════════ */
async function doCreateRoom(name, password, mode, tripKey, timerMin){
  const lobbyErr = document.getElementById("lobbyErr");
  lobbyErr.textContent = "作成中...";
  try{
    const cred = await auth.signInAnonymously();
    myUid = myAnonUid = cred.user.uid;

    const newRoomRef = db.ref("rooms").push();
    roomId = newRoomRef.key;
    roomPassword = password;
    roomSalt = deriveSalt(roomId);
    cryptoKey = await deriveKey(password, roomSalt);
    myName  = name;
    myColor = myColor;
    myTrip  = computeTrip(tripKey, roomSalt);
    roomMode = mode;
    autoLeaveMin = timerMin;

    await newRoomRef.set({
      encName:   enc(name + "のルーム"),
      mode:      mode,
      password:  password,
      salt:      roomSalt,
      hostUid:   myUid,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      version:   APP_VER
    });

    localStorage.setItem("nezu_name",  name);
    localStorage.setItem("nezu_color", myColor);

    // URL更新
    location.hash = buildInviteToken(roomId, password);

    lobbyErr.textContent = "";
    await enterChat();
  }catch(e){
    lobbyErr.textContent = "作成エラー: " + e.message;
    console.error(e);
  }
}

async function doJoinRoom(name, tripKey, timerMin){
  const lobbyErr = document.getElementById("lobbyErr");
  lobbyErr.textContent = "入室中...";
  try{
    if(!myUid){
      const cred = await auth.signInAnonymously();
      myUid = myAnonUid = cred.user.uid;

    myName  = name;
    myTrip  = computeTrip(tripKey, roomSalt);
    autoLeaveMin = timerMin;

    localStorage.setItem("nezu_name",  name);
    localStorage.setItem("nezu_color", myColor);

    lobbyErr.textContent = "";
    await enterChat();
  }catch(e){
    lobbyErr.textContent = "入室エラー: " + e.message;
    console.error(e);
  }
}

async function setMyPresence(){
  const ref = db.ref("presence/"+roomId+"/"+myUid);
  await ref.set({
    encName:       enc(myName),
    encColor:      enc(myColor),
    trip:          myTrip,
    lastHeartbeat: firebase.database.ServerValue.TIMESTAMP,
    status:        "active",
    joinedAt:      firebase.database.ServerValue.TIMESTAMP
  });
}

function setupDisconnect(){
  const ref = db.ref("presence/"+roomId+"/"+myUid);
  ref.onDisconnect().remove();
}

async function updatePresence(fields){
  const ref = db.ref("presence/"+roomId+"/"+myUid);
  await ref.update({
    lastHeartbeat: firebase.database.ServerValue.TIMESTAMP,
    ...fields
  });
}

function startHeartbeat(){
  if(heartbeatInterval) clearInterval(heartbeatInterval);
  heartbeatInterval = setInterval(async ()=>{
    const now = Date.now();
    const idleSince = now - lastActivity;
    const newStatus = idleSince > IDLE_THRESHOLD ? "idle" : "active";
    try{
      await updatePresence({status: newStatus});
    }catch(e){ console.warn("heartbeat err", e) }
  }, HEARTBEAT_MS);
}

/* ═══════════════════════════════════════════════════
   AUTO LEAVE TIMER
═══════════════════════════════════════════════════ */
function startAutoLeaveTimer(){
  stopAutoLeaveTimer();
  if(!autoLeaveMin) {
    document.getElementById("timerBar").style.display = "none";
    return;
  }
  autoLeaveEnd = Date.now() + autoLeaveMin * 60000;
  document.getElementById("timerBar").style.display = "flex";
  tickTimer();
  autoLeaveTimer = setInterval(tickTimer, 1000);
}

function stopAutoLeaveTimer(){
  if(autoLeaveTimer){ clearInterval(autoLeaveTimer); autoLeaveTimer=null; }
}

function resetAutoLeaveTimer(){
  if(!autoLeaveMin) return;
  lastActivity = Date.now();
  autoLeaveEnd = Date.now() + autoLeaveMin * 60000;
  document.getElementById("timerBar").classList.remove("timer-warn");
}

function tickTimer(){
  const rem = Math.max(0, autoLeaveEnd - Date.now());
  const mm  = Math.floor(rem/60000);
  const ss  = Math.floor((rem%60000)/1000);
  const timerText = document.getElementById("timerText");
  const timerBar  = document.getElementById("timerBar");
  if(timerText) timerText.textContent = `${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
  if(timerBar){
    if(rem < 60000) timerBar.classList.add("timer-warn");
    else timerBar.classList.remove("timer-warn");
  }
  if(rem <= 0){
    stopAutoLeaveTimer();
    doAutoLeave();
  }
}

async function doAutoLeave(){
  toast("自動退室タイマーが満了しました", "warn", 5000);
  await sendSystemMsg("auto", "⏰ " + myName + " が自動退室しました（タイマー満了）", "sm-auto");
  await writeLog("autoLeave", {uid: myUid, name: myName});
  await leaveRoom();
}

/* ═══════════════════════════════════════════════════
   LOGS
═══════════════════════════════════════════════════ */
async function writeLog(type, data){
  try{
    await db.ref("logs/"+roomId+"/events").push({
      type, ...data, ts: firebase.database.ServerValue.TIMESTAMP
    });
  }catch(e){ console.warn("log err", e) }
}

/* ═══════════════════════════════════════════════════
   SYSTEM MESSAGE
═══════════════════════════════════════════════════ */
async function sendSystemMsg(type, text, cssClass){
  try{
    await db.ref("chat/"+roomId).push({
      system:  true,
      sysType: type,
      cssClass: cssClass || "sm-leave",
      text:    text,
      ts:      firebase.database.ServerValue.TIMESTAMP
    });
  }catch(e){ console.warn("sys msg err", e) }
}

/* ═══════════════════════════════════════════════════
   LISTENERS
═══════════════════════════════════════════════════ */
function setupListeners(){
  // presence: onValue → full rebuild
  const presRef = db.ref("presence/"+roomId);
  regListener(presRef, "value", snap=>{
    presenceMap = {};
    if(snap.exists()){
      const now = Date.now();
      snap.forEach(child=>{
        const uid = child.key;
        const d   = child.val();
        const alive = d.lastHeartbeat && (now - d.lastHeartbeat) < ALIVE_THRESH_MS;
        const name  = dec(d.encName)  || "???";
        const color = dec(d.encColor) || "#888";
        presenceMap[uid] = {
          name, color,
          trip:          d.trip || "",
          status:        alive ? (d.status||"active") : "timeout",
          lastHeartbeat: d.lastHeartbeat || 0,
          joinedAt:      d.joinedAt || 0
        };
      });
    }
    rebuildUserList();
    updatePresenceCount();
    updateTransferTargetList();
  });

  // chat: onChildAdded
  const chatRef = db.ref("chat/"+roomId).orderByChild("ts");
  regListener(chatRef, "child_added", snap=>{
    const d = snap.val();
    d._key = snap.key;
    allMessages.push(d);
    // ページング: 最新ページへ
    const totalPages = Math.max(1, Math.ceil(allMessages.length / MSG_PER_PAGE));
    if(currentPage === totalPages || currentPage === 1){
      currentPage = totalPages;
      renderMessages();
    } else {
      updatePageBar();
    }
  });

  // pending (ホストのみ積極監視)
  const pendingRef = db.ref("pending/"+roomId);
  regListener(pendingRef, "value", snap=>{
    const items = [];
    if(snap.exists()){
      snap.forEach(child=>{
        const d = child.val();
        if(d.status==="pending") items.push({id:child.key, ...d});
      });
    }
    const cnt = items.length;
    document.getElementById("pendingCount").textContent = cnt;
    document.getElementById("btnPending").style.display = (amHost && cnt>0) ? "" : (amHost?"":"none");
    renderPendingList(items);
  });

  // room mode
  regListener(db.ref("rooms/"+roomId+"/mode"), "value", snap=>{
    if(snap.exists()){
      roomMode = snap.val();
      document.getElementById("roomModeBadge").className =
        `lobby-badge ${roomMode==="open"?"badge-open":"badge-approval"}`;
      document.getElementById("roomModeBadge").textContent =
        roomMode==="open"?"OPEN":"承認制";
      updateModeToggle();
    }
  });

  // host
  regListener(db.ref("rooms/"+roomId+"/hostUid"), "value", snap=>{
    if(snap.exists()){
      amHost = snap.val() === myUid;
      checkHost();
    }
  });
}

/* ═══════════════════════════════════════════════════
   USER LIST (rebuild from presenceMap)
═══════════════════════════════════════════════════ */
function rebuildUserList(){
  const ul = document.getElementById("userList");
  ul.innerHTML = "";
  const sortedUids = Object.keys(presenceMap).sort((a,b)=>{
    const pa = presenceMap[a], pb = presenceMap[b];
    return (pa.joinedAt||0) - (pb.joinedAt||0);
  });
  sortedUids.forEach(uid=>{
    const u = presenceMap[uid];
    const item = document.createElement("div");
    item.className = "user-item";
    const initials = (u.name||"?").substring(0,2);
    item.innerHTML = `
      <div class="user-avatar" style="background:${u.color}20;border-color:${u.color};color:${u.color}">${initials}</div>
      <div class="user-name-text" title="${escHtml(u.name)}">${escHtml(u.name)}${u.trip?`<span style="font-size:9px;color:var(--accent);display:block">${escHtml(u.trip)}</span>`:""}</div>
      <div class="user-status-dot status-${u.status||"active"}"></div>
    `;
    if(uid === myUid) item.style.background = "rgba(91,143,255,.06)";
    ul.appendChild(item);
  });
}

function updatePresenceCount(){
  const cnt = Object.keys(presenceMap).length;
  document.getElementById("presenceCount").textContent = cnt;
}

function updateTransferTargetList(){
  const sel = document.getElementById("transferTarget");
  if(!sel) return;
  sel.innerHTML = "";
  Object.entries(presenceMap).forEach(([uid,u])=>{
    if(uid===myUid) return;
    const opt = document.createElement("option");
    opt.value = uid;
    opt.textContent = u.name + (u.trip?" "+u.trip:"");
    sel.appendChild(opt);
  });
}

/* ═══════════════════════════════════════════════════
   MESSAGE RENDERING
═══════════════════════════════════════════════════ */
function renderMessages(){
  const list = document.getElementById("msgList");
  const totalPages = Math.max(1, Math.ceil(allMessages.length / MSG_PER_PAGE));
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage-1)*MSG_PER_PAGE;
  const end   = start + MSG_PER_PAGE;
  const slice = allMessages.slice(start, end);

  list.innerHTML = "";
  slice.forEach(d => {
    list.appendChild(buildMsgEl(d));
  });

  updatePageBar();

  if(isAtBottom) scrollToBottom();
}

function buildMsgEl(d){
  if(d.system){
    const el = document.createElement("div");
    el.className = `sys-msg ${d.cssClass||"sm-leave"}`;
    el.textContent = d.text || "";
    return el;
  }
  // normal
  const name  = dec(d.encName)  || "???";
  const color = dec(d.encColor) || "#888";
  const text  = dec(d.encText)  || "[復号失敗]";
  const trip  = d.trip || "";
  const ts    = d.ts   || 0;
  const idColor = timeToColor(ts);
  const isSelf  = (d.uid === myUid);
  const initials = name.substring(0,2);

  const row = document.createElement("div");
  row.className = "msg-row" + (isSelf?" msg-self":"");

  const timeStr = ts ? new Date(ts).toLocaleTimeString("ja",{hour:"2-digit",minute:"2-digit"}) : "";
  row.innerHTML = `
    <div class="msg-avatar" style="background:${color}25;color:${color}">${escHtml(initials)}</div>
    <div class="msg-content">
      <div class="msg-meta">
        <span class="msg-name" style="color:${color}">${escHtml(name)}</span>
        ${trip?`<span class="msg-id-chip" style="color:${idColor}">${escHtml(trip)}</span>`:""}
        <span class="msg-time">${timeStr}</span>
      </div>
      <div class="msg-text">${escHtml(text)}</div>
    </div>
  `;
  return row;
}

function updatePageBar(){
  const totalPages = Math.max(1, Math.ceil(allMessages.length / MSG_PER_PAGE));
  document.getElementById("pageInfo").textContent = `${currentPage} / ${totalPages}`;
  document.getElementById("btnPrevPage").disabled = currentPage <= 1;
  document.getElementById("btnNextPage").disabled = currentPage >= totalPages;
}

/* ═══════════════════════════════════════════════════
   PENDING LIST
═══════════════════════════════════════════════════ */
function renderPendingList(items){
  const el = document.getElementById("pendingList");
  if(!el) return;
  if(items.length===0){
    el.innerHTML = `<div style="font-size:12px;color:var(--text3);text-align:center;padding:20px">承認待ちのユーザーはいません</div>`;
    return;
  }
  el.innerHTML = "";
  items.forEach(p=>{
    const name = dec(p.encName)||"???";
    const item = document.createElement("div");
    item.className = "pending-item";
    item.innerHTML = `
      <div class="pending-item-name">${escHtml(name)}</div>
      <div class="pending-item-time">${new Date(p.requestedAt||0).toLocaleString("ja")}</div>
      <div class="pending-item-actions">
        <button class="panel-btn primary" data-id="${p.id}" data-action="approve">承認</button>
        <button class="panel-btn danger"  data-id="${p.id}" data-action="deny">拒否</button>
      </div>
    `;
    item.querySelectorAll("[data-action]").forEach(btn=>{
      btn.onclick = ()=> handlePending(p.id, btn.dataset.action);
    });
    el.appendChild(item);
  });
}

async function handlePending(reqId, action){
  if(!amHost) return;
  try{
    await db.ref("pending/"+roomId+"/"+reqId).update({status: action==="approve"?"approved":"denied"});
    toast(action==="approve"?"承認しました":"拒否しました", action==="approve"?"ok":"warn");
  }catch(e){ toast("エラー: "+e.message,"err") }
}

/* ═══════════════════════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════════════════════ */
async function sendMessage(){
  const inp = document.getElementById("msgInput");
  const text = inp.value.trim();
  if(!text) return;
  if(text.length > MAX_MSG_LEN){ toast(`${MAX_MSG_LEN}文字以内にしてください`,"err"); return; }
  const now = Date.now();
  if(now - lastSendTime < SEND_CD_MS){ toast("送信が早すぎます","warn"); return; }
  if(text === lastSentMsg && now - lastSentTime < DUP_MSG_MS){ toast("同じメッセージは3秒以内に再送できません","warn"); return; }
  lastSendTime = now;
  lastSentMsg  = text;
  lastSentTime = now;
  lastActivity = now;
  resetAutoLeaveTimer();
  inp.value = "";
  inp.style.height = "38px";
  updateCharCount();

  try{
    await db.ref("chat/"+roomId).push({
      encName:  enc(myName),
      encColor: enc(myColor),
      encText:  enc(text),
      trip:     myTrip,
      uid:      myUid,
      ts:       firebase.database.ServerValue.TIMESTAMP
    });
  }catch(e){ toast("送信エラー: "+e.message,"err"); console.error(e) }
}

/* ═══════════════════════════════════════════════════
   SCROLL
═══════════════════════════════════════════════════ */
function setupScrollListener(){
  const list = document.getElementById("msgList");
  const btn  = document.getElementById("scrollBackBtn");
  list.addEventListener("scroll", ()=>{
    const th = 60;
    isAtBottom = list.scrollHeight - list.scrollTop - list.clientHeight < th;
    btn.style.display = isAtBottom ? "none" : "block";
  }, {passive:true});
  btn.onclick = ()=>{
    const totalPages = Math.max(1, Math.ceil(allMessages.length/MSG_PER_PAGE));
    currentPage = totalPages;
    renderMessages();
    scrollToBottom();
  };
}

function scrollToBottom(){
  const list = document.getElementById("msgList");
  requestAnimationFrame(()=>{ list.scrollTop = list.scrollHeight; });
}

/* ═══════════════════════════════════════════════════
   LEAVE ROOM
═══════════════════════════════════════════════════ */
async function leaveRoom(){
  stopAutoLeaveTimer();
  if(heartbeatInterval){ clearInterval(heartbeatInterval); heartbeatInterval=null; }
  offAll();
  try{
    await db.ref("presence/"+roomId+"/"+myUid).remove();
  }catch{}
  // ホスト移譲（他にユーザーがいれば）
  if(amHost){
    const others = Object.keys(presenceMap).filter(u=>u!==myUid);
    if(others.length>0){
      await db.ref("rooms/"+roomId+"/hostUid").set(others[0]);
      sendSystemMsg("host", others[0]+" に自動でホストが移譲されました", "sm-host");
    }
  }
  // room空ならルーム削除
  setTimeout(async ()=>{
    try{
      const snap = await db.ref("presence/"+roomId).get();
      if(!snap.exists() || Object.keys(snap.val()||{}).length===0){
        await db.ref("rooms/"+roomId).remove();
        await db.ref("chat/"+roomId).remove();
        await db.ref("presence/"+roomId).remove();
        await db.ref("pending/"+roomId).remove();
        await db.ref("logs/"+roomId).remove();
      }
    }catch{}
  }, 3000);

  // ロビーへ
  allMessages = [];
  presenceMap = {};
  currentPage = 1;
  location.hash = "";
  showLobby();
  await initLobby();
}

/* ═══════════════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════════════ */
async function applySettings(){
  const newName  = document.getElementById("settingName").value.trim() || myName;
  const newTrip  = document.getElementById("settingTrip").value;
  const newTimerMin = parseInt(document.getElementById("settingTimer").value)||0;

  myName  = newName;
  myTrip  = computeTrip(newTrip, roomSalt);
  autoLeaveMin = newTimerMin;

  localStorage.setItem("nezu_name",  myName);
  localStorage.setItem("nezu_color", myColor);

  await updatePresence({
    encName:  enc(myName),
    encColor: enc(myColor),
    trip:     myTrip
  });

  startAutoLeaveTimer();
  buildColorPalette("colorStrip2", ()=>myColor, c=>myColor=c);
  document.getElementById("settingsOverlay").classList.add("hidden");
  toast("設定を適用しました","ok");
}

/* ═══════════════════════════════════════════════════
   HOST TRANSFER
═══════════════════════════════════════════════════ */
async function transferHost(){
  if(!amHost){ toast("ホストのみ操作可能です","err"); return; }
  const targetUid = document.getElementById("transferTarget").value;
  if(!targetUid){ toast("移譲先を選択してください","err"); return; }
  try{
    await db.ref("rooms/"+roomId+"/hostUid").set(targetUid);
    const targetName = presenceMap[targetUid]?.name || targetUid;
    sendSystemMsg("host", `${targetName} がホストになりました`, "sm-host");
    toast(`${targetName} にホストを移譲しました`,"ok");
  }catch(e){ toast("エラー: "+e.message,"err") }
}

/* ═══════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════ */
function escHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#x27;");
}

function updateCharCount(){
  const v = document.getElementById("msgInput").value.length;
  document.getElementById("charCount").textContent = `${v} / ${MAX_MSG_LEN}`;
}

/* ═══════════════════════════════════════════════════
   EVENT WIRING
═══════════════════════════════════════════════════ */
document.getElementById("sendBtn").onclick = sendMessage;
document.getElementById("msgInput").addEventListener("input", ()=>{
  const inp = document.getElementById("msgInput");
  inp.style.height = "38px";
  inp.style.height = Math.min(inp.scrollHeight, 120) + "px";
  updateCharCount();
  lastActivity = Date.now();
});
document.getElementById("msgInput").addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});

document.getElementById("btnLeave").onclick = async ()=>{
  if(!confirm("退室しますか？")) return;
  await sendSystemMsg("leave", myName+" が退室しました", "sm-leave");
  await writeLog("manualLeave", {uid:myUid, name:myName});
  await leaveRoom();
};

// Settings
document.getElementById("btnSettings").onclick = ()=>{
  document.getElementById("settingName").value = myName;
  document.getElementById("settingTimer").value = String(autoLeaveMin);
  document.getElementById("settingsOverlay").classList.remove("hidden");
  updateModeToggle();
};
["closeSettings","closeSettings2"].forEach(id=>{
  document.getElementById(id).onclick = ()=>
    document.getElementById("settingsOverlay").classList.add("hidden");
});
document.getElementById("applySettings").onclick = applySettings;
document.getElementById("btnTransferHost").onclick = transferHost;

// Mode toggle in settings
document.getElementById("modeToggle").querySelectorAll(".mode-btn").forEach(btn=>{
  btn.onclick = async ()=>{
    if(!amHost){ toast("ホストのみ変更可能です","err"); return; }
    roomMode = btn.dataset.mode;
    await db.ref("rooms/"+roomId+"/mode").set(roomMode);
    document.getElementById("modeToggle").querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    toast("モードを変更しました","ok");
  };
});

// Pending
document.getElementById("btnPending").onclick = ()=>
  document.getElementById("pendingOverlay").classList.remove("hidden");
document.getElementById("closePending").onclick = ()=>
  document.getElementById("pendingOverlay").classList.add("hidden");

// Invite
document.getElementById("btnInvite").onclick = ()=>
  document.getElementById("inviteOverlay").classList.remove("hidden");
["closeInvite","closeInvite2"].forEach(id=>{
  document.getElementById(id).onclick = ()=>
    document.getElementById("inviteOverlay").classList.add("hidden");
});
document.getElementById("copyInvite").onclick = ()=>{
  navigator.clipboard.writeText(document.getElementById("inviteLink").textContent)
    .then(()=>toast("リンクをコピーしました","ok"))
    .catch(()=>toast("コピーできませんでした","err"));
};
document.getElementById("inviteLink").onclick = ()=>
  document.getElementById("copyInvite").click();

// Pagination
document.getElementById("btnPrevPage").onclick = ()=>{
  if(currentPage>1){ currentPage--; isAtBottom=false; renderMessages(); }
};
document.getElementById("btnNextPage").onclick = ()=>{
  const totalPages = Math.max(1,Math.ceil(allMessages.length/MSG_PER_PAGE));
  if(currentPage<totalPages){ currentPage++; isAtBottom=true; renderMessages(); }
};

// Overlay backdrop close
["pendingOverlay","settingsOverlay","inviteOverlay"].forEach(id=>{
  document.getElementById(id).addEventListener("click", e=>{
    if(e.target.id===id) document.getElementById(id).classList.add("hidden");
  });
});

// Visibility change → heartbeat即送
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden && myUid && roomId){
    updatePresence({status:"active"}).catch(()=>{});
    lastActivity = Date.now();
  }
});

// Page unload → presenceをkeepaliveで削除
window.addEventListener("beforeunload", ()=>{
  if(myUid && roomId && auth.currentUser){
    // onDisconnect が primary。unload時に補助的にREST DELETEも試みる
    auth.currentUser.getIdToken(false).then(token=>{
      fetch(
        `${FB_CFG.databaseURL}/presence/${roomId}/${myUid}.json?auth=${token}`,
        {method:"DELETE", keepalive:true}
      );
    }).catch(()=>{});
  }
});

/* ═══════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════ */
(async function boot(){
  await initLobby();
})();
</script>
