<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>NEZU OFFICIAL CHAT</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--sf:#1e293b;--s2:#0a1628;--bd:#334155;--tx:#f1f5f9;--mu:#94a3b8;--m2:#64748b;--in:#4f46e5;--i2:#4338ca;--em:#00ff66;--e2:#10b981;--ro:#f43f5e;--rg:rgba(244,63,94,.12);--safe:env(safe-area-inset-bottom,0px);--usr-color:#94a3b8;--app-viewport-height:100dvh}
html,body{height:100%;height:100dvh;width:100%;overflow:hidden;background:#070a0f;color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;touch-action:pan-y;overscroll-behavior:none;-webkit-text-size-adjust:100%;font-size:15px}
input,textarea,select{font-family:inherit;-webkit-user-select:text;user-select:text;font-size:15px!important}
button{cursor:pointer;font-family:inherit;border:none;background:none}
button:focus-visible{outline:2px solid var(--in);outline-offset:2px}
#app{height:100vh;height:var(--app-viewport-height,100dvh);display:flex;position:fixed;inset:0;flex-direction:column;overflow:hidden;z-index:50;background:#070a0f}
#cp{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;background:#0d1117;position:relative;max-width:900px;width:100%;margin:0 auto;border-left:1px solid var(--bd);border-right:1px solid var(--bd);height:100%}
#hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:6px 12px;flex-shrink:0}
.hr{display:flex;align-items:center;justify-content:space-between;gap:8px;height:auto;padding:4px 0}
.rn{font-weight:800;font-size:14px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.pcnt{font-size:11px;font-weight:900;color:var(--tx);background:rgba(255,255,255,0.08);padding:3px 6px;border-radius:4px;white-space:nowrap;margin-left:6px;line-height:1}
.hbs{display:flex;gap:8px;align-items:center;flex-shrink:0}
.hbs button{padding:6px 14px;height:38px;border-radius:6px;font-size:12px;font-weight:700;background:var(--bg);border:1px solid var(--bd);color:var(--tx);display:flex;align-items:center;gap:6px}

.bclr {
  border-color: var(--usr-color) !important;
}
.bclr-dot{
  width:10px;height:10px;border-radius:50%;display:inline-block;transition:background 0.15s;
  background: var(--usr-color) !important;
}

.bx{background:rgba(244,63,94,.16)!important;border-color:rgba(244,63,94,.4)!important;color:#fda4af!important;font-weight:900!important;padding:6px 16px!important;display:none}
#pl{display:flex;gap:6px;padding:6px 10px;background:var(--s2);border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;align-items:center;flex-wrap:wrap;min-height:36px;max-height:58px;overflow-y:auto;overflow-x:hidden}
#pl::-webkit-scrollbar{width:4px}
#pl::-webkit-scrollbar-track{background:rgba(0,0,0,0.05)}
#pl::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.chip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--bg);border:1px solid rgba(255,255,255,0.08);display:inline-flex;align-items:center;color:var(--tx);height:24px;cursor:pointer}
#tl{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:6px 6px 120px 6px;background-color:#0d1117;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;contain:layout}
#tl-inner{display:flex;flex-direction:column;justify-content:flex-end;gap:0;width:100%;max-width:800px;margin:0 auto;min-height:100%}
.mw{position:relative;display:flex;flex-direction:column;width:100%;opacity:1;transform:translate3d(0,0,0);animation:slideInUp 0.1s cubic-bezier(0.22,1,0.36,1) forwards;user-select:text;-webkit-user-select:text;padding:10px 14px;border-bottom:1px solid rgba(51,65,85,0.25);will-change:transform,opacity;contain:content;content-visibility:auto;contain-intrinsic-size:0 65px}
.mm{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:4px;padding-right:70px}
.ts{color:var(--m2);font-size:11px;margin-left:auto;font-family:monospace}
.mb{align-self:start;background:transparent;border:none;padding:0;font-size:15px;line-height:1.6;max-width:100%;word-break:break-all;white-space:pre-wrap;color:var(--tx);padding-right:70px}
.sys-msg{text-align:center;font-size:12px;font-weight:bold;color:var(--mu);margin:8px 0;background:rgba(255,255,255,0.03);padding:8px 14px;border-radius:6px;width:100%;align-self:center;border:1px solid rgba(255,255,255,0.05);white-space:pre-wrap;word-break:break-all;line-height:1.5}
.sys-ts{display:block;font-size:10px;color:var(--m2);font-family:monospace;font-weight:normal;margin-top:4px}
.del-btn-inline{position:absolute;top:10px;right:14px;background:rgba(244, 63, 94, 0.12);color:#fda4af;border:1px solid rgba(244, 63, 94, 0.3);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;height:20px;opacity:0.5;transition:opacity 0.15s,background 0.15s}
.mw:hover .del-btn-inline{opacity:1;background:rgba(244,63,94,0.25)}
.inline-img{max-width:280px;max-height:240px;width:auto;height:auto;border-radius:6px;margin:6px 0;display:block;cursor:zoom-in;object-fit:contain;border:1px solid rgba(255, 255, 255, 0.1);background:#000}
.media-link-container{display:flex;flex-direction:column;gap:4px;margin-top:6px;background:rgba(255,255,255,0.02);padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.05);width:100%;max-width:100%;box-sizing:border-box}
.media-inline-row{display:flex;align-items:center;gap:8px;width:100%}
.media-badge{display:inline-flex;align-items:center;gap:2px;font-weight:800;padding:2px 5px;border-radius:3px;font-size:9px;color:#fff;text-transform:uppercase;line-height:1;white-space:nowrap;pointer-events:none}
.open-player-btn{background:var(--in);color:#fff;font-size:10px;font-weight:bold;border-radius:4px;padding:3px 10px;cursor:pointer;border:none;transition:background 0.15s;white-space:nowrap}
#joinForm{display:none;flex-direction:column;padding:10px 12px calc(10px + var(--safe));background:var(--sf);border-top:1px solid var(--bd);gap:8px;flex-shrink:0;width:100%}
.jrow{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center}
#ib{display:none;flex-direction:column;padding:4px calc(6px + env(safe-area-inset-right,0px)) calc(4px + var(--safe)) calc(6px + env(safe-area-inset-left,0px));background:var(--sf);border-top:1px solid var(--bd);gap:4px;flex-shrink:0;width:100%;transform:translate3d(0,0,0);will-change:transform}
#ib.show{display:flex}
#ibTopBar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
#ibToolbar{width:100%;align-items:center;display:flex;gap:4px}
.jump-btns{display:flex;flex-direction:row;gap:6px;flex-shrink:0}
.jump-btn{width:56px;height:32px;border-radius:6px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;cursor:pointer}
.jump-btn:active{background:var(--in);color:#fff}
.jump-btn:disabled{opacity:0.3;cursor:not-allowed}
.switch-kb{width:110px!important;height:32px!important;position:relative;border-radius:16px!important;background:var(--s2)!important;border:1px solid var(--bd);padding:0 2px!important;overflow:hidden;transition:all 0.25s ease;cursor:pointer;display:flex;align-items:center}
.switch-kb::after{content:"";position:absolute;top:2px;left:2px;width:26px;height:26px;background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.45);border-radius:50%;transition:transform 0.25s ease;z-index:1}
.switch-kb.active{background:var(--in)!important;border-color:var(--i2)!important}
.switch-kb.active::after{transform:translateX(53px)!important}
.switch-scroll{width:85px!important;height:32px!important;position:relative;border-radius:16px!important;background:var(--s2)!important;border:1px solid var(--bd);padding:0 2px!important;overflow:hidden;transition:all 0.25s ease;cursor:pointer;display:flex;align-items:center}
.switch-scroll::after{content:"";position:absolute;top:2px;left:2px;width:26px;height:26px;background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.45);border-radius:50%;transition:transform 0.25s ease;z-index:1}
.switch-scroll.active{background:var(--in)!important;border-color:var(--i2)!important}
.switch-scroll.active::after{transform:translateX(53px)!important}
.switch-text{font-size:11px;font-weight:bold;pointer-events:none;color:var(--tx);position:relative;z-index:2;width:100%;text-align:center}
.mi-container{position:relative;flex:1;display:flex;align-items:center;background:var(--bg);border:1px solid var(--bd);border-radius:18px;min-height:38px;padding:4px 34px 4px 38px}
.battach{position:absolute;left:4px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--mu);cursor:pointer}
.battach svg{width:18px;height:18px}
#mi{width:100%;background:none;border:none;color:var(--tx);outline:none;resize:none;font-size:15px;max-height:120px;line-height:1.5;padding:4px 0}
.bclrmm{position:absolute;right:4px;width:28px;height:28px;border-radius:50%;color:var(--m2);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.bsd{width:38px;height:38px;border-radius:50%;background:var(--in);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:0;box-shadow:0 1px 6px rgba(79,70,229,0.3)}
.bsd svg{width:18px;height:18px;transform:rotate(45deg);margin-top:-1px;margin-right:1px}
.mod-overlay{position:fixed;inset:0;background:rgba(15,23,42,.8);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:10000;padding:12px}
.mod-overlay.show{display:flex}
.gc,.clrmc{background:var(--sf);border:1px solid var(--bd);border-radius:8px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:10px;padding:12px;max-height:80vh;overflow-y:auto}
.clr-prev{background:var(--bg);padding:10px;border-radius:6px;text-align:center;font-size:11px;font-weight:700}
.clr-btns{display:flex;gap:8px;margin-top:4px}
.clr-cancel,.clr-ok{flex:1;padding:10px;border-radius:6px;font-size:12px;font-weight:700;text-align:center}
.clr-cancel{background:var(--bg);border:1px solid var(--bd);color:var(--tx)}
.clr-ok{background:var(--in);color:#fff}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.25);border-radius:50%;border-top-color:var(--tx);animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideInUp{from{transform:translateY(8px);opacity:0.8}to{transform:translateY(0)}}
.inp{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;color:var(--tx);outline:none;font-size:13px;transition:border-color 0.15s}
.inp:focus{border-color:var(--in)}
.btn{padding:10px 8px;border-radius:6px;font-size:13px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity 0.2s}
.btn:active{opacity:0.8}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.bp{background:var(--in);color:#fff}
.bq{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.del-modal-text{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:10px;font-size:12.5px;color:var(--tx);max-height:150px;overflow-y:auto;word-break:break-all;margin-top:8px;line-height:1.5}
#imgViewMod{background:rgba(0,0,0,0.95);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;touch-action:none}
#imgViewMod.show{display:flex!important}
#imgViewSrc{max-width:90%;max-height:calc(100dvh - 140px);object-fit:contain;margin-bottom:20px}
.modal-bottom-close-container{width:100%;display:flex;justify-content:center;position:absolute;bottom:0;left:0;padding:16px 0 calc(16px + var(--safe));background:linear-gradient(to top,rgba(0,0,0,0.8) 40%,rgba(0,0,0,0));backdrop-filter:blur(2px);z-index:10001}
.modal-bottom-close{width:auto;min-width:160px;padding:12px 24px;background:var(--ro);color:#fff;border-radius:24px;font-weight:bold;font-size:13.5px;text-align:center;border:none;box-shadow:0 4px 12px rgba(244,63,94,0.4);cursor:pointer}
#floatingPlayer{display:none;position:absolute;z-index:9999;background:#0d1117;border:1px solid var(--bd);border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,0.6);width:320px;flex-direction:column;overflow:hidden;touch-action:none}
#playerDragHeader{cursor:move;background:var(--sf);padding:8px 10px;font-size:11.5px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);user-select:none}
#playerContent{width:100%;aspect-ratio:16/9;background:#000;display:flex;justify-content:center;align-items:center;position:relative}
.clrpick-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.clrc2{aspect-ratio:1;width:100%;max-width:24px;border-radius:50%;margin:0 auto;border:2px solid transparent;cursor:pointer;transition:transform 0.15s,border-color 0.15s}
.clrc2.sel{border-color:var(--tx)!important;transform:scale(1.3);box-shadow:0 0 8px rgba(255,255,255,0.45);border-width:2px!important}
</style>

<!-- =========================================================
   【超高速プレ・ロック処理】
   ブラウザがbodyをレンダリングし始める前に「再入室対象」かを100%同期検証。
   document.writeを使用して即座にスタイルを流し込み、一切の画面のチラつきを防ぎます。
   ========================================================= -->
<script>
(function() {
  try {
    const isJoined = localStorage.getItem("nz_is_joined") === "true";
    const ni = localStorage.getItem("nz_ni");
    const tripi = localStorage.getItem("nz_tripi");
    const color = localStorage.getItem("nz_color") || "#94a3b8";
    
    // カラー設定を入室前の初期描画から即時適用
    document.documentElement.style.setProperty("--usr-color", color);
    
    if (isJoined && ni && tripi) {
      document.write('<style>#joinForm { display: none !important; } #ib { display: flex !important; } #exBtn { display: block !important; }</style>');
    } else {
      document.write('<style>#joinForm { display: flex !important; } #ib { display: none !important; } #exBtn { display: none !important; }</style>');
    }
  } catch(e) {}
})();
</script>
</head>
<body>

<div id="app">
  <div id="cp">
    <!-- ヘッダー -->
    <div id="hdr">
      <div class="hr">
        <div style="display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1;">
          <div style="display: flex; align-items: center;">
            <span class="rn">⚡ NEZU OFFICIAL CHAT</span>
            <span class="pcnt" id="pcnt">--人</span>
          </div>
        </div>
        <div class="hbs">
          <button class="bclr" id="clrBtn" title="色設定"><span class="bclr-dot" id="clrDot"></span> 色設定</button>
          <button id="adminClearBtn" class="bq" style="display: none; background: rgba(244,63,94,0.1); border-color: rgba(244,63,94,0.3); color: #fda4af; font-weight: bold; padding: 6px 14px; height: 38px; border-radius: 6px; font-size: 12px;" title="システムログや過去ログを含む全消去">⚠️ 全消去</button>
          <button class="bx" id="exBtn" style="display: none;" title="退室">退室</button>
        </div>
      </div>
    </div>

    <!-- 参加者リスト -->
    <div id="pl"></div>

    <!-- タイムライン -->
    <div id="tl" role="log" aria-live="polite">
      <div id="tl-inner"></div>
    </div>

    <!-- ゲスト閲覧用参加フォーム -->
    <div id="joinForm">
      <div style="font-size: 11px; color: var(--mu); font-weight: bold; text-align: center;">💬 表示名と本人証明キーを入力してチャットに参加</div>
      <div class="jrow">
        <input type="text" id="ni" class="inp" placeholder="名前 (10文字まで)" maxlength="10" autocomplete="off">
        <input type="text" id="tripi" class="inp" placeholder="トリップキー (必須)" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
        <button class="btn bp" id="joinBtn" style="height: 38px; padding: 0 16px;">参加する</button>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2px; width: 100%; gap: 8px;">
        <span id="tripPrevText" style="font-size: 11px; font-weight: bold; color: var(--usr-color); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;">プレビュー: 名無し</span>
        <button id="copyTripBtn" class="btn bq" style="height: 24px; padding: 0 8px; font-size: 10px; border-radius: 4px; display: none; align-items: center; justify-content: center; font-weight: bold; border-color: rgba(255,255,255,0.1); flex-shrink: 0;" title="トリップをクリップボードにコピー">トリップをコピー</button>
      </div>
    </div>

    <!-- 発言用入力バー -->
    <div id="ib">
      <div id="ibTopBar">
        <button id="kbToggleBtn" class="switch-kb ib-icon-btn" title="送信後のキーボード設定">
          <span id="kbStatusText" class="switch-text">キーボード:閉</span>
        </button>
        <button id="autoScrollToggleBtn" class="switch-scroll ib-icon-btn active" title="新着メッセージへの自動追従">
          <span id="autoScrollStatusText" class="switch-text">追従:ON</span>
        </button>
        <div class="jump-btns">
          <button class="jump-btn" id="jumpUpBtn" title="タイムラインの最上部へ" disabled>▲</button>
          <button class="jump-btn" id="jumpDownBtn" title="タイムラインの最下部へ" disabled>▼</button>
        </div>
      </div>

      <div id="ibToolbar">
        <input type="file" id="fileInput" accept="image/jpeg, image/png, image/gif, image/webp" style="display:none;">
        <div class="mi-container">
          <button class="battach" id="imgBtn" aria-label="画像添付" title="画像添付">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
          </button>
          <textarea id="mi" rows="1" placeholder="メッセージを入力..." maxlength="4000"></textarea>
          <button class="bclrm" id="clrMsgBtn" title="クリア">×</button>
        </div>
        <button class="bsd" id="sdBtn" aria-label="送信">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<div id="toastContainer" style="display:none;"></div>

<!-- 発言削除確認モーダル -->
<div id="delConfirmMod" class="mod-overlay">
  <div class="gc" style="max-width:320px;">
    <h3 style="font-size:13px; color:var(--ro);">⚠️ 発言の削除確認</h3>
    <div style="font-size:10px; color:var(--mu);">以下の発言を完全に消去しますか？（復元できません）</div>
    <div id="delConfirmPreview" class="del-modal-text"></div>
    <div class="wait-btns" style="display:flex; justify-content:space-between; gap:8px; margin-top:12px; width:100%;">
      <button class="btn bp" id="delExecuteBtn" style="width:100%; background:var(--ro); border:1px solid rgba(244, 63, 94, 0.4); color:#fda4af;">完全に削除</button>
      <button class="btn bq" id="delCancelBtn" style="width:100%;">戻る</button>
    </div>
  </div>
</div>

<!-- 色設定モーダル -->
<div id="clrmod" class="mod-overlay">
  <div class="clrmc gc" style="max-width:320px;">
    <h3 style="font-size:13px; color:var(--tx); border-bottom:1px solid var(--bd); padding-bottom:6px; font-weight:bold;">🎨 色設定</h3>
    <div id="clrPrev" class="clr-prev" style="margin:8px 0; min-height:48px;"></div>
    <div class="clrbox" style="margin-bottom:10px;">
      <div class="clrpick-grid" id="clrPick2"></div>
    </div>
    <div class="clr-btns">
      <button class="clr-cancel" id="clrCancel">キャンセル</button>
      <button class="clr-ok" id="clrOk">適用</button>
    </div>
  </div>
</div>

<!-- 画像ズームモーダル -->
<div id="imgViewMod" class="mod-overlay">
  <img id="imgViewSrc" alt="拡大画像">
  <div class="modal-bottom-close-container">
    <button class="modal-bottom-close" id="imgViewCloseBtn">閉じる</button>
  </div>
</div>

<!-- フローティング動画プレイヤー本体 -->

  <div id="playerDragHeader">

/* =========================================================
   安全なBase62 6文字ハッシュトリップアルゴリズム
   ========================================================= */
const quickHashBase62 = (str) => {
  let h1 = 0x811c9dc5;
  let h2 = 0xcbf29ce4;
  const len = str.length;
  for (let i = 0; i < len; i++) {
    const c = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 0x01000193);
    h2 = Math.imul(h2 ^ c, 0x01000193);
  }
  
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let val = ((h1 >>> 0) ^ (h2 >>> 0)) >>> 0;
  let res = "";
  for (let i = 0; i < 6; i++) {
    res += chars[val % 62];
    val = Math.floor(val / 62);
  }
  return res;
};

const makeTrip = (name, tripKey) => {
  if (!tripKey) return "";
  const revKey = tripKey.split("").reverse().join("");
  const mixed = SYSTEM_SALT + "_" + name + "_[SALT]_" + revKey;
  return "◆" + quickHashBase62(mixed);
};

// 最軽量・超高速日付文字列フォーマッタ（サーバー同期時刻を基準にフォールバック）
const fDT = ts => {
  const actualTs = (typeof ts === "number" && ts > 0) ? ts : getTrueTime();
  const d = new Date(actualTs);
  const mo = ("0" + (d.getMonth() + 1)).slice(-2);
  const dy = ("0" + d.getDate()).slice(-2);
  const h = ("0" + d.getHours()).slice(-2);
  const mi = ("0" + d.getMinutes()).slice(-2);
  const s = ("0" + d.getSeconds()).slice(-2);
  return `${d.getFullYear()}/${mo}/${dy} ${h}:${mi}:${s}`;
};

const escapeSelector = (val) => {
  if (typeof CSS !== "undefined" && CSS.escape) return CSS.escape(val);
  return val.replace(/([!"#$%&'()*+,.\/:;<=>?@\[\\\]^`{|}~])/g, "\\$1");
};

/* =========================================================
   30分自律自動退室タイマー制御 (時計のゆらぎ・スリープ復帰補正)
   ========================================================= */
function checkActivityTimeout() {
  if (!isJoined) return false;
  const lastActive = parseInt(safeLS.get("nz_last_active_time") || "0");
  if (!lastActive) return false;

  const trueTime = getTrueTime();
  
  // serverTimeOffsetが0（未接続）の状態やスリープ復帰時の極端な時間ズレによる「入力バー消失バグ」を完全ガード
  if (serverTimeOffset === 0 && Math.abs(trueTime - Date.now()) > 5000) return false;
  if (Math.abs(trueTime - Date.now()) > 24 * 60 * 60 * 1000) return false;

  const elapsed = trueTime - lastActive;
  
  if (elapsed < 0) {
    safeLS.set("nz_last_active_time", trueTime.toString());
    return false;
  }

  if (elapsed >= 30 * 60 * 1000) {
    stopAutoExitTimer();
    doExit(true); 
    return true;
  }
  return false;
}

function startAutoExitChecker() {
  if (autoExitTimer) clearInterval(autoExitTimer);
  if (!isJoined) return;

  if (checkActivityTimeout()) return;

  autoExitTimer = setInterval(() => {
    checkActivityTimeout();
  }, 10000);
}

function stopAutoExitTimer() {
  if (autoExitTimer) {
    clearInterval(autoExitTimer);
    autoExitTimer = null;
  }
}

/* =========================================================
   閲覧 / 参加 状態遷移 (オンデマンド認証化)
   ========================================================= */
async function joinRoom(isReconnect = false) {
  let n = "";
  let tk = "";
  
  if (isReconnect) {
    n = safeLS.get("nz_ni") || "";
    tk = safeLS.get("nz_tripi") || "";
  } else {
    n = D.ni.value.trim();
    tk = D.tripi.value.trim();
  }

  if (!n || !tk) { 
    if (!isReconnect) {
      alert("名前とトリップキーを入力してください。");
    }
    return; 
  }

  // 参加ボタンのローディングテキスト（再接続時はチラつきと無駄なDOM更新を防ぐためスキップ）
  if (!isReconnect) {
    D.joinBtn.disabled = true;
    D.joinBtn.textContent = "接続中...";
  }

  // 1. ローカル環境（file://）でのモック処理
  if (isLocalFileEnv) {
    if (n === "ねづお" && makeTrip(n, tk) === "◆JoNrMB") {
      myUid = "J64MocsPo0QD7hSwZpQgEeDdO6X2"; // ねづおさんの場合は管理権限鍵をセット
    } else {
      myUid = safeLS.get("nz_local_uid") || "local_" + Math.random().toString(36).slice(2, 10);
      safeLS.set("nz_local_uid", myUid);
    }
  } 
  // 2. 本番環境（http/https）かつUIDが未設定の場合
  else if (!myUid) {
    try {
      // 直接ログインを最速で試みる（待機時間をゼロにするため）
      const userCredential = await signInAnonymously(auth);
      myUid = userCredential.user.uid;
    } catch (err) {
      console.warn("直接の匿名サインインに失敗したため、接続待機ループを開始します:", err);
      // 直接ログインに失敗した場合のみ、バックグラウンド接続を監視する
      let waitCount = 0;
      while (!myUid && waitCount < 30) {
        await new Promise(r => setTimeout(r, 100));
        waitCount++;
      }
    }

    if (!myUid) {
      alert("Firebase認証接続に失敗しました。\n接続状態、またはFirebaseコンソールのAuthentication設定（匿名認証）をご確認ください。");
      D.joinBtn.disabled = false;
      D.joinBtn.textContent = "参加する";
      return;
    }
  }

  myName = n;
  myTrip = makeTrip(n, tk);
  isJoined = true;

  safeLS.set("nz_ni", n);
  safeLS.set("nz_tripi", tk);
  safeLS.set("nz_is_joined", "true");

  if (!isReconnect) {
    safeLS.set("nz_last_active_time", getTrueTime().toString());
  }

  const myPresRef = ref(db, `presence/official/${myUid}`);
  
  await set(myPresRef, {
    n: myName,
    p: myTrip,
    c: curColor,
    t: serverTimestamp()
  }).catch(err => {
    alert("入室エラー（接続拒否されました）:\n" + err.message + "\n\n※Firebaseのセキュリティルール設定が正しく公開されているかご確認ください。");
    D.joinBtn.disabled = false;
    D.joinBtn.textContent = "参加する";
    throw err;
  });

  D.joinForm.style.setProperty("display", "none", "important");
  D.ib.style.setProperty("display", "flex", "important");
  D.exBtn.style.setProperty("display", "block", "important");

  updateAdminUI(); 
  startAutoExitChecker();

  if (!isReconnect) {
    await push(ref(db, "chat/official"), {
      sys: true,
      m: `${myName} ${myTrip}`.trim() + " が入室しました",
      t: serverTimestamp()
    }).catch(err => {
      console.warn("入室アナウンスの送信に失敗しました（権限制限など）:", err.message);
    });
  }
  
  // ボタン状態を綺麗に初期化
  if (!isReconnect) {
    D.joinBtn.disabled = false;
    D.joinBtn.textContent = "参加する";
  }

  scBottom(true);
}

async function doExit(isAuto = false) {
  if (!isJoined) return;
  isJoined = false;
  stopAutoExitTimer();

  safeLS.remove("nz_is_joined");
  safeLS.remove("nz_last_active_time");

  const myPresRef = ref(db, `presence/official/${myUid}`);
  await remove(myPresRef).catch(() => {});

  D.joinForm.style.setProperty("display", "flex", "important");
  D.ib.style.setProperty("display", "none", "important");
  D.exBtn.style.setProperty("display", "none", "important");
  
  updateAdminUI(); 

  if (isAuto) {
    const lastActive = parseInt(safeLS.get("nz_last_active_time") || getTrueTime().toString());
    const exitTime = lastActive + 30 * 60 * 1000;
    await push(ref(db, "chat/official"), {
      sys: true,
      m: `${myName} ${myTrip}`.trim() + " が退室しました (自動退室)",
      t: exitTime
    }).catch(() => {});
  } else {
    await push(ref(db, "chat/official"), {
      sys: true,
      m: `${myName} ${myTrip}`.trim() + " が退室しました",
      t: serverTimestamp()
    }).catch(() => {});
  }
}

/* =========================================================
   メッセージ送信 (即反映対応)
   ========================================================= */
const pendingMsgs = new Map(); // id -> msgObj

async function sendMsg(overrideText = null, imgData = null) {
  if (!isJoined) return;

  const txt = overrideText !== null ? overrideText : D.mi.value.trim();
  if (!txt && !imgData) return;
  
  const now = Date.now(); 
  if (now - lastSendTime < 350) return; 
  lastSendTime = now;
  
  D.mi.value = ""; 
  D.mi.style.height = "auto";
  
  if (!keepKbOpen) {
    D.mi.blur();
  } else {
    D.mi.focus();
  }

  const tempId = "pnd_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
  const tempObj = {
    id: tempId,
    u: myUid,
    n: myName,
    p: myTrip, // m.p の未定義バグを本人のトリップ(myTrip)へ安全に完全修正
    c: curColor,
    m: imgData ? "IMG::" + imgData : txt,
    t: getTrueTime()
  };

  // 保留リストにオブジェクトとして登録
  pendingMsgs.set(tempId, tempObj);

  // 送信した瞬間にローカルへ仮のDOMを即時反映（超高速体感）
  const tempEl = cMsg(tempObj);
  D.tli.appendChild(tempEl);
  scBottom(true);

  safeLS.set("nz_last_active_time", getTrueTime().toString());

  set(ref(db, `presence/official/${myUid}/t`), serverTimestamp()).catch(() => {});

  const pushData = { 
    u: myUid, 
    pnd: tempId, 
    n: myName,
    p: myTrip,
    c: curColor,
    m: imgData ? "IMG::" + imgData : txt, 
    t: serverTimestamp()
  };

  await push(ref(db, "chat/official"), pushData).catch((err) => {
    // 失敗した場合は即時追加された仮DOMを削除してpendingから除外
    const localEl = D.tli.querySelector(`.mw[data-mid="${escapeSelector(tempId)}"]`);
    if (localEl) localEl.remove();
    pendingMsgs.delete(tempId);
    alert("メッセージの送信に失敗しました:\n" + err.message + "\n\n※セキュリティルールによる書き込み制限、または接続エラーの可能性があります。");
  });
}

/* =========================================================

      delBtn.style.top = "50%";
      delBtn.style.transform = "translateY(-50%)";
      delBtn.textContent = "🗑 消去";
      delBtn.onclick = (e) => {
        e.stopPropagation();
        targetDelId = m.id;
        D.delConfirmPreview.textContent = m.m;
        D.delConfirmMod.classList.add("show");
      };
      sysDiv.appendChild(delBtn);
    }
    
    const sysTs = document.createElement("span");
    sysTs.className = "sys-ts";
    sysTs.textContent = `[${fDT(m.t)}]`;
    
    sysDiv.appendChild(sysTs);
    el.appendChild(sysDiv);
    return el;
  }

  const name = m.n || "名無し";
  const trip = m.p || "";
  const color = m.c || "#94a3b8";

  const mm = document.createElement("div");
  mm.className = "mm";
  mm.style.color = color;

  const nameSpan = document.createElement("span");
  nameSpan.style.fontWeight = "bold";
  nameSpan.textContent = name;
  mm.appendChild(nameSpan);

  if (trip) {
    const tripSpan = document.createElement("span");
    tripSpan.style.fontSize = "11px";
    tripSpan.style.marginLeft = "4px";
    tripSpan.textContent = trip;
    mm.appendChild(tripSpan);
  }

  const timeSpan = document.createElement("span");
  timeSpan.className = "ts";
  timeSpan.textContent = fDT(m.t);
  mm.appendChild(timeSpan);

  el.appendChild(mm);

  const mb = document.createElement("div");
  mb.className = "mb";
  mb.style.borderLeft = `2px solid ${color}`;
  mb.style.paddingLeft = "8px";

  if (m.m.startsWith("IMG::")) {
    const base64Img = m.m.substring(5);
    const img = document.createElement("img");
    img.className = "inline-img";
    img.src = base64Img;
    img.alt = "添付画像";
    img.onclick = () => {
      D.imgViewSrc.src = base64Img;
      resetZoom();
      D.imgViewMod.classList.add("show");
    };
    mb.appendChild(img);
  } else {
    const parsedNodes = parseTxtSplit(m.m);
    const pLen = parsedNodes.length;
    for (let i = 0; i < pLen; i++) {
      mb.appendChild(parsedNodes[i]);
    }

    if (m.m.includes("http")) {
      const urls = m.m.match(UR);
      if (urls) {
        const uLen = urls.length;
        for (let i = 0; i < uLen; i++) {
          const mediaContainer = createMediaContainer(urls[i]);
          if (mediaContainer) mb.appendChild(mediaContainer);
        }
      }
    }
  }

  el.appendChild(mb);

  // 送信した本人、または管理者（未入室でも可）ならいつでも削除可能
  if (m.u === myUid || isAdmin()) {
    const delBtn = document.createElement("button");
    delBtn.className = "del-btn-inline";
    delBtn.textContent = "🗑 削除";
    delBtn.onclick = () => {
      targetDelId = m.id;
      D.delConfirmPreview.textContent = m.m.startsWith("IMG::") ? "[画像データ]" : m.m;
      D.delConfirmMod.classList.add("show");
    };
    el.appendChild(delBtn);
  }

  return el;
}

function scBottom(force = false) {
  if (!isAutoScroll && !force) return;
  if (_scPending) return;
  _scPending = true;
  requestAnimationFrame(() => {
    const tl = D.tl;
    if (tl) {
      tl.scrollTop = tl.scrollHeight; 
    }
    _scPending = false;
  });
}

function updateJumpBtns() {
  if (!D.tl) return;
  const isScrollable = D.tl.scrollHeight > D.tl.clientHeight;
  D.jumpUpBtn.disabled = !isScrollable;
  D.jumpDownBtn.disabled = !isScrollable;
}

/* =========================================================
   超高速テキスト解析ガード
   ========================================================= */
function parseTxtSplit(txt) {
  if (!txt.includes("http")) {
    return [document.createTextNode(txt)];
  }
  
  const norm = txt.replace(/[\u3000]/g, " ");
  const elements = [];
  let last = 0, m;
  UR.lastIndex = 0;

  while ((m = UR.exec(norm)) !== null) {
    if (m.index > last) {
      elements.push(document.createTextNode(norm.slice(last, m.index)));
    }
    const a = document.createElement("a");
    a.href = m[0];
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.style.color = "#60a5fa";
    a.style.textDecoration = "underline";
    a.textContent = m[0];
    elements.push(a);
    last = m.index + m[0].length;
  }
  if (last < norm.length) {
    elements.push(document.createTextNode(norm.slice(last)));
  }
  return elements;
}

/* =========================================================

function createMediaContainer(url) {
  const ytMatch = url.match(/(?:https?:\/\/)?(?:[a-zA-Z0-9-]+\.)?(?:youtube\.com\/(?:watch\?.*v=|embed\/|shorts\/|live\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/i);
  const nicoMatch = url.match(/(?:https?:\/\/)?(?:[a-zA-Z0-9-]+\.)?(?:nicovideo\.jp\/watch\/|nico\.ms\/)(sm[0-9]+|so[0-9]+|nm[0-9]+|[0-9]+)/i);
  if (!ytMatch && !nicoMatch) return null;

  const container = document.createElement("div");
  container.className = "media-link-container";
  const row = document.createElement("div");
  row.className = "media-inline-row";

  const badge = document.createElement("span");
  badge.className = "media-badge";
  let type = "";
  if (ytMatch) { type = "youtube"; badge.textContent = "YouTube"; badge.style.background = "#ef4444"; }
  else if (nicoMatch) { type = "niconico"; badge.textContent = "ニコニコ"; badge.style.background = "#2563eb"; }

  row.appendChild(badge);

  const playBtn = document.createElement("button");
  playBtn.className = "open-player-btn";
  playBtn.textContent = "▶ プレイヤーで再生";
  playBtn.onclick = (e) => {
    e.preventDefault();
    openFloatingPlayer(url, type);
  };
  row.appendChild(playBtn);
  container.appendChild(row);
  return container;
}

function openFloatingPlayer(url, type) {
  const plRect = D.pl.getBoundingClientRect();
  const appRect = document.getElementById("app").getBoundingClientRect();
  const topOffset = plRect.bottom - appRect.top;
  const leftOffset = Math.max(10, (appRect.width - 320) / 2);
  
  const playerNode = $("floatingPlayer");
  playerNode.style.top = `${topOffset}px`;
  playerNode.style.left = `${leftOffset}px`;
  playerNode.style.display = "flex";

  const contentNode = $("playerContent");
  contentNode.innerHTML = ""; 

  if (type === "youtube") {
    const ytMatch = url.match(/(?:https?:\/\/)?(?:[a-zA-Z0-9-]+\.)?(?:youtube\.com\/(?:watch\?.*v=|embed\/|shorts\/|live\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/i);
    if (ytMatch) {
      const iframe = document.createElement("iframe");
      iframe.src = `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1`;
      iframe.frameBorder = "0";
      iframe.allow = "autoplay; encrypted-media";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      contentNode.appendChild(iframe);
    }
  } else if (type === "niconico") {
    const nicoMatch = url.match(/(?:https?:\/\/)?(?:[a-zA-Z0-9-]+\.)?(?:nicovideo\.jp\/watch\/|nico\.ms\/)(sm[0-9]+|so[0-9]+|nm[0-9]+|[0-9]+)/i);
    if (nicoMatch) {
      const iframe = document.createElement("iframe");
      iframe.src = `https://embed.nicovideo.jp/watch/${nicoMatch[1]}?jsapi=1`;
      iframe.frameBorder = "0";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      contentNode.appendChild(iframe);
    }
  }
}

/* =========================================================
   画像ズーム・拡大
   ========================================================= */
const overlayEl = D.imgViewMod;
const imgEl = D.imgViewSrc;

function resetZoom() {
  scale = 1; panX = 0; panY = 0;
  imgEl.style.transformOrigin = "center center";
  updateTransform();
}
function updateTransform() { imgEl.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }
function clampPan() {
  if (scale <= 1) { panX = 0; panY = 0; return; }
  const cw = overlayEl.clientWidth, ch = overlayEl.clientHeight;
  const ir = imgEl.naturalWidth / imgEl.naturalHeight, cr = cw / ch;
  let iw, ih;
  if (ir > cr) { iw = cw; ih = cw / ir; } else { ih = ch; iw = ch * ir; }
  const currentWidth = iw * scale, currentHeight = ih * scale;
  let limitX = currentWidth > cw ? (currentWidth - cw) / 2 : 0;
  let limitY = currentHeight > ch ? (currentHeight - ch) / 2 : 0;
  panX = Math.max(-limitX, Math.min(limitX, panX));
  panY = Math.max(-limitY, Math.min(limitY, panY));
}
function getDistance(t1, t2) { return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY); }

overlayEl.addEventListener('touchstart', (e) => {
  if (e.target === D.imgViewCloseBtn) return;
  if (e.touches.length === 2) {
    isPanning = false; initialDistance = getDistance(e.touches[0], e.touches[1]);
  } else if (e.touches.length === 1 && scale > 1) {
    isPanning = true; lastPanX = e.touches[0].clientX; lastPanY = e.touches[0].clientY;
  }
}, { passive: true });

overlayEl.addEventListener('touchmove', (e) => {
  if (e.target === D.imgViewCloseBtn) return;
  if (e.touches.length === 2) {
    const dist = getDistance(e.touches[0], e.touches[1]);
    scale = Math.max(1, Math.min(5, scale * (dist / initialDistance)));
    initialDistance = dist;
    clampPan(); updateTransform();
  } else if (e.touches.length === 1 && isPanning) {
    panX += e.touches[0].clientX - lastPanX;
    panY += e.touches[0].clientY - lastPanY;
    lastPanX = e.touches[0].clientX;
    lastPanY = e.touches[0].clientY;
    clampPan(); updateTransform();
  }
}, { passive: true });

overlayEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  scale = Math.max(1, Math.min(5, scale * (e.deltaY > 0 ? 0.9 : 1.1)));
  clampPan(); updateTransform();
}, { passive: false });

/* =========================================================
   フローティングプレイヤーのドラッグ移動 (PCマウス & スマホタッチパネル対応)
   ========================================================= */
const makeElementDraggable = (headerEl, dragEl) => {
  let isDragging = false;
  let startX = 0, startY = 0;
  let elemStartX = 0, elemStartY = 0;

  const dragStart = (e) => {
    isDragging = true;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startX = clientX;
    startY = clientY;
    const rect = dragEl.getBoundingClientRect();
    elemStartX = rect.left;
    elemStartY = rect.top;
  };

  const dragMove = (e) => {
    if (!isDragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    dragEl.style.left = `${elemStartX + (clientX - startX)}px`;
    dragEl.style.top = `${elemStartY + (clientY - startY)}px`;
  };

  const dragEnd = () => {
    isDragging = false;
  };

  headerEl.addEventListener("mousedown", dragStart);
  document.addEventListener("mousemove", dragMove);
  document.addEventListener("mouseup", dragEnd);

  headerEl.addEventListener("touchstart", dragStart, { passive: true });
  document.addEventListener("touchmove", dragMove, { passive: true });
  document.addEventListener("touchend", dragEnd);
};

// =========================================================
// 起動・再接続 ライフサイクルマネージャー (FOUC・デッドロック・誤作動を完全抹殺)
// =========================================================
let listenersInitialized = false;
function setupFirebaseListeners() {
  if (listenersInitialized) return;
  listenersInitialized = true;

  // =========================================================
  // アクティブ発言の「onValue（一斉・最新30件完全同期）」リスナー
  // 他ブラウザでの「全消去」や「部分削除」を各端末のローカルキャッシュ（localStorage）へ確実に即時逆同期します
  // =========================================================
  const chatQuery = query(ref(db, "chat/official"), limitToLast(30)); 
  onValue(chatQuery, snap => {
    const serverMsgs = [];
    snap.forEach(child => {
      const m = child.val();
      if (m) {
        m.id = child.key;
        serverMsgs.push(m);
      }
    });

    // 1. サーバー上のデータと未解決のローカル送信待ち（pending）をマッチング解決
    serverMsgs.forEach(m => {
      if (m.pnd && pendingMsgs.has(m.pnd)) {
        pendingMsgs.delete(m.pnd);
      }
    });

    // 2. タイムラインDOMを一斉クリア＆完全再ビルド（全消去時はここが空になり瞬時にタイムラインから消滅します）
    D.tli.innerHTML = "";
    displayedMsgIds.clear();

    const fragment = document.createDocumentFragment();
    serverMsgs.forEach(m => {
      displayedMsgIds.add(m.id);
      fragment.appendChild(cMsg(m));
    });

    // まだサーバーから返ってきていない保留中のローカル発言（pending）があればオブジェクトから末尾に安全に動的生成して追加
    pendingMsgs.forEach(pMsgObj => {
      fragment.appendChild(cMsg(pMsgObj));
    });

    D.tli.appendChild(fragment);

    // 3. ローカルの過去ログキャッシュをサーバーの最新状態へ100%同期
    chatCache = serverMsgs;
    safeLS.set("nz_chat_cache", JSON.stringify(chatCache));

    scBottom();
  });

  // オンラインリスト（プレゼンス）監視
  onValue(ref(db, "presence/official"), s => {
    const list = s.val() || {};
    const members = [];
    const nowTrue = getTrueTime();

    const currentPresenceHash = Object.keys(list).sort().map(id => {
      const u = list[id];
      return `${id}:${u.n || ""}:${u.c || ""}:${u.t || 0}`;
    }).join("|");

    if (currentPresenceHash === lastPresenceHash) {
      return; 
    }
    lastPresenceHash = currentPresenceHash;

    for (const [id, u] of Object.entries(list)) {
      if (u && u.n) {
        let ut = u.t;
        if (ut && typeof ut === "object") {
          ut = nowTrue;
        }
        if (!ut || typeof ut !== "number") continue;

        if (nowTrue - ut > 30 * 60 * 1000) {
          if (id === myUid) continue; 
          if (cleaningUids.has(id)) continue;
          cleaningUids.add(id);

          const targetId = id;
          const targetUser = u;
          const pRef = ref(db, `presence/official/${targetId}`);

          runTransaction(pRef, (currentData) => {
            if (currentData === null) return currentData;
            return null;
          }).then((result) => {
            if (result.committed) {
              const exitTime = ut + 30 * 60 * 1000;
              push(ref(db, "chat/official"), {
                sys: true,
                m: `${targetUser.n} ${targetUser.p}`.trim() + " が退室しました (自動退室)",
                t: exitTime
              }).catch(() => {});
            }
            cleaningUids.delete(targetId);
          }).catch(() => {
            cleaningUids.delete(targetId);
          });
          continue;
        }
        members.push({ id, ...u, t: ut });
      }
    }

    const fragment = document.createDocumentFragment();
    const mLen = members.length;
    for (let i = 0; i < mLen; i++) {
      const m = members[i];
      const sp = document.createElement("span"); 
      sp.className = "chip";
      sp.style.color = m.c; sp.style.borderColor = m.c + "44";
      sp.textContent = m.n;
      sp.onclick = () => {
        if (m.id !== myUid && isJoined) {
          D.mi.value += `@${m.n} `;
          D.mi.focus();
        }
      };
      fragment.appendChild(sp);
    }
    
    D.pl.innerHTML = "";
    D.pl.appendChild(fragment);
    D.pcnt.textContent = `${mLen}人`;
  });
}

} else {
  // 2. 通常Web環境（http/https）の接続フロー
  // 接続無限フリーズ（広告ブロック等）を物理救済する4秒タイマー
  setTimeout(() => {
    if (!myUid) {
      console.warn("Firebase認証がタイムアウトしたため、ローカル臨時接続モードでボタンを解放します。");
      myUid = safeLS.get("nz_ni") === "ねづお" ? "J64MocsPo0QD7hSwZpQgEeDdO6X2" : (safeLS.get("nz_local_uid") || "local_tmout_" + Math.random().toString(36).slice(2, 10));
      safeLS.set("nz_local_uid", myUid);
      
      D.joinBtn.disabled = false;
      D.joinBtn.textContent = "参加する (臨時接続)";
      
      // タイムアウト救済時も最速で管理者状態を確認
      updateAdminUI();

      setupFirebaseListeners(); // 救済起動

      if (safeLS.get("nz_is_joined") === "true" && _initNi && _initTrip) {
        joinRoom(true);
      }
    }
  }, 4000);

  // ページ読み込み完了と同時に、最速でバックグラウンド接続を開始する
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      await signInAnonymously(auth).catch((err) => {
        console.error("匿名認証エラー:", err);
      });
      return;
    }
    
    myUid = user.uid;
    D.joinBtn.disabled = false;
    D.joinBtn.textContent = "参加する";

    // 認証が解決した瞬間に管理者UI（全消去ボタン）を最速でアンロック
    updateAdminUI();

    onValue(ref(db, ".info/serverTimeOffset"), (snap) => {
      serverTimeOffset = snap.val() || 0;
    });

    onValue(ref(db, ".info/connected"), (snap) => {
      if (snap.val() === true && isJoined && myUid) {
        set(ref(db, `presence/official/${myUid}/t`), serverTimestamp()).catch(() => {});
      }
    });

    setupFirebaseListeners(); // 接続完了時にリスナーを一斉起動

    if (safeLS.get("nz_is_joined") === "true" && _initNi && _initTrip) {
      joinRoom(true);
    }
  });
}

if (window.visualViewport) {
  const updateVh = () => {
    document.documentElement.style.setProperty("--app-viewport-height", `${window.visualViewport.height}px`);
    scBottom();
  };
  window.visualViewport.addEventListener("resize", updateVh);
  updateVh();
}
</script>
