<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>NEZU ONETIME CHAT - SECURE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
/* 共通リセット＆変数 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f172a;--sf:#1e293b;--s2:#0a1628;--bd:#334155;
  --tx:#f1f5f9;--mu:#94a3b8;--m2:#64748b;
  --in:#4f46e5;--i2:#4338ca;
  --em:#00ff66;--e2:#10b981;
  --ro:#f43f5e;--rg:rgba(244,63,94,.12);
  --safe:env(safe-area-inset-bottom,0px);
  --usr-color:#94a3b8;
}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
  touch-action:pan-y;overscroll-behavior:none;
}
input,textarea,select{font-family:inherit;font-size:16px!important;outline:none;}
button{cursor:pointer;font-family:inherit;border:none;background:none}
button:focus-visible{outline:2px solid var(--in);outline-offset:2px}

/* レイアウト・コンポーネント (旧デザイン踏襲しつつ最適化) */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .25s}
.spin{width:26px;height:26px;border:3px solid var(--in);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spt{font-size:10px;font-weight:800;color:var(--m2);letter-spacing:.2em}

#lobby{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding-bottom:80px;}
.lbo{min-height:100%;display:flex;flex-direction:column;padding:20px 14px calc(20px + var(--safe));gap:10px;justify-content:center;max-width:400px;margin:0 auto}
.lbt{font-size:16px;font-weight:900;color:#818cf8;text-align:center;letter-spacing:.05em;margin-bottom:4px}
.ibox{background:rgba(79,70,229,.04);border:1px solid rgba(99,102,241,.15);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--mu);line-height:1.5}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;font-weight:700;color:var(--mu)}
.inp{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:8px;color:var(--tx);font-size:13px}
.inp:focus{border-color:var(--in)}
.clrbox{background:var(--s2);padding:8px;border-radius:6px;border:1px solid var(--bd)}
.clrpick-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:6px}
.clrc{aspect-ratio:1;width:100%;max-width:24px;border-radius:50%;margin:0 auto;border:2px solid transparent;cursor:pointer}
.clrc.sel{border-color:var(--tx);transform:scale(1.15);box-shadow:0 0 6px rgba(255,255,255,0.2)}
.brow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.btn{padding:10px;border-radius:6px;font-size:12px;font-weight:700;text-align:center;transition:background .2s}
.btn:active{opacity:0.8}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.bq{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.bp{background:var(--in);color:#fff}
.bo{background:var(--e2);color:#fff}

#app{display:none;position:fixed;inset:0;flex-direction:column;overflow:hidden;z-index:50}
#app.visible{display:flex}
#hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 12px;flex-shrink:0}
.hr{display:flex;align-items:center;gap:8px;height:32px}
.rn{font-weight:800;font-size:14px;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcnt{font-size:11px;color:var(--mu);font-family:monospace}
.hbs{display:flex;gap:6px}
.hbs button{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--s2);border:1px solid var(--bd);color:var(--tx)}

#pl{display:flex;gap:6px;overflow-x:auto;padding-top:8px;scrollbar-width:none}
.chip{font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}

#tl{flex:1;overflow-y:auto;padding:12px 14px;background-color:#0d1117;scroll-behavior:smooth}
#tl-inner{display:flex;flex-direction:column;justify-content:flex-end;gap:12px;max-width:600px;margin:0 auto;min-height:100%}
.mw{display:flex;flex-direction:column;width:100%;animation:fadeIn 0.3s forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sm{align-self:center;font-size:10px;padding:4px 10px;border-radius:6px;text-align:center}
.sm-join{background:rgba(79,70,229,.1);color:#a5b4fc;border:1px solid rgba(79,70,229,.25)}
.sm-leave{background:rgba(148,163,184,.07);color:#94a3b8;border:1px solid rgba(148,163,184,.15)}
.mm{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:4px}
.ts{color:var(--m2);font-size:9px;margin-left:auto}
.mb{align-self:start;background:var(--sf);border-left:3px solid;border-radius:4px 12px 12px 12px;padding:10px 12px;font-size:14px;line-height:1.5;max-width:100%;word-break:break-all;white-space:pre-wrap}

#ib{display:flex;padding:10px 12px calc(10px + var(--safe));background:var(--sf);border-top:1px solid var(--bd);gap:8px}
.mi-container{flex:1;display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:20px;padding:6px 14px}
#mi{width:100%;background:none;border:none;color:var(--tx);resize:none;max-height:80px;line-height:1.4}
.bsd{width:36px;height:36px;border-radius:50%;background:var(--in);color:#fff;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="splash"><div class="spin"></div><div class="spt">NEZU CHAT SECURE</div></div>

<div id="lobby">
  <div class="lbo">
    <h2 class="lbt">⚡ NEZU CHAT (SECURE)</h2>
    <div class="ibox">
      🔒 <b>強化版セキュリティ空間</b><br>E2EE + HMAC署名 + 60秒切断猶予。<br>URLにパスワードを含める場合は #password 形式で共有されます。
    </div>
    
    <div class="fg">
      <label class="fl">表示名</label>
      <input type="text" id="ni" class="inp" placeholder="ニックネーム" maxlength="10">
    </div>

    <div class="clrbox">
      <div class="fl">カラー (24色)</div>
      <div class="clrpick-grid" id="lbClrPick"></div>
    </div>

    <div class="fg">
      <label class="fl">自動退室タイマー (1〜60分)</label>
      <input type="number" id="tmSel" class="inp" min="1" max="60" value="30">
    </div>

    <div class="fg">
      <label class="fl" style="display:flex; justify-content:space-between">
        <span>部屋ID</span>
        <span id="savedPassToggle" style="color:var(--in); cursor:pointer; text-decoration:underline;">記憶した部屋</span>
      </label>
      <input type="text" id="ri" class="inp" placeholder="部屋名">
    </div>
    <div class="fg">
      <label class="fl">パスワード (E2EE暗号鍵)</label>
      <input type="text" id="pi" class="inp" placeholder="共通パスワード">
    </div>

    <div class="brow">
      <button class="btn bp" id="enBtn" style="grid-column: span 2;">入室する</button>
      <button class="btn bq" id="gnBtn">ID/Pass生成</button>
      <button class="btn bq" id="lbCopyBtn">URLコピー</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="hdr">
    <div class="hr">
      <span class="rn" id="rdsp"></span>
      <span class="pcnt" id="pcnt"></span>
      <div class="hbs">
        <button id="rmCopyBtn">URLコピー</button>
        <button id="exBtn" style="color:#fda4af; border-color:rgba(244,63,94,.4)">退出</button>
      </div>
    </div>
    <div id="pl"></div>
  </div>
  <div id="tl"><div id="tl-inner"></div></div>
  <div id="ib">
    <div class="mi-container"><textarea id="mi" rows="1" placeholder="メッセージを入力..."></textarea></div>
    <button class="bsd" id="sdBtn">➤</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, set, update, remove, query, orderByChild, limitToLast, get, serverTimestamp, onChildAdded, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const firebaseConfig = {
  // ※実際のプロジェクト設定に置き換えてください
  apiKey: "AIzaSyCsRidc0smUQDaBwq-oki5NzxSHx6-ljiw",
  authDomain: "nezuochat.firebaseapp.com",
  databaseURL: "https://nezuochat-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nezuochat"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const $ = id => document.getElementById(id);

// 24色パレット (Tailwindベース)
const COLORS = [
  "#ef4444","#f97316","#f59e0b","#eab308","#84cc16","#22c55e",
  "#10b981","#14b8a6","#06b6d4","#0ea5e9","#3b82f6","#6366f1",
  "#8b5cf6","#a855f7","#d946ef","#ec4899","#f43f5e","#78716c",
  "#64748b","#71717a","#737373","#52525b","#3f3f46","#18181b"
];
let curColor = localStorage.getItem("nz_color") || "#6366f1";

// 暗号化・ハッシュロジック
let symKey = null; // E2EE用 AES鍵
let authKey = null; // HMAC用 署名鍵

// パスワードから2つの鍵を導出
const deriveKeys = (pass) => {
  symKey = CryptoJS.PBKDF2(pass, "NEZU_SALT", { keySize: 256/32, iterations: 2000 });
  authKey = CryptoJS.SHA256(pass + "_hmac").toString();
};

const enc = t => {
  if (!t || !symKey) return "";
  const iv = CryptoJS.lib.WordArray.random(16);
  const ct = CryptoJS.AES.encrypt(t, symKey, { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
  return iv.toString(CryptoJS.enc.Hex) + ":" + ct.toString();
};
const dec = c => {
  if (!c || !symKey) return null;
  try {
    const [h, ct] = c.split(":");
    const iv = CryptoJS.enc.Hex.parse(h);
    return CryptoJS.AES.decrypt(ct, symKey, { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }).toString(CryptoJS.enc.Utf8);
  } catch { return null; }
};
const signMsg = t => CryptoJS.HmacSHA256(t, authKey).toString();

// UI初期化
const initColorPicker = () => {
  const p = $("lbClrPick"); p.innerHTML = "";
  COLORS.forEach(c => {
    const b = document.createElement("button");
    b.className = "clrc" + (c === curColor ? " sel" : "");
    b.style.background = c; b.onclick = () => {
      curColor = c; localStorage.setItem("nz_color", c); initColorPicker();
    };
    p.appendChild(b);
  });
};
initColorPicker();

// パスワード記憶 (localStorage)
const savePassToMem = (r, p) => {
  let mem = JSON.parse(localStorage.getItem("nz_pass_mem") || "{}");
  mem[r] = p; localStorage.setItem("nz_pass_mem", JSON.stringify(mem));
};
$("savedPassToggle").onclick = () => {
  const mem = JSON.parse(localStorage.getItem("nz_pass_mem") || "{}");
  const keys = Object.keys(mem);
  if(keys.length === 0) { alert("記憶された部屋はありません"); return; }
  const sel = prompt("復元する部屋IDを入力してください:\n" + keys.join(", "));
  if(sel && mem[sel]) { $("ri").value = sel; $("pi").value = mem[sel]; }
};

// ハッシュ付きURLコピー (#でパスワードを渡すためサーバーには送信されない)
const copyUrl = () => {
  const r = $("ri").value || $("rdsp").textContent;
  const p = $("pi").value || curPassCache; // curPassCacheは入室時に保持
  const url = `${location.origin}${location.pathname}?r=${encodeURIComponent(r)}#${encodeURIComponent(p)}`;
  navigator.clipboard.writeText(url).then(() => alert("URLをコピーしました(パスワード含む)"));
};
$("lbCopyBtn").onclick = copyUrl;
$("rmCopyBtn").onclick = copyUrl;

// セッション管理
let myUid = null;
let curR = null, curN = null, curPassCache = null;
let _cOff = null, _pOff = null, _discRef = null;
let displayedMsgs = new Set();
let hbInterval = null;

// 接続・入室処理
async function joinRoom(room, pass, name) {
  curR = CryptoJS.SHA256(room).toString(); 
  curN = name; curPassCache = pass;
  deriveKeys(pass);

  // 1. プレゼンス情報の登録（切断時の60秒猶予を設定）
  const presRef = ref(db, `presence/${curR}/${myUid}`);
  await set(presRef, {
    nEnc: enc(name),
    cEnc: enc(curColor),
    joinedAt: serverTimestamp(),
    status: 'online'
  });
  
  // onDisconnectで即座に削除せず、切断時間を記録
  _discRef = onDisconnect(presRef);
  await _discRef.update({ status: 'offline', disconnectedAt: serverTimestamp() });

  // 2. 部屋メタデータの作成（なければ）
  const roomRef = ref(db, `rooms/${curR}`);
  const rSnap = await get(roomRef);
  if (!rSnap.exists()) {
    await set(roomRef, { created: serverTimestamp(), host: myUid, mode: 'open' });
  }

  // 3. 入室メッセージの送信
  await push(ref(db, `chat/${curR}`), {
    type: "sys", text: enc(`${name} が入室しました`), time: serverTimestamp(), sig: signMsg("sys")
  });

  savePassToMem(room, pass);
  $("lobby").style.display = "none";
  $("app").classList.add("visible");
  $("rdsp").textContent = room;
  $("mi").focus();

  startListeners();
  startHeartbeat();
}

function startListeners() {
  // メッセージのリスニング (最大80件制限)
  const q = query(ref(db, `chat/${curR}`), orderByChild("time"), limitToLast(80));
  _cOff = onChildAdded(q, snap => {
    const m = snap.val();
    if (displayedMsgs.has(snap.key)) return;
    displayedMsgs.add(snap.key);
    
    // HMAC署名の検証
    const expectedSig = signMsg(m.type === "sys" ? "sys" : "msg");
    if (m.sig && m.sig !== expectedSig) return; // 署名不一致は除外 (不正データ対策)

    const txt = dec(m.text); if(!txt) return;
    
    const d = document.createElement("div"); d.className = "mw";
    if(m.type === "sys"){
      d.innerHTML = `<div class="sm sm-join">${esc(txt)}</div>`;
    } else {
      const sN = dec(m.nEnc) || "???", sC = dec(m.cEnc) || "#94a3b8";
      d.innerHTML = `<div class="mm"><span style="color:${esc(sC)};font-weight:700">${esc(sN)}</span></div><div class="mb" style="border-color:${esc(sC)}">${esc(txt)}</div>`;
    }
    $("tl-inner").appendChild(d);
    $("tl").scrollTop = $("tl").scrollHeight;
  });

  // プレゼンスのリスニング
  _pOff = onValue(ref(db, `presence/${curR}`), s => {
    let cnt = 0; $("pl").innerHTML = "";
    s.forEach(u => {
      const data = u.val();
      // オフラインでも60秒間はリストに残す
      if (data.status === 'online' || data.disconnectedAt) {
        cnt++;
        const n = dec(data.nEnc) || "??";
        const sp = document.createElement("span"); sp.className = "chip"; sp.textContent = n;
        if(data.status === 'offline') sp.style.opacity = "0.5";
        $("pl").appendChild(sp);
      }
    });
    $("pcnt").textContent = `[${cnt}人]`;
  });
}

// 60秒猶予GC (ホストによるオフラインユーザー削除、0人でのWipe)
function startHeartbeat() {
  hbInterval = setInterval(async () => {
    if(!curR) return;
    const s = await get(ref(db, `presence/${curR}`));
    if(!s.exists()) return;
    
    let isAlive = false;
    let activeCnt = 0;
    
    // サーバー時間を推定して60秒経過したofflineユーザーをキック
    const now = Date.now();
    s.forEach(u => {
      const data = u.val();
      if(data.status === 'offline' && data.disconnectedAt) {
        // ※実際はserverTimeOffsetを利用しますが、ここでは簡易的にDate.now()と比較
        if(now - data.disconnectedAt > 60000) {
           remove(ref(db, `presence/${curR}/${u.key}`));
        } else {
           activeCnt++;
        }
      } else if (data.status === 'online') {
        activeCnt++;
        if(u.key === myUid) isAlive = true;
      }
    });

    if(!isAlive) return; // 自分がオフラインなら何もしない

    if(activeCnt === 0) {
      // 全員退出でWipe
      await remove(ref(db, `rooms/${curR}`));
      await remove(ref(db, `chat/${curR}`));
      await remove(ref(db, `presence/${curR}`));
    }
  }, 15000);
}

// 送信
$("sdBtn").onclick = async () => {
  const txt = $("mi").value.trim(); if(!txt || !curR) return;
  $("mi").value = "";
  await push(ref(db, `chat/${curR}`), {
    type: "msg", nEnc: enc(curN), cEnc: enc(curColor), text: enc(txt), time: serverTimestamp(), sig: signMsg("msg")
  });
};

const esc = t => (t||"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// 退出処理
$("exBtn").onclick = async () => {
  if(!curR) return;
  if(_discRef) _discRef.cancel(); // 切断予約を解除
  await push(ref(db, `chat/${curR}`), { type: "sys", text: enc(`${curN} が退室しました`), time: serverTimestamp(), sig: signMsg("sys") });
  await remove(ref(db, `presence/${curR}/${myUid}`));
  location.reload(); // 状態リセットのためリロード
};

$("enBtn").onclick = () => {
  const n = $("ni").value.trim(), r = $("ri").value.trim(), p = $("pi").value.trim();
  if(!n || !r || !p) return alert("必須項目を入力してください");
  localStorage.setItem("nz_ni", n);
  joinRoom(r, p, n);
};

$("gnBtn").onclick = () => {
  const c = "abcdefghijklmnopqrstuvwxyz0123456789";
  let r = "", p = "";
  for(let i=0; i<8; i++) r += c[Math.floor(Math.random()*c.length)];
  for(let i=0; i<12; i++) p += c[Math.floor(Math.random()*c.length)];
  $("ri").value = r; $("pi").value = p;
};

// 初期化
onAuthStateChanged(auth, user => {
  if (user) {
    myUid = user.uid;
    $("ni").value = localStorage.getItem("nz_ni") || "";
    $("splash").style.opacity = "0";
    setTimeout(() => { $("splash").style.display = "none"; $("lobby").style.display = "block"; }, 300);

    // URLハッシュから自動入室処理
    const sp = new URLSearchParams(location.search);
    const urlRoom = sp.get("r");
    const urlPass = location.hash.substring(1);
    if(urlRoom) {
      $("ri").value = urlRoom;
      if(urlPass) $("pi").value = urlPass;
    }
  } else {
    signInAnonymously(auth);
  }
});
</script>
</body>
</html>
