.inp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;color:var(--tx);outline:none;font-size:14px;transition:border-color 0.15s;height:42px}

.btn{padding:10px 8px;border-radius:8px;font-size:13.5px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s ease}

.del-modal-text{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:12px;font-size:13px;color:var(--tx);max-height:150px;overflow-y:auto;word-break:break-all;margin-top:8px;line-height:1.6}

#imgViewMod{background:rgba(0,0,0,0.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);flex-direction:column;align-items:center;justify-content:center;touch-action:none}

/* 拡大モーダル */
#zoomViewport {
  width: 100%;

<script>
window.SYSTEM_SALT = "NEZU_PRO_SYS_SALT_2026_V1";

window.sha256 = (s) => {
  const ascii = unescape(encodeURIComponent(s)); 
  const rightRotate = (value, amount) => (value >>> amount) | (value << (32 - amount));
  const mathPow = Math.pow;
  const maxWord = mathPow(2, 32);
  const lengthProperty = 'length';
  let i, j;
  let result = '';
  const words = [];
  const asciiBitLength = ascii[lengthProperty] * 8;
  
  const hash = [];
  const k = [];
  let primeCounter = 0;

  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) {
        isComposite[i] = candidate;
      }
      hash[primeCounter] = (mathPow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++] = (mathPow(candidate, 1 / 3) * maxWord) | 0;
    }
  }
  
  let paddedAscii = ascii + '\x80';
  while (paddedAscii[lengthProperty] % 64 - 56) paddedAscii += '\x00';
  for (i = 0; i < paddedAscii[lengthProperty]; i++) {
    j = paddedAscii.charCodeAt(i);
    if (j >> 8) return ""; 
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words[lengthProperty]] = ((asciiBitLength / maxWord) | 0);
  words[words[lengthProperty]] = (asciiBitLength | 0);
  
  for (j = 0; j < words[lengthProperty];) {
    const w = words.slice(j, j += 16);
    let oldHash = hash.slice(0, 8);
    
    for (i = 0; i < 64; i++) {
      const r1 = oldHash[0], r2 = oldHash[1], r3 = oldHash[2], r4 = oldHash[3],
            r5 = oldHash[4], r6 = oldHash[5], r7 = oldHash[6], r8 = oldHash[7];
            
      const temp1 = r8 + (rightRotate(r5, 6) ^ rightRotate(r5, 11) ^ rightRotate(r5, 25)) +
                  ((r5 & r6) ^ (~r5 & r7)) +
                  k[i] +
                  (w[i] = (i < 16) ? ~~w[i] : (
                      w[i - 16] +
                      (rightRotate(w[i - 15], 7) ^ rightRotate(w[i - 15], 18) ^ (w[i - 15] >>> 3)) +
                      w[i - 7] +
                      (rightRotate(w[i - 2], 17) ^ rightRotate(w[i - 2], 19) ^ (w[i - 2] >>> 10))
                  ) | 0);
                  
      const temp2 = (rightRotate(r1, 2) ^ rightRotate(r1, 13) ^ rightRotate(r1, 22)) +
                  ((r1 & r2) ^ (r1 & r3) ^ (r2 & r3));
      
      oldHash = [ (temp1 + temp2) | 0, r1, r2, r3, (r4 + temp1) | 0, r5, r6, r7 ];
    }
    
    for (i = 0; i < 8; i++) {
      hash[i] = (hash[i] + oldHash[i]) | 0;
    }
  }
  
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? '0' : '') + b.toString(16);
    }
  }
  return result;
};

window.makeTrip = (name, tripKey) => {
  if (!tripKey) return "";
  const revKey = tripKey.split("").reverse().join("");
  const mixed = window.SYSTEM_SALT + "_" + name + "_[SALT]_" + revKey;
  const hashHex = window.sha256(mixed);
  if (!hashHex) return "";

  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let res = "";
  for (let i = 0; i < 10; i++) {
    const sub = hashHex.substring(i * 6, i * 6 + 6);
    const val = parseInt(sub, 16);
    res += chars[val % 62];
  }
  return "◆" + res;
};

(function() {
  try {
    const isJoined = sessionStorage.getItem("nz_is_joined") === "true";
    const ni = localStorage.getItem("nz_ni");
    const tripi = localStorage.getItem("nz_tripi");
    const color = localStorage.getItem("nz_color") || "#94a3b8";
    document.documentElement.style.setProperty("--usr-color", color);
    
    const lastActiveStr = sessionStorage.getItem("nz_last_active_time");
    let isTimedOut = false;
    if (isJoined && lastActiveStr) {
      const lastActive = parseInt(lastActiveStr, 10);
      if (lastActive > 0 && (Date.now() - lastActive >= 30 * 60 * 1000)) {
        isTimedOut = true;
      }
    }

    if (isJoined && !isTimedOut && ni && tripi) {
      document.write('<style>#joinForm { display: none !important; } #ib { display: flex !important; } #exBtn { display: block !important; }</style>');
    } else {
      document.write('<style>#joinForm { display: flex !important; } #ib { display: none !important; } #exBtn { display: none !important; }</style>');
    }
  } catch(e) {}
})();
</script>

<body>

<div id="app">
  <div id="cp">
    <!-- ヘッダー -->
    <div id="hdr">
      <div class="hr">
        <div style="display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1;">
          <div style="display: flex; align-items: center;">
            <span class="rn">⚡ NEZU OFFICIAL CHAT</span>
            <span class="pcnt" id="pcnt">--人</span>
          </div>
        </div>
        <div class="hbs">
          <button id="adminClearBtn" class="bq" style="display: none; background: rgba(244,63,94,0.1); border-color: rgba(244,63,94,0.3); color: #fda4af; font-weight: bold; padding: 6px 14px; height: 38px; border-radius: 6px; font-size: 12px;" title="システムログや過去ログを含む全消去">⚠️ 全消去</button>
          <button class="bclr" id="clrBtn" title="色設定"><span class="bclr-dot" id="clrDot"></span> 色設定</button>
          <button class="bx" id="exBtn" style="display: none;" title="退室">退室</button>
        </div>
      </div>
    </div>

    <!-- 参加者リスト -->
    <div id="pl"></div>

    <!-- インライン動画プレイヤー (入室者リストの下に完全に固定) -->
    <div id="fixedPlayer">
      <div id="playerHeader">
        <span>📺 インライン再生プレイヤー</span>
        <button id="playerCloseBtn" style="background:none; border:none; color:var(--ro); font-weight:bold; cursor:pointer; padding:0 4px; font-size:14px;">×</button>
      </div>
      <div id="playerContent"></div>

/* =========================================================

function checkActivityTimeout() {
  if (!isJoined) return false;
  const lastActive = parseInt(safeSS.get("nz_last_active_time") || "0");
  if (!lastActive) return false;

  const trueTime = getTrueTime();
  const elapsed = trueTime - lastActive;
  
  if (elapsed < 0) {
    safeSS.set("nz_last_active_time", trueTime.toString());
    return false;
  }

  // 30分放置された場合に自動退室を実行
  if (elapsed >= 30 * 60 * 1000) {
    stopAutoExitTimer();
    doExit(true); 
    return true;
  }
  return false;
}

function startAutoExitChecker() {
  if (autoExitTimer) clearInterval(autoExitTimer);
  if (!isJoined) return;
  if (checkActivityTimeout()) return;
  autoExitTimer = setInterval(() => { checkActivityTimeout(); }, 10000);
}

function stopAutoExitTimer() {
  if (autoExitTimer) {
    clearInterval(autoExitTimer);
    autoExitTimer = null;
  }
}

/* =========================================================
   閲覧 / 参加 状態遷移 (遅延なし & 常に最新描写に連動)
   ========================================================= */
async function joinRoom(isReconnect = false) {
  let n = ""; let tk = "";
  if (isReconnect) {
    n = safeLS.get("nz_ni") || "";
    tk = safeLS.get("nz_tripi") || "";
  } else {
    n = D.ni.value.trim();
    tk = D.tripi.value.trim();
  }
  if (!n || !tk) { 
    if (!isReconnect) alert("名前とトリップキーを入力してください。");
    return; 
  }

  // 再接続時、30分以上が経過している場合は自動退室ログを確実に流してロビーに戻す
  if (isReconnect) {
    const lastActive = parseInt(safeSS.get("nz_last_active_time") || "0");
    const trueTime = getTrueTime();
    if (lastActive > 0 && (trueTime - lastActive >= 30 * 60 * 1000)) {
      isJoined = true;
      await doExit(true); // 退室お知らせログありで退室
      return;
    }
  }

  if (!isReconnect) {
    D.joinBtn.disabled = true;
    D.joinBtn.textContent = "接続中...";
  }

  myName = n;
  myTrip = window.makeTrip(n, tk);

  // 【0ms入室描画（楽観的即時アップデート）】
  isJoined = true;
  safeLS.set("nz_ni", n);
  safeLS.set("nz_tripi", tk);
  safeSS.set("nz_is_joined", "true");

  if (!isReconnect) {
    safeSS.set("nz_last_active_time", getTrueTime().toString());
  }

  D.joinForm.style.setProperty("display", "none", "important");
  D.ib.style.setProperty("display", "flex", "important");
  D.exBtn.style.setProperty("display", "block", "important");

  // 楽観的メンバーリスト仮追加
  const optimisticMembers = {};
  presenceCache.forEach(m => { optimisticMembers[m.id] = m; });
  optimisticMembers[myUid || "temp_uid"] = {
    id: myUid || "temp_uid",
    n: myName,
    p: myTrip,
    c: curColor,
    t: getTrueTime()
  };
  renderPresence(optimisticMembers);

  const myPresRef = ref(db, `presence/official/${myUid}`);
  
  // オンディスクネクト処理の設定 (Auth非依存の動作維持のため、失敗しても例外を無視して処理)
  try {
    await onDisconnect(myPresRef).cancel().catch(() => {});
    onDisconnect(myPresRef).remove();
    
    const disconnectChatRef = push(ref(db, "chat/official"));
    onDisconnect(disconnectChatRef).set({
      u: myUid,
      n: myName,
      p: myTrip,
      c: curColor,
      m: "[SYS]::" + `${myName} ${myTrip}`.trim() + " が退室しました (回線切断)",
      t: serverTimestamp()
    });
  } catch (e) {
    console.warn("onDisconnect登録エラー:", e);
  }

  await set(myPresRef, {
    n: myName,
    p: myTrip,
    c: curColor,
    t: serverTimestamp()
  }).catch(err => {
    alert("入室エラー:\n" + err.message + "\n※ローカル(file:)環境の場合、Firebaseルールをオープンにする必要があります。");
    if (!isReconnect) {
      D.joinBtn.disabled = false;
      D.joinBtn.textContent = "参加する";
    }
    throw err;
  });

  updateAdminUI(); 
  startAutoExitChecker();

  // 手動で入室ボタンを押した場合のみ入室ログを確実に送信
  if (!isReconnect) {
    const tempId = "pnd_sys_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
    const enterText = `${myName} ${myTrip}`.trim() + " が入室しました";
    const tempObj = {
      id: tempId,
      u: myUid,
      n: myName,
      p: myTrip,
      c: curColor,
      m: "[SYS]::" + enterText,
      t: getTrueTime()
    };
    pendingMsgs.set(tempId, tempObj);
    displayedMsgIds.add(tempId);
    const tempEl = cMsg(tempObj);
    D.tli.appendChild(tempEl);
    scBottom(true);

    await push(ref(db, "chat/official"), {
      u: myUid,
      pnd: tempId, 
      n: myName,
      p: myTrip,
      c: curColor,
      m: "[SYS]::" + enterText,
      t: serverTimestamp()
    }).catch((err) => {
      console.error("入室ログ送信失敗:", err);
      const el = D.tli.querySelector(`.mw[data-mid="${escapeSelector(tempId)}"]`);
      if (el) el.remove();
      pendingMsgs.delete(tempId);
      displayedMsgIds.delete(tempId);
    });
  }
  
  if (!isReconnect) {
    D.joinBtn.disabled = false;
    D.joinBtn.textContent = "参加する";
  }
  scBottom(true);
}

async function doExit(isAuto = false) {
  if (!isJoined) return;

  const cleanName = myName || safeLS.get("nz_ni") || "名無し";
  const tk = safeLS.get("nz_tripi") || "";
  const cleanTrip = myTrip || (tk ? window.makeTrip(cleanName, tk) : "");
  const cleanUid = myUid;
  const cleanColor = curColor;

  const logText = "[SYS]::" + `${cleanName} ${cleanTrip}`.trim() + (isAuto ? " が退室しました (自動退室)" : " が退室しました");
  const exitTime = isAuto ? (parseInt(safeSS.get("nz_last_active_time") || "0") + 30 * 60 * 1000) : serverTimestamp();

  // 1. 自身の画面に退室ログを楽観的に即時追加 (0ms描画)
  const tempId = "pnd_sys_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
  const tempObj = {
    id: tempId,
    u: cleanUid || "sys_exit",
    n: cleanName,
    p: cleanTrip,
    c: cleanColor,
    m: logText,
    t: getTrueTime()
  };
  pendingMsgs.set(tempId, tempObj);
  displayedMsgIds.add(tempId);
  const tempEl = cMsg(tempObj);
  D.tli.appendChild(tempEl);
  scBottom(true);

  // 2. データベースのオンラインリストから削除 & 退室ログを登録
  const promises = [];
  if (cleanUid) {
    const myPresRef = ref(db, `presence/official/${cleanUid}`);
    promises.push(
      onDisconnect(myPresRef).cancel()
        .then(() => remove(myPresRef))
        .catch(() => remove(myPresRef))
    );
  }
  
  promises.push(push(ref(db, "chat/official"), {
    u: cleanUid || "sys_exit",
    pnd: tempId, 
    n: cleanName,
    p: cleanTrip,
    c: cleanColor,
    m: logText,
    t: exitTime
  }));

  await Promise.all(promises).catch((err) => {
    console.error("退室データベース処理失敗:", err);
  });

  // 3. ローカルの参加状態を解除してロビーへ戻す
  isJoined = false;
  stopAutoExitTimer();

  safeSS.remove("nz_is_joined");
  safeSS.remove("nz_last_active_time");

  // オンラインリストの描画をリセット
  renderPresence({});

  // UIを完全にロビー状態へ切り替え
  D.joinForm.style.setProperty("display", "flex", "important");
  D.ib.style.setProperty("display", "none", "important");
  D.exBtn.style.setProperty("display", "none", "important");
  
  updateAdminUI(); 
}

/* =========================================================
   メッセージ送信（遅延なし・楽観型アップデート）
   ========================================================= */
const pendingMsgs = new Map();

async function sendMsg(overrideText = null, imgData = null) {
  if (!isJoined) return;
  const txt = overrideText !== null ? overrideText : D.mi.value.trim();
  if (!txt && !imgData) return;
  
  const now = Date.now(); 
  if (now - lastSendTime < 350) return; 
  lastSendTime = now;
  
  D.mi.value = ""; 
  D.mi.style.height = "auto";
  
  if (!keepKbOpen) {
    D.mi.blur();
  } else {
    D.mi.focus();
  }

  const tempId = "pnd_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
  const tempObj = {
    id: tempId,
    u: myUid,
    n: myName,
    p: myTrip,
    c: curColor,
    m: imgData ? "IMG::" + imgData : txt,
    t: getTrueTime()
  };

  // 楽観的アップデート
  pendingMsgs.set(tempId, tempObj);
  displayedMsgIds.add(tempId);

  const tempEl = cMsg(tempObj);
  tempEl.style.opacity = "0.7"; 
  D.tli.appendChild(tempEl);

function cMsg(m) {
  const el = document.createElement("div");
  el.className = "mw";
  el.dataset.mid = m.id;
  const msgTime = getMsgTime(m);
  el.dataset.ts = msgTime;

  const isSys = m.sys === true || (typeof m.m === "string" && m.m.startsWith("[SYS]::"));

  if (isSys) {
    const sysDiv = document.createElement("div");
    sysDiv.className = "sys-msg";
    
    let displayTxt = "";
    if (typeof m.m === "string") {
      displayTxt = m.m.startsWith("[SYS]::") ? m.m.substring(7) : m.m;
    }
    sysDiv.textContent = displayTxt;

    if (isAdmin()) {
      sysDiv.style.position = "relative";
      const delBtn = document.createElement("button");
      delBtn.className = "del-btn-inline";
      delBtn.style.top = "50%";
      delBtn.style.transform = "translateY(-50%)";
      delBtn.textContent = "🗑 消去";
      delBtn.onclick = (e) => {
        e.stopPropagation();
        targetDelId = m.id;
        D.delConfirmPreview.textContent = displayTxt;
        D.delConfirmMod.classList.add("show");
      };
      sysDiv.appendChild(delBtn);
    }
    const sysTs = document.createElement("span");
    sysTs.className = "sys-ts";
    sysTs.textContent = `[${fDT(msgTime)}]`;
    sysDiv.appendChild(sysTs);
    el.appendChild(sysDiv);
    return el;
  }

  const name = m.n || "名無し";
  const trip = m.p || "";
  const color = m.c || "#94a3b8";

  const mm = document.createElement("div");
  mm.className = "mm";
  mm.style.color = color;

  const nameSpan = document.createElement("span");
  nameSpan.style.fontWeight = "bold";
  nameSpan.textContent = name;
  mm.appendChild(nameSpan);

  if (trip) {
    const tripSpan = document.createElement("span");
    tripSpan.style.fontSize = "11px";
    tripSpan.style.marginLeft = "4px";
    tripSpan.textContent = trip;
    mm.appendChild(tripSpan);
  }

  const timeSpan = document.createElement("span");
  timeSpan.className = "ts";
  timeSpan.textContent = fDT(msgTime);
  mm.appendChild(timeSpan);

  el.appendChild(mm);

  const mb = document.createElement("div");
  mb.className = "mb";
  mb.style.borderLeft = `2px solid ${color}`;
  mb.style.paddingLeft = "8px";

  if (m.m.startsWith("IMG::")) {
    const base64Img = m.m.substring(5);
    const img = document.createElement("img");
    img.className = "inline-img";
    img.src = base64Img;
    img.onclick = () => {
      D.imgViewSrc.src = base64Img;
      resetZoom();
      D.imgViewMod.classList.add("show");
    };
    mb.appendChild(img);
  } else {
    const parsedNodes = parseTxtSplit(m.m);
    const pLen = parsedNodes.length;
    for (let i = 0; i < pLen; i++) mb.appendChild(parsedNodes[i]);

    if (m.m.includes("http")) {
      const urls = m.m.match(UR);
      if (urls) {
        const uLen = urls.length;
        for (let i = 0; i < uLen; i++) {
          const mediaContainer = createMediaContainer(urls[i]);
          if (mediaContainer) mb.appendChild(mediaContainer);
        }
      }
    }
  }

  el.appendChild(mb);

  if (m.u === myUid || isAdmin()) {
    const delBtn = document.createElement("button");
    delBtn.className = "del-btn-inline";
    delBtn.textContent = "🗑 削除";
    delBtn.onclick = () => {
      targetDelId = m.id;
      const isSys = m.sys === true || (typeof m.m === "string" && m.m.startsWith("[SYS]::"));
      let displayTxt = m.m;
      if (typeof m.m === "string" && m.m.startsWith("[SYS]::")) {
        displayTxt = m.m.substring(7);
      }
      D.delConfirmPreview.textContent = isSys ? displayTxt : (m.m.startsWith("IMG::") ? "[画像データ]" : m.m);
      D.delConfirmMod.classList.add("show");
    };
    el.appendChild(delBtn);
  }

  return el;
}

function scBottom(force = false) {

/* =========================================================
   タイムライン上下移動ボタン
   ========================================================= */
function updateJumpBtns() {
  if (!D.tl) return;
  const scrollTop = D.tl.scrollTop;
  const clientHeight = D.tl.clientHeight;
  const scrollHeight = D.tl.scrollHeight;
  const isScrollable = scrollHeight > clientHeight;

  if (!isScrollable) {
    D.jumpUpBtn.disabled = true;
    D.jumpDownBtn.disabled = true;
  } else {
    D.jumpUpBtn.disabled = (scrollTop <= 2);
    D.jumpDownBtn.disabled = (scrollTop + clientHeight >= scrollHeight - 2);
  }
}

D.tl.addEventListener("scroll", () => {
  const scrollTop = D.tl.scrollTop;
  const clientHeight = D.tl.clientHeight;
  const scrollHeight = D.tl.scrollHeight;

  const isNearBottom = scrollTop + clientHeight >= scrollHeight - 40;

  if (!_scPending) {
    if (isNearBottom) {
      isAutoScroll = true;
      if (unreadMsgIds.size > 0) {
        unreadMsgIds.clear(); 
        updateUnreadBadge();
      }
    } else {
      isAutoScroll = false;
    }
  }

  updateJumpBtns();
});

function parseTxtSplit(txt) {
  if (!txt.includes("http")) return [document.createTextNode(txt)];
  const norm = txt.replace(/[\u3000]/g, " ");
  const elements = [];
  let last = 0, m;
  UR.lastIndex = 0;
  while ((m = UR.exec(norm)) !== null) {
    if (m.index > last) elements.push(document.createTextNode(norm.slice(last, m.index)));
    const a = document.createElement("a");
    a.href = m[0]; a.target = "_blank"; a.rel = "noopener noreferrer";
    a.style.color = "#60a5fa"; a.style.textDecoration = "underline"; a.textContent = m[0];
    elements.push(a);
    last = m.index + m[0].length;
  }
  if (last < norm.length) elements.push(document.createTextNode(norm.slice(last)));
  return elements;
}

/* =========================================================
   YouTube / ニコニコ動画URLパース
   ========================================================= */
const getYoutubeId = (url) => {
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/|live\/)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
};

const getNicoId = (url) => {
  const regExp = /(?:nicovideo\.jp\/watch\/|nico\.ms\/|embed\.nicovideo\.jp\/watch\/)(sm[0-9]+|so[0-9]+|nm[0-9]+|[0-9]+)/i;
  const match = url.match(regExp);
  return match ? match[1] : null;
};

/* =========================================================
   インライン動画プレイヤー
   ========================================================= */
function createMediaContainer(url) {
  const ytId = getYoutubeId(url);
  const nicoId = getNicoId(url);
  if (!ytId && !nicoId) return null;

  const container = document.createElement("div");
  container.className = "media-link-container";
  const row = document.createElement("div");
  row.className = "media-inline-row";

  const badge = document.createElement("span");
  badge.className = "media-badge";
  let type = "";
  if (ytId) { type = "youtube"; badge.textContent = "YouTube"; badge.style.background = "#ef4444"; }
  else if (nicoId) { type = "niconico"; badge.textContent = "ニコニコ"; badge.style.background = "#2563eb"; }
  row.appendChild(badge);

  const playBtn = document.createElement("button");
  playBtn.className = "open-player-btn";
  playBtn.textContent = "▶ プレイヤーで再生";
  playBtn.onclick = (e) => {
    e.preventDefault();
    openFloatingPlayer(url, type);
  };
  row.appendChild(playBtn);
  container.appendChild(row);
  return container;
}

const closePlayer = () => {
  D.fixedPlayer.style.display = "none";
  D.playerContent.innerHTML = "";
  updateJumpBtns();
};

function openFloatingPlayer(url, type) {
  D.fixedPlayer.style.display = "flex";
  D.playerContent.innerHTML = ""; 

  if (type === "youtube") {
    const ytId = getYoutubeId(url);
    if (ytId) {
      const iframe = document.createElement("iframe");
      let originParam = "";
      if (window.location.protocol.startsWith("http")) {
        originParam = `&origin=${encodeURIComponent(window.location.origin)}`;
      }
      iframe.src = `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=0&enablejsapi=1${originParam}`;
      iframe.frameBorder = "0";
      iframe.allow = "autoplay; encrypted-media";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%"; iframe.style.height = "100%";
      D.playerContent.appendChild(iframe);
    }
  } else if (type === "niconico") {
    const nicoId = getNicoId(url);
    if (nicoId) {
      const iframe = document.createElement("iframe");
      iframe.src = `https://embed.nicovideo.jp/watch/${nicoId}?jsapi=1&autoplay=0&playerId=nezu_inline`;
      iframe.frameBorder = "0";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%"; iframe.style.height = "100%";
      D.playerContent.appendChild(iframe);
    }
  }
  scBottom();
  updateJumpBtns();
}

window.addEventListener("message", (e) => {
  if (typeof e.origin === "string" && (e.origin.includes("youtube.com") || e.origin.includes("youtube-nocookie.com"))) {
    try {
      const data = typeof e.data === "string" ? JSON.parse(e.data) : e.data;
      if (data) {
        if (data.event === "infoDelivery" && data.info && data.info.playerState === 0) closePlayer();
        if (data.event === "onStateChange" && (data.info === 0 || data.data === 0)) closePlayer();
      }
    } catch (err) {}
  }
  if (typeof e.origin === "string" && e.origin.includes("nicovideo.jp")) {
    try {
      if (e.data && e.data.eventName === "playerStatusChange" && e.data.data && e.data.data.playerStatus === 4) {
        closePlayer();
      }
    } catch (err) {}
  }
});

const overlayEl = $("zoomViewport"); const imgEl = D.imgViewSrc;
function resetZoom() { scale = 1; panX = 0; panY = 0; imgEl.style.transformOrigin = "center center"; updateTransform(); }
function updateTransform() { imgEl.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }
function clampPan() {
  if (scale <= 1) { panX = 0; panY = 0; return; }
  const cw = overlayEl.clientWidth, ch = overlayEl.clientHeight;
  const ir = imgEl.naturalWidth / imgEl.naturalHeight, cr = cw / ch;
  let iw, ih;
  if (ir > cr) { iw = cw; ih = cw / ir; } else { ih = ch; iw = ch * ir; }
  const currentWidth = iw * scale, currentHeight = ih * scale;
  let limitX = currentWidth > cw ? (currentWidth - cw) / 2 : 0;
  let limitY = currentHeight > ch ? (currentHeight - ch) / 2 : 0;
  panX = Math.max(-limitX, Math.min(limitX, panX)); panY = Math.max(-limitY, Math.min(limitY, panY));
}
function getDistance(t1, t2) { return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY); }

overlayEl.addEventListener('touchstart', (e) => {
  if (e.target === D.imgViewCloseBtn) return;
  if (e.touches.length === 2) { isPanning = false; initialDistance = getDistance(e.touches[0], e.touches[1]); }
  else if (e.touches.length === 1 && scale > 1) { isPanning = true; lastPanX = e.touches[0].clientX; lastPanY = e.touches[0].clientY; }
}, { passive: true });

overlayEl.addEventListener('touchmove', (e) => {
  if (e.target === D.imgViewCloseBtn) return;
  if (e.touches.length === 2) {
    const dist = getDistance(e.touches[0], e.touches[1]); scale = Math.max(1, Math.min(5, scale * (dist / initialDistance)));
    initialDistance = dist; clampPan(); updateTransform();
  } else if (e.touches.length === 1 && isPanning) {
    panX += e.touches[0].clientX - lastPanX; panY += e.touches[0].clientY - lastPanY;
    lastPanX = e.touches[0].clientX; lastPanY = e.touches[0].clientY; clampPan(); updateTransform();
  }
}, { passive: true });

overlayEl.addEventListener('wheel', (e) => {
  e.preventDefault(); scale = Math.max(1, Math.min(5, scale * (e.deltaY > 0 ? 0.9 : 1.1))); clampPan(); updateTransform();
}, { passive: false });

overlayEl.addEventListener("click", (e) => {
  if (e.target === overlayEl) {
    D.imgViewMod.classList.remove("show");
  }
});

D.imgViewCloseBtn.onclick = () => D.imgViewMod.classList.remove("show");

/* =========================================================
   オンラインリスト起動時描画
   ========================================================= */
loadPresenceCache(); 
updateAdminUI(); 
updateTripPreview(); 
updateKbButton(false);

/* =========================================================
   Firebaseリアルタイム同期 & 高速再接続マネジメント
   ========================================================= */
const boostSync = () => { 
  if (db) goOnline(db); 
  if (checkActivityTimeout()) return; 
  if (db) { 
    startAutoExitChecker(); 
  } 
};

document.addEventListener("visibilitychange", () => { 
  if (document.visibilityState === "visible") {
    boostSync(); 
  }
});

window.addEventListener("focus", boostSync); window.addEventListener("pageshow", boostSync);

let listenersInitialized = false;
function setupFirebaseListeners() {
  if (listenersInitialized) return;
  listenersInitialized = true;

  const chatQuery = query(ref(db, "chat/official"), limitToLast(100)); 
  onValue(chatQuery, snap => {
    const serverMsgs = [];
    let latestClearTs = 0; 

    snap.forEach(child => {
      const m = child.val(); 
      if (m) { 
        m.id = child.key; 
        
        const mTime = getMsgTime(m);
        const isSys = m.sys === true || (typeof m.m === "string" && m.m.startsWith("[SYS]::"));
        
        const isClearMsg = isSys && typeof m.m === "string" && m.m.includes("全消去されました") && typeof m.t === "number";
        if (isClearMsg) {
          if (mTime > latestClearTs) {
            latestClearTs = mTime;
          }
        }
        serverMsgs.push(m); 
      }
    });

    serverMsgs.forEach(m => {
      if (m.pnd) {
        if (pendingMsgs.has(m.pnd)) pendingMsgs.delete(m.pnd);
        displayedMsgIds.delete(m.pnd); 
        const tempEl = D.tli.querySelector(`.mw[data-mid="${escapeSelector(m.pnd)}"]`);
        if (tempEl) tempEl.remove(); 
      }
    });

    const serverMsgIds = new Set(serverMsgs.map(m => m.id));

    serverMsgs.forEach(m => {
      if (m.deleted) return;
      const existingEl = D.tli.querySelector(`.mw[data-mid="${escapeSelector(m.id)}"]`);
      if (existingEl) {
        const oldTs = parseInt(existingEl.dataset.ts || "0");
        if (m.t && typeof m.t === "number" && m.t !== oldTs) {
          existingEl.dataset.ts = m.t;
          const isSys = m.sys === true || (typeof m.m === "string" && m.m.startsWith("[SYS]::"));
          const tsSpan = existingEl.querySelector(".ts, .sys-ts");
          if (tsSpan) {
            tsSpan.textContent = isSys ? `[${fDT(m.t)}]` : fDT(m.t);
          }
        }
      }
    });

    let unreadChanged = false;
    const localMwEls = D.tli.querySelectorAll(".mw");
    localMwEls.forEach(el => {
      const mid = el.dataset.mid;
      const ts = parseInt(el.dataset.ts || "0");
      if (mid && !mid.startsWith("pnd_")) {
        const sMsg = serverMsgs.find(m => m.id === mid);
        
        const isDeletedOnServerMarker = sMsg && sMsg.deleted === true;
        const isNotExistent = !serverMsgIds.has(mid);
        const isOlderThanClear = latestClearTs > 0 && ts < latestClearTs;

        let shouldRemove = false;
        if (serverMsgs.length === 0) {
          shouldRemove = true;
        } else if (isDeletedOnServerMarker || isOlderThanClear) {
          shouldRemove = true;
        } else if (isNotExistent) {
          let minTs = Infinity;
          serverMsgs.forEach(sm => {
            const smTime = getMsgTime(sm);
            if (smTime < minTs) minTs = smTime;
          });
          
          if (ts >= minTs) {
            shouldRemove = true;
          }
        }

        if (shouldRemove) {
          el.remove();
          displayedMsgIds.delete(mid);

          if (unreadMsgIds.has(mid)) {
            unreadMsgIds.delete(mid);
            unreadChanged = true;
          }
        }
      }
    });

    let newlyAdded = false;

    serverMsgs.forEach(m => {
      if (m.deleted) return;
      const mTime = getMsgTime(m);
      if (latestClearTs > 0 && mTime < latestClearTs) return; 

      if (!displayedMsgIds.has(m.id)) {
        displayedMsgIds.add(m.id);
        newlyAdded = true;
        
        const newEl = cMsg(m);
        const sibling = Array.from(D.tli.children).find(el => {
          const ts = parseInt(el.dataset.ts || "0");
          return ts > mTime;
        });
        if (sibling) D.tli.insertBefore(newEl, sibling);
        else D.tli.appendChild(newEl);

        if (m.u !== myUid && !isAutoScroll) {
          unreadMsgIds.add(m.id);
          unreadChanged = true;
        }
      }
    });

    if (unreadChanged || newlyAdded) {
      updateUnreadBadge();
    }

    pendingMsgs.forEach((pMsgObj, tempId) => {
      let tempEl = D.tli.querySelector(`.mw[data-mid="${escapeSelector(tempId)}"]`);
      if (!tempEl) {
        tempEl = cMsg(pMsgObj);
        D.tli.appendChild(tempEl);
      }
    });

    scBottom();
    updateJumpBtns(); 
  }, (error) => {
    console.error("Firebaseデータ受信エラー:", error);
  });

  onValue(ref(db, "presence/official"), s => {
    const list = s.val() || {}; 
    const membersMap = {};
    const nowTrue = getTrueTime();

    for (const [id, u] of Object.entries(list)) {
      if (u && u.n) {
        let ut = u.t; 
        if (ut && typeof ut === "object") ut = nowTrue;
        if (!ut || typeof ut !== "number") continue;

        if (nowTrue - ut > 30 * 60 * 1000) {
          continue;
        }
        membersMap[id] = { id, ...u, t: ut };
      }
    }

    renderPresence(membersMap);
  });
}

// 初期起動の認証プロセス
const initAuthProcess = async () => {
  // Auth非依存：匿名認証がブロックされる極限環境用に、まず固有のセッション用ゲストUIDを発行
  if (!myUid) {
    myUid = safeSS.get("nz_session_uid") || "guest_" + Math.random().toString(36).slice(2, 10);
    safeSS.set("nz_session_uid", myUid);
  }

  try {
    if (!auth.currentUser) {
      const userCredential = await signInAnonymously(auth);
      myUid = userCredential.user.uid;
      safeSS.set("nz_session_uid", myUid);
    } else {
      myUid = auth.currentUser.uid;
    }
  } catch (err) {
    console.warn("匿名認証に失敗しました。ゲストUIDで処理を続行します:", err);
    // エラーが起きてもあらかじめ確保したゲストUIDを維持し、処理を止めずにデータベース同期を走らせます
  }

  D.joinBtn.disabled = false; 
  D.joinBtn.textContent = "参加する";
  
  updateAdminUI(); 
  setupFirebaseListeners();
  
  onValue(ref(db, ".info/serverTimeOffset"), (snap) => { serverTimeOffset = snap.val() || 0; });
  
  onValue(ref(db, ".info/connected"), (snap) => {
    if (snap.val() === true && isJoined && myUid) {
      const myPresRef = ref(db, `presence/official/${myUid}`);
      onDisconnect(myPresRef).cancel().then(() => {
        onDisconnect(myPresRef).remove();
        
        const disconnectChatRef = push(ref(db, "chat/official"));
        onDisconnect(disconnectChatRef).set({
          u: myUid,
          n: myName,
          p: myTrip,
          c: curColor,
          m: "[SYS]::" + `${myName} ${myTrip}`.trim() + " が退室しました (回線切断)",
          t: serverTimestamp()
        });
        
        set(myPresRef, {
          n: myName,
          p: myTrip,
          c: curColor,
          t: serverTimestamp()
        }).catch(() => {});
      }).catch(() => {});
    }
  });
  
  if (safeSS.get("nz_is_joined") === "true" && _initNi && _initTrip) joinRoom(true);
};

initAuthProcess();
