<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nezu Tube Chat - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --border: #222222;
        }
        html, body {
            height: 100dvh; width: 100vw; margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg); color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; user-select: none; position: fixed; inset: 0;
        }
        .select-text { -webkit-user-select: text; user-select: text; }
        
        #chatTimeline { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background-color: #050505; -webkit-overflow-scrolling: touch; }
        #chatTimeline::-webkit-scrollbar { width: 4px; }
        #chatTimeline::-webkit-scrollbar-thumb { background: #262626; border-radius: 9999px; }

        .fixed-viewport { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; height: 100dvh; }
        
        @supports (-webkit-touch-callout: none) {
            .fixed-viewport { height: -webkit-fill-available; }
        }

        /* アコーディオンの開閉アニメーション用 */
        #userListDropdown { max-height: 0px; transition: max-height 0.25s ease-out; overflow: hidden; }
        #userListDropdown.open { max-height: 160px; overflow-y: auto; }
    </style>
</head>
<body>

    <!-- 💻 メインアプリケーションコンテナ -->
    <div id="mainApp" class="fixed-viewport bg-black flex flex-col md:flex-row">
        
        <!-- 📺 左側パネル：動画プレイヤー ＆ メディアコントロール -->
        <div class="w-full md:w-[55%] flex flex-col bg-black border-b md:border-b-0 md:border-r border-neutral-900 shrink-0 max-h-[60vh] md:max-h-full min-h-0">
            
            <!-- 🎬 YouTubeプレイヤー本体 -->
            <div class="bg-black flex items-center justify-center relative aspect-video w-full min-h-0" id="ytPlayerContainer">
                <!-- 未入室時・未共有時のプレースホルダー -->
                <div id="ytPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-neutral-500 font-bold text-[11px] p-4 text-center bg-neutral-950 z-20">
                    <p class="text-indigo-500 tracking-wider text-xs mb-1">Nezu Tube Chat</p>
                    <p id="placeholderStatusText">右側のパネルから入室してください</p>
                </div>

                <!-- 🔔 ゲスト専用：同期確認オーバーレイ -->
                <div id="guestConfirmOverlay" class="absolute inset-0 bg-black/95 z-30 flex flex-col items-center justify-center p-4 text-center hidden">
                    <div class="max-w-xs bg-neutral-900 p-5 rounded-xl border border-neutral-800 space-y-4 shadow-2xl">
                        <span class="text-2xl animate-bounce inline-block">👑</span>
                        <h4 class="text-xs font-bold text-indigo-400" id="guestConfirmHostName">ホストが動画を開始しました</h4>
                        <p class="text-[10px] text-slate-300 leading-normal">同じ位置から同時視聴を開始するために、下記の承認ボタンを押してください。</p>
                        <div class="flex gap-2 pt-1">
                            <button id="guestConfirmDeclineBtn" class="flex-1 bg-neutral-800 hover:bg-neutral-700 text-slate-400 py-1.5 rounded text-xs font-bold transition">マイペースで見る</button>
                            <button id="guestConfirmAcceptBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-1.5 rounded text-xs font-bold transition shadow-lg shadow-indigo-600/20">同期を承認する</button>
                        </div>
                    </div>
                </div>

                <div class="w-full h-full">
                    <div id="ytPlayer" class="w-full h-full"></div>
                </div>
            </div>
            
            <!-- 🎛️ プレイヤーミニコントローラー -->
            <div id="ytEmbeddedControls" class="bg-neutral-950 p-2 flex flex-col gap-1.5 border-t border-neutral-900 text-xs shrink-0">
                <div class="flex items-center gap-2 w-full">
                    <button id="ytMiniPlayPauseBtn" class="font-bold text-slate-300 bg-neutral-900 px-2 py-0.5 rounded border border-neutral-800 min-w-[32px]" disabled>▶</button>
                    <span id="ytMiniTimeDisplay" class="font-mono text-slate-400">00:00</span>
                    <input type="range" id="ytMiniSlider" min="0" max="100" value="0" step="1" class="flex-1 h-1 bg-neutral-800 rounded appearance-none cursor-pointer accent-indigo-500" disabled>
                </div>
                <div class="flex items-center justify-between gap-2 w-full pt-0.5">
                    <div class="flex items-center gap-2">
                        <span id="ytBadge" class="border px-1.5 py-0.5 rounded text-[9px] font-bold text-neutral-400 border-neutral-800 bg-black">未入室</span>
                        <!-- 👑 ホスト専用：手動同期トリガーボタン -->
                        <button id="ytHostSyncTriggerBtn" class="bg-amber-600 hover:bg-amber-500 text-white font-bold text-[10px] px-2 py-0.5 rounded transition shadow hidden">📢 全員に強制同期</button>
                    </div>
                    <div class="flex items-center gap-1">
                        <button id="ytMiniMuteBtn" class="text-slate-400 px-1 text-xs" disabled>🔇</button>
                        <input type="range" id="ytMiniVolume" min="0" max="100" value="0" step="1" class="w-16 h-1 bg-neutral-800 rounded appearance-none cursor-pointer accent-emerald-500" disabled>
                    </div>
                </div>
            </div>

            <!-- 💬 チャット入力・URL共有エリア（入室前は完全非表示） -->
            <div id="inputAreaContainer" class="p-2 flex items-center gap-2 w-full bg-neutral-900 border-t border-neutral-800 shrink-0 hidden">
                <textarea id="mi" placeholder="メッセージを入力（動画URL共有でシアター同期）" rows="1" class="flex-1 px-3 py-1.5 border border-neutral-800 bg-black rounded-xl text-xs text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500 resize-none max-h-16 select-text" disabled></textarea>
                <button id="sendBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-xl transition shrink-0" disabled>
                    <svg class="w-4 h-4 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </button>
            </div>
        </div>

        <!-- 💬 右側パネル：ライブチャットタイムライン ＆ 接続管理 -->
        <div class="flex-1 flex flex-col bg-neutral-950 min-w-0 min-h-0 overflow-hidden relative">
            
            <!-- 🚪 インライン入室管理ヘッダー -->
            <div id="authHeaderBlock" class="p-2.5 bg-neutral-900 border-b border-neutral-800 flex flex-col gap-2 shrink-0">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2 min-w-0">
                        <span id="topLiveIndicator" class="w-1.5 h-1.5 bg-neutral-700 rounded-full shrink-0"></span>
                        
                        <!-- 👥 入室者表示ヘッダーボタン -->
                        <button id="toggleUserListBtn" class="flex items-center gap-1.5 bg-neutral-950 hover:bg-neutral-800 border border-neutral-800/80 px-2.5 py-1 rounded-md text-xs font-bold tracking-wider text-slate-300 transition select-none">
                            <span>ONLINE USERS :</span>
                            <span id="presenceCount" class="font-mono text-indigo-400">0</span>
                            <span class="text-[9px] text-neutral-500 ml-0.5">▼</span>
                        </button>
                    </div>
                    
                    <!-- 🚪 独立した退室ボタン -->
                    <button id="exitBtn" class="bg-red-950/40 text-red-400 hover:bg-red-900/60 font-bold text-[10px] px-2.5 py-1 rounded border border-red-900/60 hidden transition tracking-wide shadow-sm shrink-0">退室する</button>
                </div>

                <!-- 👥 折りたたみ式入室者一覧コンテナ -->
                <div id="userListDropdown" class="bg-black rounded border border-neutral-800/80 mx-0.5">
                    <div id="userListContent" class="p-1.5 flex flex-col gap-1 divide-y divide-neutral-900 text-[11px] font-mono">
                        <!-- スクリプトから動的に挿入 -->
                    </div>
                </div>

                <!-- トリップ対応型入室フォーム -->
                <div class="flex flex-col gap-1.5" id="loginFormContainer">
                    <div class="flex gap-1.5">
                        <input type="text" id="ni" placeholder="名前 (10文字以内)" class="flex-1 min-w-0 px-2 py-1 bg-black border border-neutral-800 rounded text-xs text-white focus:ring-1 focus:ring-indigo-500 select-text">
                        <input type="password" id="ki" placeholder="暗号 (任意)" class="w-24 px-2 py-1 bg-black border border-neutral-800 rounded text-xs text-white focus:ring-1 focus:ring-indigo-500 select-text">
                        <button id="enterBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-bold px-3 py-1 rounded transition shrink-0">入室</button>
                    </div>
                    <div class="text-[10px] text-neutral-400 px-1 truncate">
                        現在の設定プレビュー: <span id="tripPreview" class="text-indigo-400 font-mono">ゲスト</span>
                    </div>
                </div>
            </div>

            <!-- チャットメッセージ表示タイムライン -->
            <div id="chatTimeline" class="select-text flex-1 min-h-0"></div>

            <!-- 👑 同期ON/OFFステータス ＆ 特殊アクションフッター -->
            <div class="px-2.5 py-2 bg-neutral-900 border-t border-neutral-950 flex items-center justify-between text-xs shrink-0 select-none">
                <div class="flex items-center gap-2">
                    <span id="ytSyncStatusIndicator" class="px-2 py-0.5 rounded text-[10px] font-bold border border-neutral-800 bg-neutral-950 text-neutral-400 whitespace-nowrap">未接続</span>
                    <span id="ytSyncTimeDisplay" class="text-[10px] font-mono text-neutral-500 whitespace-nowrap">00:00 / 00:00</span>
                </div>
                <div class="flex gap-1.5 items-center">
                    <button id="ytClaimHostBtn" class="bg-amber-950/60 text-amber-400 border border-amber-900/80 px-2.5 py-0.5 rounded text-[10px] font-bold hover:bg-amber-900 transition hidden shadow-sm whitespace-nowrap">👑 ホストになる</button>
                    <button id="ytGuestModeBtn" class="px-2.5 py-0.5 rounded text-[10px] font-bold border border-neutral-700 transition hidden whitespace-nowrap"></button>
                </div>
            </div>

            <!-- ⌨️ スマートフォン用仮想キーボード強制トリガーボタン -->
            <div id="mobileKeyboardBlock" class="p-2 w-full bg-neutral-900 border-t border-neutral-800 shrink-0 md:hidden hidden">
                <button id="openKeyboardBtn" class="w-full bg-neutral-800 hover:bg-neutral-700 text-slate-300 font-bold py-2 rounded-xl text-xs transition flex items-center justify-center gap-1.5" disabled>
                    <span>⌨️</span> キーボードを開いて入力
                </button>
            </div>
        </div>
    </div>

    <!-- 💻 アプリケーションメインコアスクリプト -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove, query, orderByChild, onChildAdded, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const $ = id => document.getElementById(id);
        
        const DB_URL = "https://nezuochat-default-rtdb.asia-southeast1.firebasedatabase.app";
        const firebaseApp = initializeApp({ databaseURL: DB_URL });
        const db = getDatabase(firebaseApp);

        const ROOM_PATH = "one_global_room";
        const TRIP_SALT = "NezuTubeSecretSalt_2026"; 
        const INACTIVE_TIMEOUT = 30 * 60 * 1000; 

        let ytPlayer = null, isYtReady = false;
        let isUserDraggingSlider = false;
        let isComposing = false;
        let sliderIntervalId = null;
        let lastLoadedVideoId = null;
        let isLocalAction = false;
        let actionShieldTimeout = null;
        let lastActivityTime = Date.now(); 
        let timeoutCheckIntervalId = null;
        
        let amIOwner = false;            
        let isUserApprovedSync = false;  
        let isGuestFreeMode = false;     
        let globalVideoStateCache = null;
        let lastSavedStatus = "";
        let savedVolumeLevel = 0; // 初期ボリュームを0（消音標準）に設定
        let currentConnectionCount = 0;
        let hasJoined = false;

        window.__handOverHost = async function(targetUid, targetName) {
            if (!amIOwner || !globalVideoStateCache) return;
            if (confirm(`${targetName} にホスト権限(👑)を譲渡しますか？`)) {
                try {
                    activateShield(2000);
                    const videoStateRef = ref(db, `rooms/${ROOM_PATH}/videoState`);
                    await set(videoStateRef, {
                        ...globalVideoStateCache,
                        owner: targetUid,
                        ownerName: targetName,
                        timestamp: Date.now()
                    });
                    const chatRef = ref(db, `chat/${ROOM_PATH}`);
                    await push(chatRef, { type: "sys", text: `👑 ホスト権限が ${targetName} に譲渡されました`, time: Date.now(), fromUid: uid });
                    $("userListDropdown").classList.remove("open");
                } catch(e) { alert("権限の譲渡に失敗しました。"); }
            }
        };

        const activateShield = (duration = 800) => {
            isLocalAction = true;
            if (actionShieldTimeout) clearTimeout(actionShieldTimeout);
            actionShieldTimeout = setTimeout(() => { isLocalAction = false; }, duration);
        };

        const esc = t => (t || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
        const linkify = t => esc(t).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" class="text-indigo-400 hover:underline break-all">$1</a>');

        function generateTrip(key) {
            if (!key) return "";
            const combined = key + TRIP_SALT;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = (hash << 5) - hash + combined.charCodeAt(i);
                hash |= 0;
            }
            let trip = Math.abs(hash).toString(36).substring(0, 5);
            while (trip.length < 5) { trip += "X"; } 
            return " ◆" + trip;
        }

        function updateTripPreview() {
            if ($("loginFormContainer").classList.contains("hidden")) return;
            const name = $("ni").value.replace(/[\s\u3000]+/g, "").trim() || "ゲスト";
            const key = $("ki").value;
            const trip = generateTrip(key);
            $("tripPreview").innerText = name.slice(0, 10) + trip;
        }
        if ($("ni")) $("ni").oninput = updateTripPreview;
        if ($("ki")) $("ki").oninput = updateTripPreview;

        (() => {
            if (window.YT && window.YT.Player) { isYtReady = true; return; }
            window.onYouTubeIframeAPIReady = () => { isYtReady = true; };
            const t = document.createElement('script'); t.src = "https://www.youtube.com/iframe_api"; t.async = true;
            document.head.appendChild(t);
        })();

        function extractVideoId(url) {
            if(!url) return null;
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]{11}).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return "00:00";
            return `${Math.floor(seconds / 60).toString().padStart(2, "0")}:${Math.floor(seconds % 60).toString().padStart(2, "0")}`;
        }

        $("ytMiniVolume").oninput = () => {
            const vol = parseInt($("ytMiniVolume").value, 10);
            savedVolumeLevel = vol;
            $("ytMiniMuteBtn").innerText = vol === 0 ? "🔇" : vol < 50 ? "🔈" : "🔊";
            if (ytPlayer && typeof ytPlayer.setVolume === 'function') {
                if (vol === 0) ytPlayer.mute(); else { ytPlayer.unMute(); ytPlayer.setVolume(vol); }
            }
        };

        $("ytMiniMuteBtn").onclick = () => {
            if (ytPlayer && typeof ytPlayer.isMuted === 'function' && ytPlayer.isMuted()) {
                const targetVol = savedVolumeLevel > 0 ? savedVolumeLevel : 30;
                $("ytMiniVolume").value = targetVol; ytPlayer.unMute(); ytPlayer.setVolume(targetVol);
                $("ytMiniMuteBtn").innerText = targetVol < 50 ? "🔈" : "🔊";
                savedVolumeLevel = targetVol;
            } else if (ytPlayer && typeof ytPlayer.mute === 'function') {
                ytPlayer.mute(); $("ytMiniVolume").value = 0; $("ytMiniMuteBtn").innerText = "🔇";
            }
        };

        window.__loadSharedVideo = function(vId) {
            if (!vId || !hasJoined) return;
            setSharedVideoLive(vId);
        };

        // 🌟 URLを共有した時点の初期化
        async function setSharedVideoLive(vId) {
            amIOwner = true; isUserApprovedSync = true; isGuestFreeMode = false;
            activateShield(2000);
            lastSavedStatus = "paused";
            await set(ref(db, `rooms/${ROOM_PATH}/videoState`), {
                videoId: vId, status: "paused", currentTime: 0, timestamp: Date.now(), owner: uid, ownerName: curN
            });
            updateControlsUI();
        }

        async function checkAndCleanUpRoom() {
            try {
                const presenceRef = ref(db, `presence/${ROOM_PATH}`);
                await remove(ref(db, `presence/${ROOM_PATH}/${uid}`));
                const snap = await get(presenceRef);
                if (!snap.exists() || Object.keys(snap.val()).length === 0) {
                    await remove(ref(db, `chat/${ROOM_PATH}`));
                    await remove(ref(db, `rooms/${ROOM_PATH}`));
                }
            } catch (e) { console.error(e); }
        }

        async function leaveRoom(isAuto = false) {
            if (!hasJoined) return;
            if (sliderIntervalId) clearInterval(sliderIntervalId);
            if (timeoutCheckIntervalId) clearInterval(timeoutCheckIntervalId);
            
            const chatRef = ref(db, `chat/${ROOM_PATH}`);
            const textMsg = isAuto ? `自動退室しました（30分無発言）` : `退室しました`;
            
            try {
                await push(chatRef, { type: "sys", text: textMsg, time: Date.now(), fromUid: uid, fallbackName: curN });
                await checkAndCleanUpRoom();
            } catch(e){}
            window.location.reload();
        }

        $("toggleUserListBtn").onclick = (e) => {
            e.preventDefault();
            $("userListDropdown").classList.toggle("open");
        };

        let curN = ""; 
        const uid = (() => {
            let id = localStorage.getItem("or_uid");
            if (!id) { id = crypto.randomUUID(); localStorage.setItem("or_uid", id); }
            return id;
        })();

        // 🌟 プレイヤー構築コア関数
        function buildAndSyncPlayer(state, targetTime) {
            lastLoadedVideoId = state.videoId;
            if (ytPlayer) { try { ytPlayer.destroy(); } catch(e){} ytPlayer = null; }
            
            const buildPlayer = () => {
                if (!isYtReady || !window.YT?.Player) { setTimeout(buildPlayer, 50); return; }
                activateShield(2500);
                
                ytPlayer = new YT.Player('ytPlayer', {
                    videoId: state.videoId,
                    playerVars: { 
                        'autoplay': (state.status === "playing") ? 1 : 0, 
                        'playsinline': 1, 
                        'controls': 1, 
                        'rel': 0, 
                        'start': Math.max(0, Math.floor(targetTime)) 
                    },
                    events: {
                        'onReady': () => {
                            try {
                                if (savedVolumeLevel > 0) {
                                    ytPlayer.unMute();
                                    ytPlayer.setVolume(savedVolumeLevel);
                                } else {
                                    ytPlayer.mute();
                                    ytPlayer.setVolume(0);
                                }
                                
                                if (state.status === "playing" && (amIOwner || isUserApprovedSync)) {
                                    ytPlayer.playVideo();
                                    ytPlayer.seekTo(targetTime, true);
                                } else {
                                    ytPlayer.pauseVideo();
                                    ytPlayer.seekTo(targetTime, true);
                                }
                            } catch(e){ console.error("Player bootstrap error:", e); }
                            
                            $("ytMiniVolume").value = savedVolumeLevel;
                            $("ytMiniMuteBtn").innerText = savedVolumeLevel === 0 ? "🔇" : "🔊";
                        },
                        'onStateChange': onPlayerStateChange
                    }
                });
            };
            buildPlayer();
        }

        async function joinRoom(name, key = "") {
            if(hasJoined) return;
            hasJoined = true;
            
            const trip = generateTrip(key);
            curN = name + trip;
            
            localStorage.setItem("or_name", name);
            if (key) { localStorage.setItem("or_key", key); } else { localStorage.removeItem("or_key"); }

            const myRef = ref(db, `presence/${ROOM_PATH}/${uid}`);
            await set(myRef, { name: curN, lastSeen: Date.now(), uid: uid });
            lastActivityTime = Date.now(); 

            $("loginFormContainer").classList.add("hidden");
            $("exitBtn").classList.remove("hidden");
            $("toggleUserListBtn").classList.remove("hidden");
            
            $("inputAreaContainer").classList.remove("hidden");
            $("mobileKeyboardBlock").classList.remove("hidden");

            $("mi").disabled = false; $("sendBtn").disabled = false;
            $("openKeyboardBtn").disabled = false;
            $("ytMiniPlayPauseBtn").disabled = false;
            $("ytMiniVolume").disabled = false;
            $("ytMiniMuteBtn").disabled = false;
            $("ytPlaceholder").style.display = "none";
            $("placeholderStatusText").innerText = "チャット欄に動画URLを送信すると全員のシアターへ同期共有されます";

            // 初期音量を適用
            $("ytMiniVolume").value = savedVolumeLevel;
            $("ytMiniMuteBtn").innerText = savedVolumeLevel === 0 ? "🔇" : "🔊";

            onValue(ref(db, `presence/${ROOM_PATH}`), (snapshot) => {
                const users = snapshot.val() || {};
                let userEntries = Object.values(users);
                currentConnectionCount = userEntries.length;
                $("presenceCount").innerText = currentConnectionCount;

                const myIndex = userEntries.findIndex(u => u.uid === uid);
                if (myIndex > -1) {
                    const myData = userEntries.splice(myIndex, 1)[0];
                    userEntries.unshift(myData); 
                }

                let listHtml = "";
                userEntries.forEach(u => {
                    const isMe = (u.uid === uid);
                    const nameLabel = isMe ? `<span class="text-indigo-400 font-bold">${esc(u.name)} (あなた)</span>` : `<span class="text-slate-300">${esc(u.name)}</span>`;
                    
                    let actionBtn = "";
                    if (amIOwner && !isMe) {
                        actionBtn = `<button onclick="window.__handOverHost('${esc(u.uid)}','${esc(u.name)}')" class="text-[9px] text-amber-500 hover:text-amber-400 bg-neutral-900 px-1 py-0.5 rounded border border-neutral-800 transition">👑譲渡</button>`;
                    } else if (globalVideoStateCache && globalVideoStateCache.owner === u.uid) {
                        actionBtn = `<span class="text-[10px] text-amber-400 font-sans">👑ホスト</span>`;
                    }

                    listHtml += `
                        <div class="flex items-center justify-between py-1 px-1.5 bg-neutral-950">
                            <div class="truncate mr-2">${nameLabel}</div>
                            <div class="shrink-0">${actionBtn}</div>
                        </div>
                    `;
                });
                $("userListContent").innerHTML = listHtml || `<div class="text-neutral-600 p-1 text-center text-[10px]">入室者がいません</div>`;
            });

            const chatRef = ref(db, `chat/${ROOM_PATH}`);
            onChildAdded(query(chatRef, orderByChild("time")), (snapshot) => {
                const m = snapshot.val(); if (!m) return;
                const div = document.createElement("div");
                div.className = "w-full flex flex-col items-start my-1";
                const time = m.time ? new Date(m.time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";
                
                const isMe = (m.fromUid === uid || m.uid === uid);

                if (m.type === "sys") {
                    let sysText = "";
                    if (isMe) {
                        sysText = `${esc(curN)} ${m.text}`; 
                    } else {
                        const fallback = m.fallbackName || "ゲスト";
                        sysText = m.text.includes("ホスト権限") ? m.text : `${esc(fallback)} ${m.text}`;
                    }
                    div.innerHTML = `<div class="text-[10px] text-neutral-500 mx-auto text-center bg-neutral-900 border border-neutral-800 py-0.5 px-3 rounded-full">${sysText}</div>`;
                    div.className = "w-full text-center my-1";
                } else {
                    const extractedId = extractVideoId(m.text);
                    let embedHtml = "";
                    if (extractedId) {
                        embedHtml = `
                        <div class="mt-1.5 w-full max-w-[220px] bg-black rounded-lg p-1 border border-neutral-800">
                            <img src="https://img.youtube.com/vi/${extractedId}/mqdefault.jpg" class="w-full h-auto rounded">
                            <button onclick="window.__loadSharedVideo('${extractedId}')" class="w-full mt-1 bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] py-1 rounded font-bold transition">🎬 シアター全員に同期</button>
                        </div>`;
                    }

                    const crownBtn = (amIOwner && !isMe) ? `<button onclick="window.__handOverHost('${esc(m.uid || '')}','${esc(m.name)}')" class="ml-1.5 text-[9px] text-amber-500 hover:text-amber-400 bg-neutral-900 px-1 rounded border border-neutral-800">譲渡👑</button>` : "";
                    
                    const displayName = isMe ? esc(curN) : esc(m.name);
                    const senderHeader = `<div class="text-[9px] ${isMe ? 'text-indigo-400' : 'text-neutral-400'} pl-1 mb-0.5 font-mono flex items-center">${displayName} ${!isMe ? crownBtn : ''} <span class="text-neutral-600 ml-1 font-sans">${time}</span></div>`;

                    div.innerHTML = `
                        ${senderHeader}
                        <div class="bg-neutral-900 text-slate-200 px-3 py-1.5 rounded-2xl border border-neutral-800 max-w-[85%] break-all text-xs leading-normal select-text">
                            ${linkify(m.text)}
                            ${embedHtml}
                        </div>`;
                }
                
                $("chatTimeline").prepend(div);

                if (m.type !== "sys" && isMe) {
                    $("chatTimeline").scrollTop = 0;
                }
            });

            onValue(ref(db, `rooms/${ROOM_PATH}/videoState`), (snapshot) => {
                if (!snapshot.exists()) {
                    globalVideoStateCache = null; amIOwner = false;
                    if (ytPlayer) { try { ytPlayer.destroy(); } catch(e){} ytPlayer = null; }
                    lastLoadedVideoId = null; isUserApprovedSync = false; isGuestFreeMode = false;
                    $("ytPlaceholder").style.display = "flex"; updateControlsUI(); return;
                }

                const state = snapshot.val();
                globalVideoStateCache = state;
                const newAmIOwner = (state.owner === uid);
                
                if (amIOwner !== newAmIOwner) {
                    amIOwner = newAmIOwner;
                    if (amIOwner) isUserApprovedSync = true;
                }

                let targetTime = state.currentTime;
                if (state.status === "playing") {
                    targetTime += ((Date.now() - state.timestamp) / 1000);
                }

                if (amIOwner) {
                    $("guestConfirmOverlay").classList.add("hidden");
                    updateControlsUI();
                } else {
                    if (isGuestFreeMode) { updateControlsUI(); return; }
                    
                    if (lastLoadedVideoId !== state.videoId) {
                        isUserApprovedSync = false;
                        if (ytPlayer) { try { ytPlayer.destroy(); } catch(e){} ytPlayer = null; } 
                        $("guestConfirmHostName").innerText = `${state.ownerName}が動画を共有しました`;
                        $("guestConfirmOverlay").classList.remove("hidden");
                        $("ytPlaceholder").style.display = "none";
                        updateControlsUI();
                        return;
                    }
                    if (!isUserApprovedSync) return;
                }

                $("ytPlaceholder").style.display = "none";
                $("guestConfirmOverlay").classList.add("hidden");
                updateControlsUI();

                if (lastLoadedVideoId !== state.videoId || !ytPlayer) {
                    buildAndSyncPlayer(state, targetTime);
                } else {
                    if (isLocalAction) return;
                    try {
                        const curTime = ytPlayer.getCurrentTime();
                        const diff = Math.abs(curTime - targetTime);
                        if (state.status === "playing") {
                            if (ytPlayer.getPlayerState() !== 1) { activateShield(1000); ytPlayer.playVideo(); }
                            if (diff > 2.0) { activateShield(1200); ytPlayer.seekTo(targetTime, true); }
                        } else if (state.status === "paused") {
                            if (ytPlayer.getPlayerState() !== 2) { activateShield(1000); ytPlayer.pauseVideo(); }
                            if (diff > 1.2) { activateShield(1000); ytPlayer.seekTo(targetTime, true); }
                        }
                    } catch(e){}
                }
            });

            if (sliderIntervalId) clearInterval(sliderIntervalId);
            sliderIntervalId = setInterval(async () => {
                if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
                
                if (!isUserDraggingSlider) {
                    try {
                        const curTime = ytPlayer.getCurrentTime(); const duration = ytPlayer.getDuration();
                        if (duration > 0) {
                            $("ytMiniSlider").max = Math.floor(duration); $("ytMiniSlider").value = Math.floor(curTime);
                            $("ytSyncTimeDisplay").innerText = `${formatTime(curTime)} / ${formatTime(duration)}`;
                            $("ytMiniTimeDisplay").innerText = formatTime(curTime);
                        }
                        $("ytMiniPlayPauseBtn").innerText = ytPlayer.getPlayerState() === 1 ? "⏸" : "▶";
                    } catch(e){}
                }

                // 🌟 自動バックグラウンド同期処理（ホストの手動同期化に伴い、定期自動上書きを廃止して衝突を防止）
            }, 500);

            if (timeoutCheckIntervalId) clearInterval(timeoutCheckIntervalId);
            timeoutCheckIntervalId = setInterval(() => {
                if (Date.now() - lastActivityTime > INACTIVE_TIMEOUT) { leaveRoom(true); }
            }, 10000);

            await push(ref(db, `chat/${ROOM_PATH}`), { type: "sys", text: `が入室しました`, time: Date.now(), fromUid: uid, fallbackName: curN });
        }

        function onPlayerStateChange(event) {
            if (!ytPlayer || isLocalAction || !globalVideoStateCache) return;
            const pState = event.data;
            const curTime = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
            const duration = ytPlayer.getDuration ? ytPlayer.getDuration() : 0;

            if (pState === YT.PlayerState.ENDED) {
                if (amIOwner) {
                    activateShield(1200);
                    const stopPos = duration > 0 ? duration - 0.5 : 0;
                    ytPlayer.seekTo(stopPos, true);
                    ytPlayer.pauseVideo();
                    lastSavedStatus = "paused";
                    // 終了時のみ安全のために自動確定
                    set(ref(db, `rooms/${ROOM_PATH}/videoState`), { 
                        videoId: globalVideoStateCache.videoId, status: "paused", currentTime: stopPos, timestamp: Date.now(), owner: uid, ownerName: curN 
                    });
                } else if (isGuestFreeMode) {
                    const stopPos = duration > 0 ? duration - 0.5 : 0;
                    ytPlayer.seekTo(stopPos, true);
                    ytPlayer.pauseVideo();
                }
                return;
            }

            if (isGuestFreeMode) return;

            // 🌟 ホストの「再生ボタン」「一時停止ボタン」操作で自動同期せず、ローカルのみの変更に留める（強制同期ボタンで飛ばすため）
            if (amIOwner) {
                if (pState === 1) { lastSavedStatus = "playing"; }
                else if (pState === 2) { lastSavedStatus = "paused"; }
            } else {
                if (isUserApprovedSync) {
                    if (globalVideoStateCache.status === "playing" && pState === 2) {
                        setTimeout(() => { if(!isGuestFreeMode && !isLocalAction && ytPlayer) { try { ytPlayer.playVideo(); }catch(e){} } }, 300);
                    } else if (globalVideoStateCache.status === "paused" && pState === 1) {
                        setTimeout(() => { if(!isGuestFreeMode && !isLocalAction && ytPlayer) { try { ytPlayer.pauseVideo(); }catch(e){} } }, 300);
                    }
                }
            }
        }

        // 🌟 ホスト専用：好きなタイミングでシームレスに同期シグナルを送信する関数
        async function emitHostSyncSignal() {
            if (!amIOwner || !ytPlayer || !globalVideoStateCache) return;
            try {
                activateShield(1500);
                const currentPos = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
                const isPlaying = (ytPlayer.getPlayerState() === 1);
                const statusStr = isPlaying ? "playing" : "paused";
                
                await set(ref(db, `rooms/${ROOM_PATH}/videoState`), {
                    videoId: globalVideoStateCache.videoId,
                    status: statusStr,
                    currentTime: currentPos,
                    timestamp: Date.now(),
                    owner: uid,
                    ownerName: curN
                });
                
                // ボタンのインジケータを一時的に変更してフィードバック
                const syncBtn = $("ytHostSyncTriggerBtn");
                const originText = syncBtn.innerText;
                syncBtn.innerText = "✨ 同期完了";
                syncBtn.classList.replace("bg-amber-600", "bg-emerald-600");
                setTimeout(() => {
                    syncBtn.innerText = originText;
                    syncBtn.classList.replace("bg-emerald-600", "bg-amber-600");
                }, 1000);

            } catch (e) { console.error("Sync transmission failed", e); }
        }
        $("ytHostSyncTriggerBtn").onclick = (e) => { e.preventDefault(); emitHostSyncSignal(); };

        function updateControlsUI() {
            if (amIOwner) {
                $("ytClaimHostBtn").style.display = "none"; $("ytGuestModeBtn").style.display = "none";
                $("ytMiniSlider").disabled = false;
                $("ytBadge").innerText = "👑 ホスト配信中";
                $("ytBadge").className = "border px-1.5 py-0.5 rounded text-[9px] font-bold text-amber-400 border-amber-950 bg-amber-950/60";
                
                $("ytSyncStatusIndicator").innerText = "配信制御中（手動）";
                $("ytSyncStatusIndicator").className = "px-2 py-0.5 rounded text-[9px] font-bold bg-amber-950/60 text-amber-400 border border-amber-900/60 shadow-sm shadow-amber-950/50";
                $("topLiveIndicator").className = "w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse";
                $("ytHostSyncTriggerBtn").classList.remove("hidden"); // 強制同期トリガーを表示
            } else {
                $("ytGuestModeBtn").style.display = "block";
                $("ytHostSyncTriggerBtn").classList.add("hidden");
                if (isGuestFreeMode) {
                    $("ytGuestModeBtn").innerText = "🔄 同期に戻る";
                    $("ytGuestModeBtn").className = "px-2.5 py-0.5 rounded text-[10px] font-bold text-white bg-indigo-600 hover:bg-indigo-500 shadow-md shadow-indigo-600/10 transition whitespace-nowrap";
                    $("ytMiniSlider").disabled = false;
                    $("ytBadge").innerText = "🔓 単独再生中";
                    $("ytBadge").className = "border px-1.5 py-0.5 rounded text-[9px] font-bold text-neutral-400 border-neutral-800 bg-black";
                    
                    $("ytSyncStatusIndicator").innerText = "単独再生中";
                    $("ytSyncStatusIndicator").className = "px-2 py-0.5 rounded text-[9px] font-bold bg-neutral-900 text-neutral-400 border border-neutral-800 whitespace-nowrap";
                    $("topLiveIndicator").className = "w-1.5 h-1.5 bg-neutral-600 rounded-full";
                    $("ytClaimHostBtn").style.display = "block";
                } else {
                    $("ytGuestModeBtn").innerText = "⏸ 単独再生へ";
                    $("ytGuestModeBtn").className = "px-2.5 py-0.5 rounded text-[10px] font-bold text-slate-300 border border-neutral-700 bg-neutral-900 hover:bg-neutral-800 transition whitespace-nowrap";
                    $("ytMiniSlider").disabled = true;
                    $("ytBadge").innerText = "🔒 画面ホスト連動中";
                    $("ytBadge").className = "border px-1.5 py-0.5 rounded text-[9px] font-bold text-emerald-400 border-emerald-950 bg-emerald-950/30";
                    
                    if (isUserApprovedSync) {
                        $("ytSyncStatusIndicator").innerText = "追従中";
                        $("ytSyncStatusIndicator").className = "px-2 py-0.5 rounded text-[9px] font-bold bg-emerald-950/60 text-emerald-400 border border-emerald-900/60 whitespace-nowrap";
                        $("topLiveIndicator").className = "w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse";
                    } else {
                        $("ytSyncStatusIndicator").innerText = "同期確認待ち";
                        $("ytSyncStatusIndicator").className = "px-2 py-0.5 rounded text-[9px] font-bold bg-rose-950/60 text-rose-400 border border-rose-900/60 animate-pulse whitespace-nowrap";
                        $("topLiveIndicator").className = "w-1.5 h-1.5 bg-rose-500 rounded-full";
                    }
                    $("ytClaimHostBtn").style.display = "block";
                }
            }
        }

        function forceGuestSyncResume() {
            if (globalVideoStateCache) {
                let targetTime = globalVideoStateCache.currentTime;
                if (globalVideoStateCache.status === "playing") {
                    targetTime += ((Date.now() - globalVideoStateCache.timestamp) / 1000);
                }
                buildAndSyncPlayer(globalVideoStateCache, targetTime);
            }
        }

        $("ytGuestModeBtn").onclick = (e) => {
            e.preventDefault(); isGuestFreeMode = !isGuestFreeMode;
            if (!isGuestFreeMode) {
                isUserApprovedSync = true; 
                $("guestConfirmOverlay").classList.add("hidden");
                forceGuestSyncResume(); 
            }
            updateControlsUI();
        };

        $("ytClaimHostBtn").onclick = async (e) => {
            e.preventDefault(); if (!globalVideoStateCache) return;
            amIOwner = true; isGuestFreeMode = false; isUserApprovedSync = true;
            activateShield(2000);
            await set(ref(db, `rooms/${ROOM_PATH}/videoState`), {
                videoId: globalVideoStateCache.videoId,
                status: (ytPlayer && ytPlayer.getPlayerState() === 1) ? "playing" : "paused",
                currentTime: (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') ? ytPlayer.getCurrentTime() : 0,
                timestamp: Date.now(), owner: uid, ownerName: curN
            });
            updateControlsUI();
        };

        $("guestConfirmAcceptBtn").onclick = () => { 
            isUserApprovedSync = true; 
            $("guestConfirmOverlay").classList.add("hidden"); 
            updateControlsUI(); 
            forceGuestSyncResume(); 
        };
        $("guestConfirmDeclineBtn").onclick = () => { isGuestFreeMode = true; $("guestConfirmOverlay").classList.add("hidden"); updateControlsUI(); };

        $("ytMiniPlayPauseBtn").onclick = () => {
            if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
            const pState = ytPlayer.getPlayerState();
            if (amIOwner) {
                if (pState === 1) {
                    activateShield(500); ytPlayer.pauseVideo(); lastSavedStatus = "paused";
                } else {
                    activateShield(500); ytPlayer.playVideo(); lastSavedStatus = "playing";
                }
            } else {
                if (isGuestFreeMode) { if (pState === 1) ytPlayer.pauseVideo(); else ytPlayer.playVideo(); }
            }
        };

        $("ytMiniSlider").oninput = () => { isUserDraggingSlider = true; };
        $("ytMiniSlider").onchange = () => {
            const targetTime = Number($("ytMiniSlider").value);
            if (ytPlayer && typeof ytPlayer.seekTo === 'function') { activateShield(1000); ytPlayer.seekTo(targetTime, true); }
            isUserDraggingSlider = false;
        };

        async function sendMessage() {
            const txt = $("mi").value.trim(); if (!txt || isComposing) return;
            $("mi").value = ""; $("mi").rows = 1;
            lastActivityTime = Date.now(); 
            try {
                await push(ref(db, `chat/${ROOM_PATH}`), { name: curN, text: txt, time: Date.now(), uid: uid, fromUid: uid });
            } catch (e) { alert("送信に失敗しました。再試行してください。"); }
        }

        $("openKeyboardBtn").onclick = (e) => { e.preventDefault(); $("mi").focus(); };
        $("mi").addEventListener("compositionstart", () => { isComposing = true; });
        $("mi").addEventListener("compositionend", () => { isComposing = false; });
        $("mi").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey && !isComposing) { e.preventDefault(); sendMessage(); } });
        $("sendBtn").onclick = (e) => { e.preventDefault(); sendMessage(); };

        $("enterBtn").onclick = () => {
            const n = $("ni").value.replace(/[\s\u3000]+/g, "").trim();
            const k = $("ki").value;
            if (!n) { alert("名前を入力してください。"); return; }
            joinRoom(n.slice(0, 10), k);
        };

        $("exitBtn").onclick = () => { if (confirm("シアタールームから退室しますか？")) leaveRoom(false); };
        window.addEventListener("beforeunload", () => { if(hasJoined && currentConnectionCount <= 1) checkAndCleanUpRoom(); });

        window.addEventListener("DOMContentLoaded", () => {
            const savedName = localStorage.getItem("or_name") || "";
            const savedKey = localStorage.getItem("or_key") || "";
            
            if (savedName) {
                $("ni").value = savedName;
                $("ki").value = savedKey;
            } else {
                $("ni").value = `ゲスト${Math.floor(100 + Math.random() * 900)}`;
            }
            updateTripPreview();
            
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => {
                    document.body.style.height = window.visualViewport.height + 'px';
                    $("mainApp").style.height = window.visualViewport.height + 'px';
                    window.scrollTo(0, 0);
                });
            }
        });
    </script>
</body>
</html>
