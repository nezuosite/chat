<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<title>Nezu Tube Chat</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090b;--surface:#111113;--surface2:#18181b;--border:#27272a;--border2:#3f3f46;
  --text:#f4f4f5;--muted:#71717a;--muted2:#52525b;
  --indigo:#6366f1;--indigo-dim:#312e81;--indigo-glow:rgba(99,102,241,.25);
  --amber:#f59e0b;--amber-dim:#451a03;--amber-glow:rgba(245,158,11,.2);
  --emerald:#10b981;--emerald-dim:#064e3b;--emerald-glow:rgba(16,185,129,.2);
  --rose:#f43f5e;--rose-dim:#4c0519;--rose-glow:rgba(244,63,94,.2);
  --safe:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",
    "Meiryo",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
  overscroll-behavior:none;
}
input,textarea{font-family:inherit;-webkit-user-select:text;user-select:text}
button{cursor:pointer;font-family:inherit;border:none;background:none}
button:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
a{color:var(--indigo);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Layout ───────────────────────────────────────────────────────── */
#app{
  position:fixed;inset:0;display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;
}
@supports(-webkit-touch-callout:none){
  #app{height:-webkit-fill-available}
}
/* PC: horizontal split */
@media(min-width:768px){
  #app{flex-direction:row}
  #left-pane{width:55%;max-height:100%;border-right:1px solid var(--border);border-bottom:none}
  #right-pane{flex:1;min-width:0}
}
/* Mobile: vertical split */
#left-pane{
  display:flex;flex-direction:column;background:#000;
  border-bottom:1px solid var(--border);
  max-height:50vh;flex-shrink:0;
}
@media(min-width:768px){#left-pane{max-height:100%}}
#right-pane{
  display:flex;flex-direction:column;background:var(--surface);
  flex:1;min-height:0;overflow:hidden;
}

/* ── Video Area ───────────────────────────────────────────────────── */
#yt-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0}
#ytPlayer{width:100%;height:100%;display:block}
#yt-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#050507;z-index:10;gap:6px;pointer-events:none;
}
#yt-placeholder .brand{color:var(--indigo);font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase}
#yt-placeholder .hint{color:var(--muted);font-size:10px;text-align:center;padding:0 16px;line-height:1.5}

/* ── Guest Confirm Overlay ────────────────────────────────────────── */
#guest-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.96);z-index:30;
  display:none;align-items:center;justify-content:center;padding:16px;
}
#guest-overlay.show{display:flex}
.overlay-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:14px;
  padding:20px;max-width:300px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
}
.overlay-card .oc-label{font-size:9px;font-weight:800;letter-spacing:.2em;color:var(--indigo);text-transform:uppercase;margin-bottom:8px}
.overlay-card .oc-host{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
.overlay-card .oc-desc{font-size:10px;color:#a1a1aa;line-height:1.6;margin-bottom:14px}
.overlay-btns{display:flex;gap:8px}
.btn-decline{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--border);transition:background .15s}
.btn-decline:hover{background:var(--border)}
.btn-accept{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:700;background:var(--indigo);color:#fff;transition:background .15s,box-shadow .15s;box-shadow:0 0 12px var(--indigo-glow)}
.btn-accept:hover{background:#4f46e5}

/* ── Player Controls ──────────────────────────────────────────────── */
#player-controls{
  background:var(--surface);border-top:1px solid var(--border);
  padding:8px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;
}
.ctrl-row{display:flex;align-items:center;gap:8px;width:100%}
#mini-playpause{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:6px;padding:2px 8px;font-size:13px;min-width:32px;
  transition:background .15s;flex-shrink:0;
}
#mini-playpause:hover:not(:disabled){background:var(--border2)}
#mini-playpause:disabled{opacity:.4}
#mini-time{font-size:10px;font-family:"SF Mono","JetBrains Mono",monospace;color:var(--muted);flex-shrink:0;white-space:nowrap}
#mini-slider{
  flex:1;height:4px;border-radius:2px;cursor:pointer;
  accent-color:var(--indigo);background:var(--border2);
  -webkit-appearance:none;appearance:none;
}
#mini-slider::-webkit-slider-thumb{width:12px;height:12px;border-radius:50%;background:var(--indigo);-webkit-appearance:none;cursor:pointer}
#mini-slider:disabled{opacity:.4;cursor:not-allowed}
.ctrl-row2{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ctrl-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ctrl-right{display:flex;align-items:center;gap:4px}
/* Role Badge */
#role-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;
  letter-spacing:.05em;white-space:nowrap;transition:all .2s;
  border:1px solid transparent;
}
.badge-host-sync{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,158,11,.3);box-shadow:0 0 8px var(--amber-glow)}
.badge-host-nosync{background:var(--surface2);color:#a1a1aa;border-color:var(--border)}
.badge-guest-sync{background:var(--emerald-dim);color:var(--emerald);border-color:rgba(16,185,129,.3);box-shadow:0 0 8px var(--emerald-glow)}
.badge-guest-free{background:var(--surface2);color:#a1a1aa;border-color:var(--border)}
.badge-guest-nosync{background:var(--surface2);color:#a1a1aa;border-color:var(--border)}
/* Sync Toggle Btn */
#sync-toggle-btn{
  padding:2px 10px;border-radius:20px;font-size:10px;font-weight:800;
  transition:all .15s;white-space:nowrap;
}
.stb-start{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.4)}
.stb-start:hover{background:rgba(245,158,11,.25)}
.stb-stop{background:var(--rose-dim);color:var(--rose);border:1px solid rgba(244,63,94,.4)}
.stb-stop:hover{background:rgba(244,63,94,.25)}
#mini-mute{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:6px;padding:2px 6px;font-size:11px;
  transition:background .15s;flex-shrink:0;
}
#mini-mute:hover:not(:disabled){background:var(--border2)}
#mini-mute:disabled{opacity:.4}
#mini-vol{
  width:60px;height:4px;border-radius:2px;cursor:pointer;
  accent-color:var(--emerald);background:var(--border2);
  -webkit-appearance:none;appearance:none;
}
#mini-vol::-webkit-slider-thumb{width:10px;height:10px;border-radius:50%;background:var(--emerald);-webkit-appearance:none;cursor:pointer}
#mini-vol:disabled{opacity:.4}

/* ── URL Input Bar ────────────────────────────────────────────────── */
#url-bar{
  display:none;padding:8px;background:var(--surface2);
  border-top:1px solid var(--border);flex-shrink:0;
}
#url-bar.show{display:flex;gap:6px;align-items:center}
#url-input{
  flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-size:12px;padding:6px 12px;
  transition:border-color .15s;
}
#url-input:focus{outline:none;border-color:var(--indigo)}
.btn-send{
  background:var(--indigo);color:#fff;font-size:11px;font-weight:700;
  padding:6px 14px;border-radius:10px;transition:background .15s;
  box-shadow:0 2px 8px var(--indigo-glow);flex-shrink:0;
}
.btn-send:hover{background:#4f46e5}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

/* ── Right Pane Header ────────────────────────────────────────────── */
#chat-header{
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:8px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;
}
.header-row1{display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0}
/* Status pill at top-left */
#status-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;
  letter-spacing:.06em;white-space:nowrap;transition:all .25s;
  border:1px solid transparent;flex-shrink:0;
}
.sp-host-sync{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,158,11,.35);box-shadow:0 0 10px var(--amber-glow)}
.sp-host-nosync{background:var(--surface);color:#a1a1aa;border-color:var(--border)}
.sp-syncing{background:var(--emerald-dim);color:var(--emerald);border-color:rgba(16,185,129,.35);box-shadow:0 0 10px var(--emerald-glow)}
.sp-free{background:var(--surface);color:#a1a1aa;border-color:var(--border)}
.sp-nosync{background:var(--surface);color:#a1a1aa;border-color:var(--border)}
.sp-pending{background:var(--rose-dim);color:var(--rose);border-color:rgba(244,63,94,.35)}
/* Live dot */
.live-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
.dot-off{background:var(--muted2)}
.dot-amber{background:var(--amber);animation:pulse .9s ease-in-out infinite}
.dot-green{background:var(--emerald);animation:pulse .9s ease-in-out infinite}
.dot-rose{background:var(--rose)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Presence toggle */
#presence-btn{
  display:flex;align-items:center;gap:5px;
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:3px 8px;font-size:11px;font-weight:700;color:var(--text);
  transition:background .15s;white-space:nowrap;min-width:0;
}
#presence-btn:hover{background:var(--border)}
#presence-count{color:var(--indigo);font-family:monospace}
.chevron{display:inline-block;font-size:8px;color:var(--muted);transition:transform .2s;margin-left:2px}
.chevron.open{transform:rotate(180deg)}

/* Exit btn */
#exit-btn{
  display:none;background:rgba(244,63,94,.1);color:var(--rose);
  border:1px solid rgba(244,63,94,.3);border-radius:8px;
  font-size:10px;font-weight:700;padding:3px 10px;
  transition:all .15s;flex-shrink:0;white-space:nowrap;
}
#exit-btn.show{display:block}
#exit-btn:hover{background:rgba(244,63,94,.2)}

/* Presence dropdown */
#user-list{
  max-height:0;overflow:hidden;transition:max-height .25s ease-out;
}
#user-list.open{max-height:150px;overflow-y:auto}
#user-list-inner{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;
}
.user-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;border-bottom:1px solid var(--border);font-size:11px;
}
.user-row:last-child{border-bottom:none}
.user-name{font-family:monospace;color:#a1a1aa;truncate:ellipsis;overflow:hidden;white-space:nowrap}
.user-name.me{color:var(--indigo);font-weight:700}
.user-meta{font-size:9px;color:var(--muted2);flex-shrink:0;white-space:nowrap;margin-left:4px}
.btn-transfer{
  font-size:9px;color:var(--amber);background:var(--bg);
  border:1px solid var(--border);border-radius:4px;padding:1px 5px;
  transition:background .15s;flex-shrink:0;
}
.btn-transfer:hover{background:var(--amber-dim)}

/* Login form */
#login-form{display:flex;flex-direction:column;gap:6px}
.login-row{display:flex;gap:6px}
.inp-name{
  flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:12px;padding:5px 10px;
  transition:border-color .15s;
}
.inp-name:focus{outline:none;border-color:var(--indigo)}
.inp-key{
  width:90px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:12px;padding:5px 10px;
  transition:border-color .15s;
}
.inp-key:focus{outline:none;border-color:var(--indigo)}
.btn-enter{
  background:var(--indigo);color:#fff;font-size:11px;font-weight:700;
  padding:5px 14px;border-radius:8px;transition:background .15s;flex-shrink:0;
  box-shadow:0 2px 8px var(--indigo-glow);
}
.btn-enter:hover{background:#4f46e5}
.trip-preview{font-size:10px;color:var(--muted2);padding:0 2px}
.trip-preview span{color:var(--indigo);font-family:monospace}

/* Sync Status Bar (bottom of right pane header) */
#sync-bar{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:4px 0 0;
}
#sync-time{font-size:10px;font-family:monospace;color:var(--muted2);white-space:nowrap}
.sync-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
#claim-host-btn{
  display:none;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.35);
  transition:all .15s;white-space:nowrap;
}
#claim-host-btn.show{display:block}
#claim-host-btn:hover{background:rgba(245,158,11,.25)}
#free-mode-btn{
  display:none;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
  transition:all .15s;white-space:nowrap;
}
#free-mode-btn.show{display:block}
.fmb-free{background:var(--surface2);color:#a1a1aa;border:1px solid var(--border)}
.fmb-free:hover{background:var(--border)}
.fmb-return{background:rgba(99,102,241,.15);color:var(--indigo);border:1px solid rgba(99,102,241,.35)}
.fmb-return:hover{background:rgba(99,102,241,.25)}

/* ── Chat Timeline ────────────────────────────────────────────────── */
#timeline{
  flex:1;min-height:0;overflow-y:auto;
  padding:10px 10px;display:flex;flex-direction:column;gap:8px;
  background:var(--bg);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  align-items:flex-start;
}
#timeline::-webkit-scrollbar{width:3px}
#timeline::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:86%;word-break:break-word;align-items:flex-start;align-self:flex-start}
.msg.me{align-items:flex-start;align-self:flex-start}
.msg-meta{font-size:9px;color:var(--muted2);font-family:monospace;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.msg-meta .name.me{color:var(--indigo)}
.msg-bubble{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-radius:14px;
  padding:7px 12px;font-size:12px;line-height:1.55;
  -webkit-user-select:text;user-select:text;
}
.msg.me .msg-bubble{background:var(--indigo-dim);border-color:rgba(99,102,241,.3)}
.yt-card{
  margin-top:8px;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;max-width:220px;
}
.yt-card img{width:100%;height:auto;display:block}
.yt-card-btn{
  width:100%;padding:6px;font-size:10px;font-weight:700;
  background:var(--indigo);color:#fff;text-align:center;
  transition:background .15s;display:block;
}
.yt-card-btn:hover{background:#4f46e5}
.sys-msg{
  align-self:flex-start;font-size:10px;color:var(--muted2);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:3px 12px;text-align:left;
  max-width:90%;-webkit-user-select:text;user-select:text;
}

/* ── Chat Input ───────────────────────────────────────────────────── */
#chat-input-area{
  display:none;padding:8px;background:var(--surface2);border-top:1px solid var(--border);
  flex-shrink:0;gap:6px;
  padding-bottom:calc(8px + var(--safe));
}
#chat-input-area.show{display:flex;align-items:flex-end}
#chat-textarea{
  flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-size:13px;padding:8px 12px;
  resize:none;line-height:1.4;max-height:80px;overflow-y:auto;
  transition:border-color .15s;
  -webkit-user-select:text;user-select:text;
}
#chat-textarea:focus{outline:none;border-color:var(--indigo)}
.btn-chat-send{
  background:var(--indigo);color:#fff;font-size:12px;font-weight:700;
  padding:8px 14px;border-radius:12px;transition:background .15s;flex-shrink:0;
  align-self:flex-end;box-shadow:0 2px 8px var(--indigo-glow);
}
.btn-chat-send:hover:not(:disabled){background:#4f46e5}
.btn-chat-send:disabled{opacity:.4;cursor:not-allowed}

/* Mobile keyboard trigger — removed */

/* ── Utilities ─────────────────────────────────────────────────────── */
.hidden{display:none!important}
</style>
</head>
<body>

<div id="app">

  <!-- ══ LEFT PANE: Video ══════════════════════════════════════════ -->
  <div id="left-pane">
    <!-- Video -->
    <div id="yt-wrap">
      <div id="yt-placeholder">
        <div class="brand">Nezu Tube Chat</div>
        <div class="hint" id="placeholder-hint">YouTubeのURLを貼り付けて動画を共有できます</div>
      </div>
      <!-- Guest confirm overlay -->
      <div id="guest-overlay">
        <div class="overlay-card">
          <div class="oc-label">🎬 同期リクエスト</div>
          <div class="oc-host" id="oc-host-name"></div>
          <div class="oc-desc">ホストの動画に同期しますか？<br>後からいつでも切り替えられます。</div>
          <div class="overlay-btns">
            <button class="btn-decline" id="oc-decline">自由視聴</button>
            <button class="btn-accept" id="oc-accept">▶ 同期する</button>
          </div>
        </div>
      </div>
      <div id="ytPlayer"></div>
    </div>

    <!-- Player Controls -->
    <div id="player-controls">
      <div class="ctrl-row">
        <button id="mini-playpause" disabled>▶</button>
        <span id="mini-time">00:00</span>
        <input type="range" id="mini-slider" min="0" max="100" value="0" step="1" disabled>
      </div>
      <div class="ctrl-row2">
        <div class="ctrl-left">
          <span id="role-badge" class="badge-host-nosync">ホスト</span>
          <button id="sync-toggle-btn" class="stb-start hidden">同期を開始</button>
        </div>
        <div class="ctrl-right">
          <button id="mini-mute" disabled>🔇</button>
          <input type="range" id="mini-vol" min="0" max="100" value="0" step="1" disabled>
        </div>
      </div>
    </div>

    <!-- URL Input -->
    <div id="url-bar">
      <input type="url" id="url-input" placeholder="YouTubeのURLを貼り付け..." autocomplete="off" inputmode="url">
      <button class="btn-send" id="url-send" disabled>共有</button>
    </div>
  </div>

  <!-- ══ RIGHT PANE: Chat ══════════════════════════════════════════ -->
  <div id="right-pane">

    <!-- Header -->
    <div id="chat-header">
      <div class="header-row1">
        <!-- Status Pill (most prominent) -->
        <div id="status-pill" class="sp-nosync">
          <span class="live-dot dot-off" id="live-dot"></span>
          <span id="status-text">---</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;min-width:0">
          <!-- Presence toggle -->
          <button id="presence-btn">
            <span>参加者</span>
            <span id="presence-count">0</span>人
            <span class="chevron" id="chevron">▼</span>
          </button>
          <button id="exit-btn">退出</button>
        </div>
      </div>

      <!-- User list dropdown -->
      <div id="user-list">
        <div id="user-list-inner"></div>
      </div>

      <!-- Login form -->
      <div id="login-form">
        <div class="login-row">
          <input type="text" id="ni" class="inp-name" placeholder="名前（10文字まで）" maxlength="20" autocomplete="username">
          <input type="password" id="ki" class="inp-key" placeholder="トリップキー" autocomplete="current-password">
          <button class="btn-enter" id="enter-btn">入室</button>
        </div>
        <div class="trip-preview">表示名: <span id="trip-preview">---</span></div>
      </div>

      <!-- Sync bar -->
      <div id="sync-bar">
        <span id="sync-time">00:00 / 00:00</span>
        <div class="sync-actions">
          <button id="claim-host-btn">👑 ホスト取得</button>
          <button id="free-mode-btn" class="fmb-free">自由視聴</button>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div id="timeline" role="log" aria-live="polite" aria-label="チャット"></div>

    <!-- Chat input (PC & focused mobile) -->
    <div id="chat-input-area">
      <textarea id="chat-textarea" rows="1" placeholder="メッセージを入力... (Enter送信)" aria-label="メッセージ入力"></textarea>
      <button class="btn-chat-send" id="chat-send" disabled>送信</button>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, update, remove, query,
         orderByChild, onChildAdded, get, off, onDisconnect, limitToLast }
                                   from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* ── Constants ─────────────────────────────────────────────────────── */
const DB_URL        = "https://nezuochat-default-rtdb.asia-southeast1.firebasedatabase.app";
const ROOM          = "one_global_room";
const TRIP_SALT     = "NezuTubeSecretSalt_2026";
const INACTIVE_MS   = 30 * 60 * 1000;   // 30 min
const SYNC_DRIFT_S  = 1.5;              // seek if drift > this many seconds
const PRESENCE_HB   = 15_000;           // heartbeat interval ms
const CHAT_LIMIT    = 100;              // max messages to load

/* ── Firebase ──────────────────────────────────────────────────────── */
const app = initializeApp({ databaseURL: DB_URL });
const db  = getDatabase(app);

/* ── DOM refs ──────────────────────────────────────────────────────── */
const $  = id => document.getElementById(id);
const el = {
  app:         $("app"),
  // left
  ytWrap:      $("yt-wrap"),
  ytPlayer:    $("ytPlayer"),
  placeholder: $("yt-placeholder"),
  placeholderHint: $("placeholder-hint"),
  guestOverlay:$("guest-overlay"),
  ocHostName:  $("oc-host-name"),
  ocAccept:    $("oc-accept"),
  ocDecline:   $("oc-decline"),
  controls:    $("player-controls"),
  playPause:   $("mini-playpause"),
  miniTime:    $("mini-time"),
  slider:      $("mini-slider"),
  roleBadge:   $("role-badge"),
  syncToggle:  $("sync-toggle-btn"),
  mute:        $("mini-mute"),
  vol:         $("mini-vol"),
  urlBar:      $("url-bar"),
  urlInput:    $("url-input"),
  urlSend:     $("url-send"),
  // right
  statusPill:  $("status-pill"),
  liveDot:     $("live-dot"),
  statusText:  $("status-text"),
  presenceBtn: $("presence-btn"),
  presenceCount:$("presence-count"),
  chevron:     $("chevron"),
  exitBtn:     $("exit-btn"),
  userList:    $("user-list"),
  userListInner:$("user-list-inner"),
  loginForm:   $("login-form"),
  ni:          $("ni"),
  ki:          $("ki"),
  enterBtn:    $("enter-btn"),
  tripPreview: $("trip-preview"),
  syncBar:     $("sync-bar"),
  syncTime:    $("sync-time"),
  claimHost:   $("claim-host-btn"),
  freeMode:    $("free-mode-btn"),
  timeline:    $("timeline"),
  chatArea:    $("chat-input-area"),
  chatTA:      $("chat-textarea"),
  chatSend:    $("chat-send"),
};

/* ── Server time offset ─────────────────────────────────────────────── */
let srvOffset = 0;
onValue(ref(db, ".info/serverTimeOffset"), s => { srvOffset = s.val() || 0; });
const srvNow = () => Date.now() + srvOffset;

/* ── UID / Session ──────────────────────────────────────────────────── */
const uid = (() => {
  let id = localStorage.getItem("or_uid");
  if (!id) { id = crypto.randomUUID(); localStorage.setItem("or_uid", id); }
  return id;
})();

/* ── State ──────────────────────────────────────────────────────────── */
let ytPlayer     = null;
let isYtReady    = false;
let hasJoined    = false;
let curN         = "";          // display name
let amIOwner     = false;
let isHostSync   = false;       // host has sync ON
let isGuestFree  = false;       // guest free mode
let isSyncApproved = false;     // guest approved sync
let videoCache   = null;        // latest videoState snapshot
let lastVideoId  = null;
let lastActivityTs = srvNow();

let isDragging      = false;
let isComposing     = false;
let isLocalAct      = false;
let shieldTimer     = null;
let sliderTimer     = null;
let hbTimer         = null;
let inactiveTimer   = null;
let chatUnsubscribe = null;    // cleanup fn for onChildAdded

/* ── Shield (suppress remote→local feedback loops) ─────────────────── */
function shield(ms = 800) {
  isLocalAct = true;
  if (shieldTimer) clearTimeout(shieldTimer);
  shieldTimer = setTimeout(() => { isLocalAct = false; }, ms);
}

/* ── Helpers ────────────────────────────────────────────────────────── */
const esc  = t => (t||"").replace(/[&<>"']/g,
  c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const linkify = t => esc(t).replace(/(https?:\/\/[^\s<>"]+)/g,
  '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
const fmtTime = s => {
  if (!isFinite(s)||s<0) return "00:00";
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
};
const fmtClock = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const extractVid = url => {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|[?&]v=|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
};
const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; };

/* ── Trip ───────────────────────────────────────────────────────────── */
function tripHash(key) {
  if (!key) return "";
  const s = key + TRIP_SALT;
  let h = 0;
  for (let i=0;i<s.length;i++) { h=(h<<5)-h+s.charCodeAt(i); h|=0; }
  let t = Math.abs(h).toString(36).slice(0,5);
  while (t.length<5) t+="x";
  return "◆"+t;
}

function updateTripPreview() {
  const name = el.ni.value.replace(/[\s\u3000]+/g,"").trim().slice(0,10);
  const trip = tripHash(el.ki.value);
  el.tripPreview.textContent = (name||"名無し")+trip;
}
el.ni.addEventListener("input", updateTripPreview);
el.ki.addEventListener("input", updateTripPreview);

/* ── YouTube IFrame API ─────────────────────────────────────────────── */
(() => {
  if (window.YT?.Player) { isYtReady=true; return; }
  window.onYouTubeIframeAPIReady = () => { isYtReady=true; };
  const s = document.createElement("script");
  s.src = "https://www.youtube.com/iframe_api";
  s.async = true;
  document.head.appendChild(s);
})();

/* ── Player management ──────────────────────────────────────────────── */
function getTargetTime(state) {
  if (!state) return 0;
  let t = state.currentTime || 0;
  if (state.status === "playing" && state.isSyncing) {
    t += (srvNow() - (state.timestamp||srvNow())) / 1000;
  }
  return Math.max(0, t);
}

function buildPlayer(videoId, startSec) {
  const build = () => {
    if (!isYtReady||!window.YT?.Player) { setTimeout(build,100); return; }
    lastVideoId = videoId;
    ytPlayer = new YT.Player("ytPlayer", {
      videoId,
      playerVars:{autoplay:1,playsinline:1,controls:1,rel:0,mute:1,
                  start:Math.max(0,Math.floor(startSec))},
      events:{
        onReady(e){ e.target.mute(); e.target.setVolume(0); el.vol.value=0; updateMuteIcon(0); },
        onStateChange: onPlayerStateChange
      }
    });
  };
  build();
}

function loadOrSwap(videoId, targetTime) {
  if (!videoId) return;
  // Already loaded same video — just seek/play/pause
  if (ytPlayer && lastVideoId===videoId) {
    applyControl(videoCache?.status||"paused", targetTime);
    return;
  }
  lastVideoId = videoId;
  shield(2500);
  // If player exists, load new video into it
  if (ytPlayer?.loadVideoById) {
    try {
      ytPlayer.mute(); ytPlayer.setVolume(0);
      ytPlayer.loadVideoById({videoId, startSeconds:Math.max(0,Math.floor(targetTime))});
      el.vol.value=0; updateMuteIcon(0);
      return;
    } catch {
      try { ytPlayer.destroy(); } catch {}
      ytPlayer = null;
    }
  }
  buildPlayer(videoId, targetTime);
}

function applyControl(status, targetTime) {
  if (!ytPlayer?.getPlayerState) return;
  try {
    const cur  = ytPlayer.getCurrentTime();
    const pst  = ytPlayer.getPlayerState();
    if (Math.abs(cur - targetTime) > SYNC_DRIFT_S) ytPlayer.seekTo(targetTime, true);
    if (status==="playing" && pst!==1) { ytPlayer.mute(); ytPlayer.setVolume(0); ytPlayer.playVideo(); }
    else if (status==="paused" && pst!==2) ytPlayer.pauseVideo();
  } catch {}
}

function onPlayerStateChange(e) {
  if (!videoCache) return;
  const ps = e.data, ct = ytPlayer?.getCurrentTime?.()||0;

  // Video ended
  if (ps===0) {
    const dur = ytPlayer?.getDuration?.()||0;
    if (amIOwner) {
      shield(1200);
      ytPlayer.seekTo(Math.max(0,dur-0.5),true); ytPlayer.pauseVideo();
      if (isHostSync) dbVideoUpdate({status:"paused",currentTime:Math.max(0,dur-0.5),timestamp:srvNow()});
    } else if (isGuestFree||!isHostSync) {
      ytPlayer.seekTo(Math.max(0,dur-0.5),true); ytPlayer.pauseVideo();
    }
    return;
  }

  if (isLocalAct) return;

  if (amIOwner) {
    if (!isHostSync) return;
    if (ps===1 && videoCache.status!=="playing")
      dbVideoUpdate({status:"playing",currentTime:ct,timestamp:srvNow()});
    else if (ps===2 && videoCache.status!=="paused")
      dbVideoUpdate({status:"paused",currentTime:ct,timestamp:srvNow()});
  } else {
    if (!isSyncApproved||!isHostSync||isGuestFree) return;
    if (videoCache.status==="playing" && ps!==1 && ps!==3) {
      setTimeout(()=>{ if (!isLocalAct&&!isGuestFree&&isHostSync&&ytPlayer)
        { try{ytPlayer.mute();ytPlayer.setVolume(0);ytPlayer.playVideo();}catch{} } },200);
    } else if (videoCache.status==="paused" && ps===1) {
      setTimeout(()=>{ if (!isLocalAct&&!isGuestFree&&isHostSync&&ytPlayer)
        { try{ytPlayer.pauseVideo();}catch{} } },200);
    }
  }
}

/* ── DB helpers ─────────────────────────────────────────────────────── */
const videoRef   = () => ref(db, `rooms/${ROOM}/videoState`);
const dbVideoSet = d => set(videoRef(), d);
const dbVideoUpd = d => update(videoRef(), d);
// Debounced version for slider
const dbVideoUpdate = debounce(dbVideoUpd, 150);

function updateMuteIcon(v) { el.mute.textContent = v===0?"🔇":"🔊"; }

/* ── UI: role / status ──────────────────────────────────────────────── */
function updateUI() {
  const pill    = el.statusPill;
  const dot     = el.liveDot;
  const rb      = el.roleBadge;
  const st      = el.syncToggle;

  // Clear classes helper
  const setClass = (elem, ...classes) => { elem.className = classes.join(" "); };

  // ── HOST ──
  if (amIOwner) {
    el.claimHost.classList.remove("show");
    el.freeMode.classList.remove("show");
    el.slider.disabled = false;
    st.classList.remove("hidden");

    if (isHostSync) {
      // HOST + SYNC ON
      setClass(pill, "sp-host-sync");
      dot.className  = "live-dot dot-amber";
      el.statusText.textContent = "🔴 ホスト・同期中";
      setClass(rb, "badge-host-sync");
      rb.textContent = "👑 同期中";
      st.textContent = "同期を停止";
      setClass(st, "stb-stop");
    } else {
      // HOST + SYNC OFF
      setClass(pill, "sp-host-nosync");
      dot.className  = "live-dot dot-off";
      el.statusText.textContent = "👑 ホスト";
      setClass(rb, "badge-host-nosync");
      rb.textContent = "👑 ホスト";
      st.textContent = "同期を開始";
      setClass(st, "stb-start");
    }
    return;
  }

  // ── GUEST ──
  st.classList.add("hidden");

  if (!isHostSync) {
    // No active sync
    el.claimHost.classList.add("show");
    el.freeMode.classList.remove("show");
    el.slider.disabled = false;
    setClass(pill, "sp-nosync");
    dot.className = "live-dot dot-off";
    el.statusText.textContent = "同期なし";
    setClass(rb, "badge-guest-nosync");
    rb.textContent = "ゲスト";
    return;
  }

  // Host sync is ON
  el.claimHost.classList.add("show");
  el.freeMode.classList.add("show");

  if (isGuestFree) {
    // GUEST + FREE
    el.slider.disabled = false;
    setClass(pill, "sp-free");
    dot.className = "live-dot dot-off";
    el.statusText.textContent = "🎧 自由視聴中";
    setClass(rb, "badge-guest-free");
    rb.textContent = "自由視聴";
    el.freeMode.textContent   = "← 同期に戻る";
    setClass(el.freeMode, "fmb-return","show");
  } else if (isSyncApproved) {
    // GUEST + SYNCING
    el.slider.disabled = true;
    setClass(pill, "sp-syncing");
    dot.className = "live-dot dot-green";
    el.statusText.textContent = "🟢 ゲスト・同期中";
    setClass(rb, "badge-guest-sync");
    rb.textContent = "🔄 同期中";
    el.freeMode.textContent   = "自由視聴";
    setClass(el.freeMode, "fmb-free","show");
  } else {
    // GUEST + PENDING (not approved)
    el.slider.disabled = true;
    setClass(pill, "sp-pending");
    dot.className = "live-dot dot-rose";
    el.statusText.textContent = "⏳ 同期待機中";
    setClass(rb, "badge-guest-nosync");
    rb.textContent = "待機中";
    el.freeMode.textContent   = "自由視聴";
    setClass(el.freeMode, "fmb-free","show");
  }
}

/* ── Video state listener ────────────────────────────────────────────── */
function bindVideoState() {
  onValue(videoRef(), snap => {
    if (!snap.exists()) {
      videoCache=null; amIOwner=false; isHostSync=false;
      if (ytPlayer) { try{ytPlayer.destroy();}catch{}; ytPlayer=null; }
      lastVideoId=null; isSyncApproved=false; isGuestFree=false;
      el.placeholder.style.display="flex";
      el.placeholderHint.textContent="YouTubeのURLを貼り付けて動画を共有できます";
      updateUI(); return;
    }

    const state = snap.val();
    videoCache   = state;
    const wasOwner = amIOwner;
    amIOwner    = (state.owner===uid);
    if (!wasOwner&&amIOwner) isSyncApproved=true;
    isHostSync  = !!state.isSyncing;

    const targetTime = getTargetTime(state);

    // ── HOST ──
    if (amIOwner) {
      el.guestOverlay.classList.remove("show");
      el.placeholder.style.display="none";
      updateUI();
      if (lastVideoId!==state.videoId||!ytPlayer) loadOrSwap(state.videoId, targetTime);
      return;
    }

    // ── GUEST ──
    if (!isHostSync) {
      updateUI();
      if (lastVideoId!==state.videoId||!ytPlayer) loadOrSwap(state.videoId, state.currentTime||0);
      return;
    }

    // Host sync is ON — check approval
    if (lastVideoId!==state.videoId&&lastVideoId!==null) {
      const approved = localStorage.getItem("or_approved")==="true";
      if (!approved) {
        isSyncApproved=false;
        el.ocHostName.textContent=`${state.ownerName||"ホスト"}の動画に参加しますか？`;
        el.guestOverlay.classList.add("show");
        el.placeholder.style.display="none";
        updateUI(); return;
      }
      isSyncApproved=true;
    }

    if (!isSyncApproved) { updateUI(); return; }

    el.guestOverlay.classList.remove("show");
    el.placeholder.style.display="none";
    updateUI();

    if (lastVideoId!==state.videoId||!ytPlayer) {
      loadOrSwap(state.videoId, targetTime);
    } else if (!isLocalAct&&!isGuestFree) {
      applyControl(state.status, targetTime);
    }
  });
}

/* ── Presence ───────────────────────────────────────────────────────── */
function bindPresence() {
  onValue(ref(db, `presence/${ROOM}`), async snap => {
    const users = Object.values(snap.val()||{});
    el.presenceCount.textContent = users.length;

    if (users.length===0) {
      el.userListInner.innerHTML=`<div style="color:var(--muted2);font-size:10px;text-align:center;padding:8px">誰もいません</div>`;
      try { await set(ref(db,`chat/${ROOM}`),null); await set(ref(db,`rooms/${ROOM}`),null); } catch{}
      return;
    }

    // Self first
    users.sort((a,b)=>(a.uid===uid?-1:b.uid===uid?1:0));

    el.userListInner.innerHTML = users.map(u=>{
      const isMe = u.uid===uid;
      const nameCls = isMe?"user-name me":"user-name";
      const label   = esc(u.name)+(isMe?" (自分)":"");
      const joined  = u.joinedAt?fmtClock(u.joinedAt):"";
      const isOwner = videoCache&&videoCache.owner===u.uid;

      let action="";
      if (hasJoined&&amIOwner&&!isMe)
        action=`<button class="btn-transfer" onclick="window.__handOver('${esc(u.uid)}','${esc(u.name)}')">譲渡</button>`;
      else if (isOwner)
        action=`<span style="color:var(--amber);font-size:11px">👑</span>`;

      return `<div class="user-row">
        <div style="display:flex;align-items:center;min-width:0;gap:4px">
          <span class="${nameCls}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</span>
          ${joined?`<span class="user-meta">${joined}入室</span>`:""}
        </div>
        <div style="flex-shrink:0">${action}</div>
      </div>`;
    }).join("");
  });
}

/* ── Hand over host ─────────────────────────────────────────────────── */
window.__handOver = async (targetUid, targetName) => {
  if (!amIOwner||!videoCache) return;
  if (!confirm(`${targetName} にホストを譲渡しますか？`)) return;
  shield(2000);
  await update(videoRef(), {owner:targetUid,ownerName:targetName,timestamp:srvNow(),isSyncing:false});
  await push(ref(db,`chat/${ROOM}`),{type:"sys",text:`→ ${targetName} にホストを譲渡しました`,time:srvNow(),fromUid:uid,fallbackName:curN});
  el.userList.classList.remove("open");
  el.chevron.classList.remove("open");
};

/* ── Chat ────────────────────────────────────────────────────────────── */
function addMessage(m, key) {
  // Deduplicate
  if (document.getElementById("msg-"+key)) return;

  const isMe = (m.fromUid===uid||m.uid===uid);
  const time  = m.time?fmtClock(m.time):"";

  const el_ = document.createElement("div");
  el_.id = "msg-"+key;

  if (m.type==="sys") {
    el_.className = "sys-msg";
    const who = isMe?esc(curN):(m.fallbackName?esc(m.fallbackName):"");
    el_.innerHTML = `${who}${esc(m.text)} <span style="color:var(--muted2);font-size:9px">${time}</span>`;
  } else {
    el_.className = `msg ${isMe?"me":"other"}`;
    const vid = extractVid(m.text||"");
    const crownBtn = amIOwner&&!isMe&&(m.uid||m.fromUid)
      ? `<button onclick="window.__handOver('${esc(m.uid||m.fromUid)}','${esc(m.name)}')" style="font-size:9px;color:var(--amber);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 4px;margin-left:4px;cursor:pointer">譲</button>`
      : "";
    const embedHtml = vid ? `
      <div class="yt-card">
        <img src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" alt="thumbnail" loading="lazy">
        <button class="yt-card-btn" onclick="window.__shareVid('${vid}')">▶ この動画を共有再生</button>
      </div>` : "";
    el_.innerHTML = `
      <div class="msg-meta">
        <span class="name ${isMe?"me":""}">${esc(m.name||curN)}</span>
        ${!isMe?crownBtn:""}
        <span style="font-family:sans-serif;font-size:9px;color:var(--muted2)">${time}</span>
      </div>
      <div class="msg-bubble">${linkify(m.text||"")}${embedHtml}</div>`;
  }

  // Insert at top (newest first)
  el.timeline.insertBefore(el_, el.timeline.firstChild);
  el.timeline.scrollTop = 0;}

function bindChat() {
  // Clean up previous listener
  if (chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe=null; }
  el.timeline.innerHTML="";

  const chatRef = query(ref(db,`chat/${ROOM}`), orderByChild("time"), limitToLast(CHAT_LIMIT));
  const unsub = onChildAdded(chatRef, snap => {
    addMessage(snap.val(), snap.key);
  });
  chatUnsubscribe = () => off(chatRef, "child_added", unsub);
}

/* ── Send message ────────────────────────────────────────────────────── */
async function sendMsg() {
  const txt = el.chatTA.value.trim();
  if (!txt||isComposing) return;
  el.chatTA.value=""; el.chatTA.style.height="auto";
  lastActivityTs = srvNow();
  try {
    await push(ref(db,`chat/${ROOM}`),{name:curN,text:txt,time:srvNow(),uid,fromUid:uid});
  } catch { alert("送信に失敗しました"); }
}

/* ── Share video ─────────────────────────────────────────────────────── */
window.__shareVid = vid => { if (hasJoined) setVideoLive(vid); };

async function setVideoLive(vid) {
  amIOwner=true; isSyncApproved=true; isGuestFree=false; isHostSync=false;
  localStorage.setItem("or_approved","true");
  shield(2000);
  await dbVideoSet({videoId:vid,status:"paused",currentTime:0,timestamp:srvNow(),
                    owner:uid,ownerName:curN,isSyncing:false});
  updateUI();
}

/* ── Join / Leave ────────────────────────────────────────────────────── */
async function joinRoom(name, key="", isRestore=false) {
  if (hasJoined) return;
  hasJoined = true;

  const trip = tripHash(key);
  curN = name.slice(0,10)+trip;

  localStorage.setItem("or_name", name.slice(0,10));
  localStorage.setItem("or_joined","true");
  if (key) localStorage.setItem("or_key",key); else localStorage.removeItem("or_key");

  const joinTs = srvNow();
  lastActivityTs = joinTs;

  const presRef = ref(db,`presence/${ROOM}/${uid}`);
  await set(presRef,{name:curN,uid,joinedAt:joinTs,lastActive:joinTs});
  onDisconnect(presRef).remove();

  // UI: show chat
  el.loginForm.classList.add("hidden");
  el.exitBtn.classList.add("show");
  el.urlBar.classList.add("show");
  el.chatArea.classList.add("show");
  el.urlInput.disabled=false; el.urlSend.disabled=false;
  el.playPause.disabled=false; el.vol.disabled=false; el.mute.disabled=false;
  el.chatSend.disabled=false;
  el.placeholder.style.display="flex";

  bindChat();
  bindVideoState();

  // Slider polling
  if (sliderTimer) clearInterval(sliderTimer);
  sliderTimer = setInterval(()=>{
    if (!ytPlayer?.getCurrentTime||isDragging) return;
    try {
      const cur = ytPlayer.getCurrentTime();
      const dur = ytPlayer.getDuration();
      if (dur>0) {
        el.slider.max  = String(Math.floor(dur));
        el.slider.value= String(Math.floor(cur));
        el.syncTime.textContent  = `${fmtTime(cur)} / ${fmtTime(dur)}`;
        el.miniTime.textContent  = fmtTime(cur);
      }
      const ps = ytPlayer.getPlayerState();
      el.playPause.textContent = ps===1?"⏸":"▶";
    } catch {}
  }, 333);

  // Presence heartbeat
  if (hbTimer) clearInterval(hbTimer);
  hbTimer = setInterval(async ()=>{
    try { await update(ref(db,`presence/${ROOM}/${uid}`),{lastActive:lastActivityTs}); } catch {}
  }, PRESENCE_HB);

  // Inactive check
  if (inactiveTimer) clearInterval(inactiveTimer);
  inactiveTimer = setInterval(()=>{
    if (srvNow()-lastActivityTs>INACTIVE_MS) leaveRoom(true);
  }, 30_000);

  if (!isRestore&&!sessionStorage.getItem("or_sess")) {
    sessionStorage.setItem("or_sess","1");
    await push(ref(db,`chat/${ROOM}`),{type:"sys",text:"が入室しました",time:srvNow(),fromUid:uid,fallbackName:curN});
  }
}

async function cleanRoom() {
  try {
    await remove(ref(db,`presence/${ROOM}/${uid}`));
    const snap = await get(ref(db,`presence/${ROOM}`));
    if (!snap.exists()||Object.keys(snap.val()).length===0) {
      await set(ref(db,`chat/${ROOM}`),null);
      await set(ref(db,`rooms/${ROOM}`),null);
    }
  } catch {}
}

async function leaveRoom(isAuto=false) {
  if (sliderTimer) clearInterval(sliderTimer);
  if (hbTimer) clearInterval(hbTimer);
  if (inactiveTimer) clearInterval(inactiveTimer);
  if (chatUnsubscribe) chatUnsubscribe();

  ["or_joined","or_key"].forEach(k=>localStorage.removeItem(k));
  sessionStorage.removeItem("or_sess");

  if (!hasJoined) return;
  try {
    await push(ref(db,`chat/${ROOM}`),{type:"sys",
      text: isAuto?"が30分無言のため自動退出しました":"が退出しました",
      time:srvNow(),fromUid:uid,fallbackName:curN});
    await cleanRoom();
  } catch {}
  window.location.reload();
}

/* ── Control events ──────────────────────────────────────────────────── */
// Play/Pause
el.playPause.addEventListener("click", ()=>{
  if (!ytPlayer?.getPlayerState) return;
  const ps = ytPlayer.getPlayerState();
  if (amIOwner) {
    shield(600);
    if (ps===1) {
      ytPlayer.pauseVideo();
      if (isHostSync) dbVideoUpdate({status:"paused",currentTime:ytPlayer.getCurrentTime(),timestamp:srvNow()});
    } else {
      ytPlayer.mute(); ytPlayer.setVolume(0); ytPlayer.playVideo();
      if (isHostSync) dbVideoUpdate({status:"playing",currentTime:ytPlayer.getCurrentTime(),timestamp:srvNow()});
    }
  } else if (isGuestFree||!isHostSync) {
    if (ps===1) ytPlayer.pauseVideo();
    else { ytPlayer.mute(); ytPlayer.setVolume(0); ytPlayer.playVideo(); }
  }
});

// Slider
el.slider.addEventListener("pointerdown", ()=>{ isDragging=true; });
el.slider.addEventListener("input",       ()=>{ isDragging=true; });
el.slider.addEventListener("change", ()=>{
  const t = Number(el.slider.value);
  if (ytPlayer?.seekTo) {
    shield(1000); ytPlayer.mute(); ytPlayer.setVolume(0); ytPlayer.seekTo(t,true);
    if (amIOwner&&isHostSync) dbVideoUpdate({currentTime:t,timestamp:srvNow()});
  }
  isDragging=false;
});
el.slider.addEventListener("pointerup", ()=>{ isDragging=false; });

// Volume
el.vol.addEventListener("input", ()=>{
  const v = Number(el.vol.value);
  updateMuteIcon(v);
  if (ytPlayer?.setVolume) {
    if (v===0) ytPlayer.mute();
    else { ytPlayer.unMute(); ytPlayer.setVolume(v); }
  }
});
el.mute.addEventListener("click", ()=>{
  if (!ytPlayer) return;
  if (ytPlayer.isMuted?.()) {
    const v=30; el.vol.value=v; ytPlayer.unMute(); ytPlayer.setVolume(v); updateMuteIcon(v);
  } else {
    ytPlayer.mute(); el.vol.value=0; updateMuteIcon(0);
  }
});

// Sync toggle (host)
el.syncToggle.addEventListener("click", async ()=>{
  if (!amIOwner||!ytPlayer||!videoCache) return;
  shield(1500);
  const cur  = ytPlayer.getCurrentTime?.()||0;
  const play = ytPlayer.getPlayerState()===1;
  isHostSync = !isHostSync;
  await dbVideoUpd({status:play?"playing":"paused",currentTime:cur,timestamp:srvNow(),isSyncing:isHostSync});
  updateUI();
});

// URL send
async function shareUrl() {
  const vid = extractVid(el.urlInput.value.trim());
  if (!vid) { alert("有効なYouTube URLを入力してください"); return; }
  el.urlInput.value="";
  await setVideoLive(vid);
}
el.urlSend.addEventListener("click", shareUrl);
el.urlInput.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); shareUrl(); }});

// Guest overlay
el.ocAccept.addEventListener("click", ()=>{
  isSyncApproved=true; localStorage.setItem("or_approved","true");
  el.guestOverlay.classList.remove("show");
  updateUI();
  if (videoCache) { const t=getTargetTime(videoCache); loadOrSwap(videoCache.videoId,t); }
});
el.ocDecline.addEventListener("click", ()=>{
  isGuestFree=true; localStorage.setItem("or_approved","false");
  el.guestOverlay.classList.remove("show");
  updateUI();
  if (videoCache) loadOrSwap(videoCache.videoId, videoCache.currentTime||0);
});

// Claim host
el.claimHost.addEventListener("click", async ()=>{
  if (!videoCache) return;
  amIOwner=true; isGuestFree=false; isSyncApproved=true; isHostSync=false;
  localStorage.setItem("or_approved","true");
  shield(2000);
  await dbVideoSet({
    videoId:videoCache.videoId,
    status: ytPlayer?.getPlayerState()===1?"playing":"paused",
    currentTime: ytPlayer?.getCurrentTime?.()||0,
    timestamp:srvNow(),owner:uid,ownerName:curN,isSyncing:false
  });
  updateUI();
});

// Free mode
el.freeMode.addEventListener("click", ()=>{
  isGuestFree=!isGuestFree;
  localStorage.setItem("or_approved", isGuestFree?"false":"true");
  if (!isGuestFree) {
    isSyncApproved=true;
    el.guestOverlay.classList.remove("show");
    if (videoCache) { const t=getTargetTime(videoCache); loadOrSwap(videoCache.videoId,t); }
  }
  updateUI();
});

// Presence toggle
el.presenceBtn.addEventListener("click", ()=>{
  el.userList.classList.toggle("open");
  el.chevron.classList.toggle("open");
});

// Chat
el.chatTA.addEventListener("compositionstart", ()=>{ isComposing=true; });
el.chatTA.addEventListener("compositionend",   ()=>{ isComposing=false; });
el.chatTA.addEventListener("keydown", e=>{
  if (e.key==="Enter"&&!e.shiftKey&&!isComposing) { e.preventDefault(); sendMsg(); }
});
// Auto-resize textarea
el.chatTA.addEventListener("input", ()=>{
  lastActivityTs = srvNow();
  el.chatTA.style.height="auto";
  el.chatTA.style.height=Math.min(el.chatTA.scrollHeight,80)+"px";
});
el.chatSend.addEventListener("click", ()=>sendMsg());
// Enter room
el.enterBtn.addEventListener("click", ()=>{
  const n = el.ni.value.replace(/[\s\u3000]+/g,"").trim();
  if (!n) { alert("名前を入力してください"); return; }
  joinRoom(n, el.ki.value);
});
el.ni.addEventListener("keydown", e=>{ if(e.key==="Enter") el.enterBtn.click(); });

// Exit
el.exitBtn.addEventListener("click", ()=>{ if(confirm("退出しますか？")) leaveRoom(false); });

/* ── Keyboard / Visual Viewport resize (iOS fix) ──────────────────────── */
if (window.visualViewport) {
  let rafId;
  const onVVResize = () => {
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(()=>{
      const h = window.visualViewport.height;
      el.app.style.height = h+"px";
      window.scrollTo(0,0);
    });
  };
  window.visualViewport.addEventListener("resize", onVVResize);
  window.visualViewport.addEventListener("scroll", onVVResize);
}

/* ── Beforeunload cleanup ─────────────────────────────────────────────── */
window.addEventListener("pagehide", ()=>{ if(hasJoined) cleanRoom(); });
window.addEventListener("beforeunload", ()=>{ if(hasJoined) cleanRoom(); });

/* ── Init ─────────────────────────────────────────────────────────────── */
window.addEventListener("DOMContentLoaded", ()=>{
  // Restore saved name
  const savedName = localStorage.getItem("or_name")||"";
  el.ni.value = savedName||`ゲスト${100+Math.floor(Math.random()*900)}`;
  el.ki.value = localStorage.getItem("or_key")||"";
  updateTripPreview();

  el.vol.value=0; updateMuteIcon(0);
  updateUI();
  bindPresence();

  // Auto-restore session
  if (localStorage.getItem("or_joined")==="true"&&savedName) {
    joinRoom(savedName, localStorage.getItem("or_key")||"", true);
  }
});
</script>
</body>
</html>
