<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<title>Nezu Tube Chat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090b;--sf:#111113;--sf2:#18181b;--bd:#27272a;--bd2:#3f3f46;
  --tx:#f4f4f5;--mu:#71717a;--mu2:#52525b;
  --in:#6366f1;--in-d:#312e81;--in-g:rgba(99,102,241,.2);
  --am:#f59e0b;--am-d:#451a03;--am-g:rgba(245,158,11,.18);
  --em:#10b981;--em-d:#064e3b;--em-g:rgba(16,185,129,.18);
  --ro:#f43f5e;--ro-d:#4c0519;
  --safe:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic","Meiryo",
    system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-user-select:none;user-select:none;touch-action:manipulation;overscroll-behavior:none;
}
input,textarea{font-family:inherit;-webkit-user-select:text;user-select:text}
button{cursor:pointer;font-family:inherit;border:none;background:none}
button:focus-visible{outline:2px solid var(--in);outline-offset:2px}
a{color:var(--in)}a:hover{text-decoration:underline}

/* ── Layout ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;height:100dvh;overflow:hidden}
@supports(-webkit-touch-callout:none){#app{height:-webkit-fill-available}}
@media(min-width:768px){
  #app{flex-direction:row}
  #lp{width:55%;max-height:100%;border-right:1px solid var(--bd);border-bottom:none}
  #rp{flex:1;min-width:0}
}
#lp{display:flex;flex-direction:column;background:#000;
    border-bottom:1px solid var(--bd);max-height:50vh;flex-shrink:0}
@media(min-width:768px){#lp{max-height:100%}}
#rp{display:flex;flex-direction:column;background:var(--sf);flex:1;min-height:0;overflow:hidden}

/* ── Video ── */
#yw{position:relative;width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0}
#ytPlayer{width:100%;height:100%;display:block}
#yph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#050507;z-index:10;gap:6px;pointer-events:none}
#yph .brand{color:var(--in);font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase}
#yph .hint{color:var(--mu);font-size:10px;text-align:center;padding:0 16px;line-height:1.5}

/* guest sync overlay */
#gov{position:absolute;inset:0;background:rgba(0,0,0,.96);z-index:30;
  display:none;align-items:center;justify-content:center;padding:16px}
#gov.show{display:flex}
.ovc{background:var(--sf2);border:1px solid var(--bd);border-radius:14px;
  padding:20px;max-width:300px;width:100%;text-align:center}
.ovc .ol{font-size:9px;font-weight:800;letter-spacing:.15em;color:var(--in);
  text-transform:uppercase;margin-bottom:8px}
.ovc .oh{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:6px}
.ovc .od{font-size:10px;color:#a1a1aa;line-height:1.6;margin-bottom:14px}
.obs{display:flex;gap:8px}
.btn-dec{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:700;
  background:var(--sf2);color:var(--mu);border:1px solid var(--bd);transition:background .15s}
.btn-dec:hover{background:var(--bd)}
.btn-acc{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:700;
  background:var(--in);color:#fff;transition:background .15s}
.btn-acc:hover{background:#4f46e5}

/*
  ── プレイヤーコントロールバー ──
  ホスト: 再生ボタン + シークバー + 時間 + 同期ボタン  → 全部表示
  ゲスト(同期中): 状態表示のみ (コントロール非表示)
  ゲスト(自由): 非表示 (YT標準UIに任せる)
  未入室: 非表示
*/
#pc{
  background:var(--sf);border-top:1px solid var(--bd);
  padding:6px 9px;flex-shrink:0;display:none;flex-direction:column;gap:5px
}
#pc.host{display:flex}        /* ホスト用: 全コントロール */
#pc.guest-sync{display:flex}  /* ゲスト同期中: 状態行のみ */

/* ホスト用コントロール行 (ゲスト同期中は非表示) */
.host-ctrl{display:none}
#pc.host .host-ctrl{display:flex;align-items:center;gap:6px;width:100%}

/* 再生ボタン */
#mpp{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  border-radius:6px;padding:2px 8px;font-size:14px;min-width:32px;
  transition:background .15s;flex-shrink:0}
#mpp:hover{background:var(--bd2)}

/* 時間表示 */
#mt{font-size:10px;font-family:monospace;color:var(--mu);flex-shrink:0;white-space:nowrap}

/* シークバー */
#ms{flex:1;height:4px;border-radius:2px;cursor:pointer;
  accent-color:var(--in);background:var(--bd2);-webkit-appearance:none;appearance:none}
#ms::-webkit-slider-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--in);-webkit-appearance:none;cursor:pointer}

/* 同期ボタン */
#stb{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:800;
  transition:all .15s;white-space:nowrap;border:1px solid transparent;flex-shrink:0}
.stb-go{background:var(--am-d);color:var(--am);border-color:rgba(245,158,11,.4)}
.stb-go:hover{background:rgba(245,158,11,.18)}
.stb-st{background:var(--ro-d);color:var(--ro);border-color:rgba(244,63,94,.4)}
.stb-st:hover{background:rgba(244,63,94,.18)}

/* 状態行 (ホスト・ゲスト同期中共通) */
.state-row{display:flex;align-items:center;gap:6px}
#sp{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:800;white-space:nowrap;transition:all .2s;
  border:1px solid transparent;flex-shrink:0}
.sp-hs{background:var(--am-d);color:var(--am);border-color:rgba(245,158,11,.35);box-shadow:0 0 7px var(--am-g)}
.sp-hn{background:var(--sf2);color:#a1a1aa;border-color:var(--bd)}
.sp-sy{background:var(--em-d);color:var(--em);border-color:rgba(16,185,129,.35);box-shadow:0 0 7px var(--em-g)}
.sp-no,.sp-fr{background:var(--sf2);color:#a1a1aa;border-color:var(--bd)}
.sp-pe{background:var(--ro-d);color:var(--ro);border-color:rgba(244,63,94,.35)}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .25s}
.ld-off{background:var(--mu2)}
.ld-am{background:var(--am);animation:blink .9s ease-in-out infinite}
.ld-gr{background:var(--em);animation:blink .9s ease-in-out infinite}
.ld-ro{background:var(--ro)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#stime{font-size:10px;font-family:monospace;color:var(--mu2);white-space:nowrap;margin-left:auto}

/* ── URL bar (ホストのみ) ── */
#ub{display:none;padding:6px 8px;background:var(--sf2);
  border-top:1px solid var(--bd);flex-shrink:0;gap:6px;align-items:center}
#ub.show{display:flex}
#ui{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:9px;
  color:var(--tx);font-size:12px;padding:5px 9px;transition:border-color .15s}
#ui:focus{outline:none;border-color:var(--in)}
.bsh{background:var(--in);color:#fff;font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:9px;transition:background .15s;
  box-shadow:0 2px 6px var(--in-g);flex-shrink:0}
.bsh:hover{background:#4f46e5}

/* ── Right header (1行) ── */
#ch{background:var(--sf2);border-bottom:1px solid var(--bd);
  padding:5px 8px;flex-shrink:0;display:flex;flex-direction:column;gap:4px}
#hr1{display:flex;align-items:center;gap:5px;overflow:hidden;flex-wrap:nowrap}

/* ヘッダーボタン共通 */
.hbtn{display:none;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
  transition:all .15s;white-space:nowrap;flex-shrink:0;border:1px solid transparent}
.hbtn.show{display:block}
#claim{background:rgba(245,158,11,.1);color:var(--am);border-color:rgba(245,158,11,.28)}
#claim:hover{background:rgba(245,158,11,.2)}
.fm-fr{background:var(--sf2);color:#a1a1aa;border-color:var(--bd)}
.fm-fr:hover{background:var(--bd)}
.fm-rt{background:rgba(99,102,241,.1);color:var(--in);border-color:rgba(99,102,241,.28)}
.fm-rt:hover{background:rgba(99,102,241,.2)}

/* 参加者ボタン */
#pbtn{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--bd);
  border-radius:7px;padding:2px 7px;font-size:10px;font-weight:700;color:var(--tx);
  transition:background .15s;white-space:nowrap;flex-shrink:0;margin-left:auto}
#pbtn:hover{background:var(--bd)}
#pc-cnt{color:var(--in);font-family:monospace}
.chv{font-size:7px;color:var(--mu);transition:transform .2s}
.chv.open{transform:rotate(180deg)}

/* 退出ボタン */
#xbtn{display:none;background:rgba(244,63,94,.07);color:var(--ro);
  border:1px solid rgba(244,63,94,.22);border-radius:7px;font-size:10px;font-weight:700;
  padding:2px 8px;transition:all .15s;flex-shrink:0;white-space:nowrap}
#xbtn.show{display:block}
#xbtn:hover{background:rgba(244,63,94,.16)}

/* 参加者リスト */
#ul{max-height:0;overflow:hidden;transition:max-height .22s ease-out}
#ul.open{max-height:140px;overflow-y:auto}
#uli{background:var(--bg);border:1px solid var(--bd);border-radius:7px;overflow:hidden}
.ur{display:flex;align-items:center;justify-content:space-between;
  padding:4px 9px;border-bottom:1px solid var(--bd);font-size:11px}
.ur:last-child{border-bottom:none}
.un{font-family:monospace;color:#a1a1aa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.un.me{color:var(--in);font-weight:700}
.um{font-size:9px;color:var(--mu2);flex-shrink:0;white-space:nowrap;margin-left:4px}
.btr{font-size:9px;color:var(--am);background:var(--bg);border:1px solid var(--bd);
  border-radius:4px;padding:1px 5px;cursor:pointer;transition:background .12s;flex-shrink:0;font-family:inherit}
.btr:hover{background:var(--am-d)}

/* ログインフォーム */
#lf{display:flex;flex-direction:column;gap:5px}
#lf.gone{display:none}
.lr{display:flex;gap:5px}
.inp-n{flex:1;min-width:0;background:var(--bg);border:1px solid var(--bd);border-radius:7px;
  color:var(--tx);font-size:12px;padding:4px 9px;transition:border-color .15s}
.inp-n:focus{outline:none;border-color:var(--in)}
.inp-k{width:80px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;
  color:var(--tx);font-size:12px;padding:4px 9px;transition:border-color .15s}
.inp-k:focus{outline:none;border-color:var(--in)}
.btn-en{background:var(--in);color:#fff;font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:7px;transition:background .15s;flex-shrink:0}
.btn-en:hover{background:#4f46e5}
.tp{font-size:10px;color:var(--mu2)}
.tp span{color:var(--in);font-family:monospace}

/* ── Timeline ── */
#tl{flex:1;min-height:0;overflow-y:auto;
  padding:8px 9px;display:flex;flex-direction:column;gap:7px;
  background:var(--bg);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  align-items:flex-start}
#tl::-webkit-scrollbar{width:3px}
#tl::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:88%;word-break:break-word;align-self:flex-start}
.mmeta{font-size:9px;color:var(--mu2);font-family:monospace;margin-bottom:2px;
  display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.mmeta .mn{color:#a1a1aa}
.mmeta .mn.me{color:var(--in)}
.mbub{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);
  border-radius:12px;padding:6px 11px;font-size:12px;line-height:1.55;
  -webkit-user-select:text;user-select:text}
.msg.me .mbub{background:var(--in-d);border-color:rgba(99,102,241,.25)}
.ytcard{margin-top:7px;background:var(--bg);border:1px solid var(--bd);
  border-radius:9px;overflow:hidden;max-width:210px}
.ytcard img{width:100%;height:auto;display:block}
.ytcard-btn{width:100%;padding:5px;font-size:10px;font-weight:700;
  background:var(--in);color:#fff;text-align:center;
  transition:background .15s;display:block;cursor:pointer;border:none;font-family:inherit}
.ytcard-btn:hover{background:#4f46e5}
.sysmsg{align-self:flex-start;font-size:10px;color:var(--mu2);
  background:var(--sf2);border:1px solid var(--bd);border-radius:20px;
  padding:2px 10px;max-width:95%;-webkit-user-select:text;user-select:text}

/* ── チャット入力 ── */
#cia{display:none;padding:6px 8px;background:var(--sf2);
  border-top:1px solid var(--bd);flex-shrink:0;gap:6px;
  padding-bottom:calc(6px + var(--safe))}
#cia.show{display:flex;align-items:flex-end}
#cta{flex:1;min-width:0;background:var(--bg);border:1px solid var(--bd);
  border-radius:11px;color:var(--tx);font-size:13px;padding:7px 11px;
  resize:none;line-height:1.4;max-height:76px;overflow-y:auto;
  transition:border-color .15s;-webkit-user-select:text;user-select:text}
#cta:focus{outline:none;border-color:var(--in)}
.bcs{background:var(--in);color:#fff;font-size:12px;font-weight:700;
  padding:7px 13px;border-radius:11px;transition:background .15s;
  flex-shrink:0;align-self:flex-end;box-shadow:0 2px 6px var(--in-g)}
.bcs:hover:not(:disabled){background:#4f46e5}
.bcs:disabled{opacity:.35;cursor:not-allowed}
</style>
</head>
<body>
<div id="app">

  <!-- ══ LEFT: 動画 ══ -->
  <div id="lp">
    <div id="yw">
      <div id="yph">
        <div class="brand">Nezu Tube Chat</div>
        <div class="hint" id="yph-hint">入室後にYouTube URLを共有できます</div>
      </div>
      <!-- ゲスト: 新動画の同期確認 -->
      <div id="gov">
        <div class="ovc">
          <div class="ol">🎬 同期リクエスト</div>
          <div class="oh" id="oc-host"></div>
          <div class="od">ホストの動画に同期しますか？<br>後からいつでも切り替えられます。</div>
          <div class="obs">
            <button class="btn-dec" id="oc-dec">自由視聴</button>
            <button class="btn-acc" id="oc-acc">▶ 同期する</button>
          </div>
        </div>
      </div>
      <div id="ytPlayer"></div>
    </div>

    <!--
      プレイヤーコントロール
      .host       → ホスト用 (再生・シーク・同期ボタン + 状態)
      .guest-sync → ゲスト同期中 (状態表示のみ)
      未入室/ゲスト自由視聴 → display:none
    -->
    <div id="pc">
      <!-- ホストのみ: 再生 + シーク + 時間 -->
      <div class="host-ctrl">
        <button id="mpp">▶</button>
        <span id="mt">00:00</span>
        <input type="range" id="ms" min="0" max="100" value="0" step="1">
      </div>
      <!-- ホスト・ゲスト同期中: 状態 + 時間 + [同期ボタン] -->
      <div class="state-row">
        <div id="sp" class="sp-no">
          <span class="ld ld-off" id="ld"></span>
          <span id="stx">---</span>
        </div>
        <button id="stb" class="stb-go">同期を開始</button>
        <span id="stime">00:00 / 00:00</span>
      </div>
    </div>

    <!-- URL入力 (ホストのみ) -->
    <div id="ub">
      <input type="url" id="ui" placeholder="YouTubeのURLを貼り付け..." autocomplete="off" inputmode="url">
      <button class="bsh" id="us">共有</button>
    </div>
  </div>

  <!-- ══ RIGHT: チャット ══ -->
  <div id="rp">
    <div id="ch">
      <div id="hr1">
        <button id="claim" class="hbtn">👑 ホスト取得</button>
        <button id="fmode" class="hbtn fm-fr">自由視聴</button>
        <button id="pbtn">
          <span>参加者</span><span id="pc-cnt">0</span>人
          <span class="chv" id="chv">▼</span>
        </button>
        <button id="xbtn">退出</button>
      </div>
      <div id="ul"><div id="uli"></div></div>
      <div id="lf">
        <div class="lr">
          <input type="text" id="ni" class="inp-n" placeholder="名前（10文字まで）" maxlength="20" autocomplete="username">
          <input type="password" id="ki" class="inp-k" placeholder="トリップキー" autocomplete="current-password">
          <button class="btn-en" id="eb">入室</button>
        </div>
        <div class="tp">表示名: <span id="tpv">---</span></div>
      </div>
    </div>

    <div id="tl" role="log" aria-live="polite"></div>

    <div id="cia">
      <textarea id="cta" rows="1" placeholder="メッセージを入力... (Enter送信)"></textarea>
      <button class="bcs" id="cs" disabled>送信</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, update, remove,
         query, orderByChild, onChildAdded, get, off,
         onDisconnect, limitToLast }
                           from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* ══ 定数 ══ */
const DB_URL      = "https://nezuochat-default-rtdb.asia-southeast1.firebasedatabase.app";
const ROOM        = "one_global_room";
const TRIP_SALT   = "NezuTubeSecretSalt_2026";
const INACTIVE_MS = 30 * 60 * 1000;
const DRIFT_S     = 1.5;
const HB_MS       = 20_000;
const CHAT_LIMIT  = 80;

/* ══ Firebase ══ */
const db = getDatabase(initializeApp({ databaseURL: DB_URL }));

/* ══ DOM ══ */
const $ = id => document.getElementById(id);
const E = {
  app:$("app"),
  yw:$("yw"), yph:$("yph"), yphHint:$("yph-hint"),
  gov:$("gov"), ocHost:$("oc-host"), ocAcc:$("oc-acc"), ocDec:$("oc-dec"),
  pc:$("pc"), mpp:$("mpp"), mt:$("mt"), ms:$("ms"),
  sp:$("sp"), ld:$("ld"), stx:$("stx"), stb:$("stb"), stime:$("stime"),
  ub:$("ub"), ui:$("ui"), us:$("us"),
  claim:$("claim"), fmode:$("fmode"),
  pbtn:$("pbtn"), pcCnt:$("pc-cnt"), chv:$("chv"),
  xbtn:$("xbtn"),
  ul:$("ul"), uli:$("uli"),
  lf:$("lf"), ni:$("ni"), ki:$("ki"), eb:$("eb"), tpv:$("tpv"),
  tl:$("tl"), cia:$("cia"), cta:$("cta"), cs:$("cs"),
};

/* ══ サーバー時刻 ══ */
let _off = 0;
onValue(ref(db, ".info/serverTimeOffset"), s => { _off = s.val() || 0; });
const now = () => Date.now() + _off;

/* ══ UID ══ */
const uid = (() => {
  let id = localStorage.getItem("or_uid");
  if (!id) { id = crypto.randomUUID(); localStorage.setItem("or_uid", id); }
  return id;
})();

/* ══ 状態
  ─────────────────────────────────────────
  役割と操作権限:

  ホスト
    同期ON  → 再生/シーク/一時停止 → DBに書いてゲストへ配信
    同期OFF → 自分だけ再生 (DBに書かない)
    → 独自コントロール: 再生・シーク・同期ボタン・状態表示

  ゲスト(同期中)
    → DB状態に自動追従。独自コントロール一切触れない。
    → 状態表示のみ

  ゲスト(自由視聴)
    → YouTube標準UIだけ使う。独自コントロール非表示。
    → 状態表示なし (ただしヘッダーの切替ボタンあり)

  未入室
    → 全コントロール非表示
  ─────────────────────────────────────────
══ */
let ytp        = null;
let ytReady    = false;
let joined     = false;
let curN       = "";

let amIOwner   = false;
let isHostSync = false;
let isGuestFree= false;
let isSyncOk   = false;

let vCache     = null;
let lastVid    = null;

let isDrag     = false;
let isComp     = false;
let lastActTs  = now();
let slTmr=null, hbTmr=null, inTmr=null, chatUnsub=null;

// shield: ホストが自分でDB書いた後に自分のonValue反応を抑制
let shieldUntil = 0;
const shield   = (ms=800) => { shieldUntil = Date.now() + ms; };
const shielded = () => amIOwner && Date.now() < shieldUntil;

/* ══ ユーティリティ ══ */
const esc = t => (t||"").replace(/[&<>"']/g,
  c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const linkify = t => esc(t).replace(/(https?:\/\/[^\s<>"]+)/g,
  '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
const fmtT = s => {
  if (!isFinite(s)||s<0) return "00:00";
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
};
const fmtCk = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const exVid = url => {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|[?&]v=|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
};

/* ══ Trip ══ */
function tripHash(key) {
  if (!key) return "";
  let h=0; const s=key+TRIP_SALT;
  for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}
  let t=Math.abs(h).toString(36).slice(0,5);
  while(t.length<5) t+="x";
  return "◆"+t;
}
function updateTP(){
  const n=E.ni.value.replace(/[\s\u3000]+/g,"").trim().slice(0,10);
  E.tpv.textContent=(n||"名無し")+tripHash(E.ki.value);
}
E.ni.addEventListener("input",updateTP);
E.ki.addEventListener("input",updateTP);

/* ══ YT API ══ */
(()=>{
  if(window.YT?.Player){ytReady=true;return;}
  window.onYouTubeIframeAPIReady=()=>{ytReady=true;};
  const s=document.createElement("script");
  s.src="https://www.youtube.com/iframe_api";s.async=true;
  document.head.appendChild(s);
})();

/* ══ プレイヤー ══ */
function calcT(state){
  let t=state.currentTime||0;
  if(state.status==="playing"&&state.isSyncing)
    t+=(now()-(state.timestamp||now()))/1000;
  return Math.max(0,t);
}

function buildPlayer(vid,sec){
  const go=()=>{
    if(!ytReady||!window.YT?.Player){setTimeout(go,120);return;}
    lastVid=vid;
    ytp=new YT.Player("ytPlayer",{
      videoId:vid,
      playerVars:{
        autoplay:1,playsinline:1,controls:1,rel:0,
        // ミュートしない (ユーザーが音量を自分で操作)
        // ただし自動再生のためブラウザポリシー回避で最初だけmute
        mute:1,
        start:Math.max(0,Math.floor(sec))
      },
      events:{
        onReady: e => {
          // 初回のみミュート解除を促す (自動再生制限対策)
          // ユーザーがYT標準UIで音量操作するので何もしない
        },
        onStateChange: onPSC,
      },
    });
  };
  go();
}

function loadVid(vid,sec){
  if(!vid)return;
  if(ytp&&lastVid===vid){applyCtrl(vCache?.status||"paused",sec);return;}
  lastVid=vid;
  if(ytp?.loadVideoById){
    try{
      ytp.loadVideoById({videoId:vid,startSeconds:Math.max(0,Math.floor(sec))});
      return;
    } catch{try{ytp.destroy();}catch{};ytp=null;}
  }
  buildPlayer(vid,sec);
}

function applyCtrl(status,sec){
  if(!ytp?.getPlayerState)return;
  try{
    const cur=ytp.getCurrentTime(), ps=ytp.getPlayerState();
    if(Math.abs(cur-sec)>DRIFT_S) ytp.seekTo(sec,true);
    if(status==="playing"&&ps!==1) ytp.playVideo();
    else if(status==="paused"&&ps!==2) ytp.pauseVideo();
  }catch{}
}

/* ══ onPlayerStateChange ══ */
function onPSC(e){
  if(!vCache)return;
  const ps=e.data, ct=ytp?.getCurrentTime?.()||0, dur=ytp?.getDuration?.()||0;

  // 動画終了
  if(ps===0){
    const ep=Math.max(0,dur-0.5);
    if(amIOwner){
      shield(1200); ytp.seekTo(ep,true); ytp.pauseVideo();
      if(isHostSync) wV({status:"paused",currentTime:ep,timestamp:now()});
    } else if(isGuestFree||!isHostSync){
      ytp.seekTo(ep,true); ytp.pauseVideo();
    }
    return;
  }

  // ホスト
  if(amIOwner){
    if(!isHostSync||shielded())return;
    if(ps===1&&vCache.status!=="playing")
      wV({status:"playing",currentTime:ct,timestamp:now()});
    else if(ps===2&&vCache.status!=="paused")
      wV({status:"paused",currentTime:ct,timestamp:now()});
    return;
  }

  // ゲスト(同期中) — ホスト状態に戻す
  if(isSyncOk&&isHostSync&&!isGuestFree){
    if(vCache.status==="playing"&&ps!==1&&ps!==3){
      setTimeout(()=>{
        if(!ytp||!isSyncOk||isGuestFree)return;
        if(ytp.getPlayerState?.()!==1) ytp.playVideo();
      },300);
    }
    if(vCache.status==="paused"&&ps===1){
      setTimeout(()=>{
        if(!ytp||!isSyncOk||isGuestFree)return;
        if(ytp.getPlayerState?.()===1) ytp.pauseVideo();
      },300);
    }
  }
}

/* ══ UI描画 ══
  コントロールバー (#pc) のクラスで制御:
    .host       → ホスト表示
    .guest-sync → ゲスト同期中 (状態のみ)
    (なし)      → 非表示 (ゲスト自由・未入室)
══ */
function updUI(){
  const pc=E.pc, stb=E.stb, sp=E.sp, ld=E.ld;
  const sc=(el,...c)=>{el.className=c.join(" ");};

  // ── ホスト ──
  if(amIOwner){
    pc.className = "host";
    E.ub.classList.add("show");
    sc(E.claim,"hbtn"); sc(E.fmode,"hbtn"); // 非表示
    E.ms.disabled=false;

    if(isHostSync){
      sc(sp,"sp-hs"); ld.className="ld ld-am"; E.stx.textContent="🔴 ホスト・同期中";
      stb.textContent="同期を停止"; sc(stb,"stb-st");
    } else {
      sc(sp,"sp-hn"); ld.className="ld ld-off"; E.stx.textContent="👑 ホスト";
      stb.textContent="同期を開始"; sc(stb,"stb-go");
    }
    return;
  }

  // ── ゲスト ──
  E.ub.classList.remove("show");

  if(!isHostSync){
    // 同期なし → コントロール非表示
    pc.className="";
    sc(E.claim,"hbtn show"); sc(E.fmode,"hbtn");
    return;
  }

  // ホストの同期ON
  sc(E.claim,"hbtn show");

  if(isGuestFree){
    // 自由視聴 → コントロール非表示 (YouTube標準UIだけ)
    pc.className="";
    sc(E.fmode,"hbtn fm-rt show"); E.fmode.textContent="← 同期に戻る";
  } else if(isSyncOk){
    // 同期中 → 状態のみ表示
    pc.className="guest-sync";
    sc(E.fmode,"hbtn fm-fr show"); E.fmode.textContent="自由視聴";
    sc(sp,"sp-sy"); ld.className="ld ld-gr"; E.stx.textContent="🟢 同期中";
    stb.textContent=""; // stbはguest-syncでは不要だがDOMは残す
  } else {
    // 未承認
    pc.className="guest-sync";
    sc(E.fmode,"hbtn fm-fr show"); E.fmode.textContent="自由視聴";
    sc(sp,"sp-pe"); ld.className="ld ld-ro"; E.stx.textContent="⏳ 待機中";
  }
}

/* ══ videoState リスナー ══ */
function bindVideoState(){
  onValue(vRef(),snap=>{
    if(!snap.exists()){
      vCache=null;amIOwner=false;isHostSync=false;
      if(ytp){try{ytp.destroy();}catch{};ytp=null;}
      lastVid=null;isSyncOk=false;isGuestFree=false;
      E.yph.style.display="flex"; updUI(); return;
    }

    const st=snap.val(), prev=vCache?.videoId, wasOwner=amIOwner;
    vCache=st; amIOwner=(st.owner===uid); isHostSync=!!st.isSyncing;
    if(!wasOwner&&amIOwner){isSyncOk=true;isGuestFree=false;}

    const tSec=calcT(st);
    E.yph.style.display="none";

    // ─ ホスト ─
    if(amIOwner){
      E.gov.classList.remove("show"); updUI();
      if(lastVid!==st.videoId||!ytp) loadVid(st.videoId,tSec);
      return;
    }

    // ─ ゲスト ─
    updUI();

    if(!isHostSync){
      if(lastVid!==st.videoId||!ytp) loadVid(st.videoId,st.currentTime||0);
      return;
    }

    // 動画が変わったら承認リセット
    if(st.videoId!==prev&&prev!=null) isSyncOk=false;

    if(!isSyncOk){
      E.ocHost.textContent=`${esc(st.ownerName||"ホスト")} の動画に参加しますか？`;
      E.gov.classList.add("show"); updUI();
      if(lastVid!==st.videoId||!ytp) loadVid(st.videoId,st.currentTime||0);
      return;
    }

    E.gov.classList.remove("show");

    if(isGuestFree){
      if(lastVid!==st.videoId||!ytp) loadVid(st.videoId,st.currentTime||0);
      return;
    }

    // 同期追従
    if(lastVid!==st.videoId||!ytp) loadVid(st.videoId,tSec);
    else applyCtrl(st.status,tSec);
  });
}

/* ══ Presence ══ */
function bindPresence(){
  onValue(ref(db,`presence/${ROOM}`),async snap=>{
    const users=Object.values(snap.val()||{});
    E.pcCnt.textContent=users.length;
    if(users.length===0){
      E.uli.innerHTML=`<div style="color:var(--mu2);font-size:10px;text-align:center;padding:7px">誰もいません</div>`;
      try{await set(ref(db,`chat/${ROOM}`),null);await set(ref(db,`rooms/${ROOM}`),null);}catch{}
      return;
    }
    users.sort((a,b)=>a.uid===uid?-1:b.uid===uid?1:0);
    E.uli.innerHTML=users.map(u=>{
      const me=u.uid===uid, isOwner=vCache?.owner===u.uid;
      let act=isOwner&&!me?`<span style="color:var(--am);font-size:11px">👑</span>`:"";
      if(joined&&amIOwner&&!me)
        act=`<button class="btr" onclick="window.__ho('${esc(u.uid)}','${esc(u.name)}')">譲渡</button>`;
      return `<div class="ur">
        <div style="display:flex;align-items:center;min-width:0;gap:3px">
          <span class="un${me?" me":""}">${esc(u.name)+(me?" (自分)":"")}</span>
          ${u.joinedAt?`<span class="um">${fmtCk(u.joinedAt)}入室</span>`:""}
        </div><div style="flex-shrink:0">${act}</div></div>`;
    }).join("");
  });
}

window.__ho=async(tuid,tname)=>{
  if(!amIOwner||!vCache)return;
  if(!confirm(`${tname} にホストを譲渡しますか？`))return;
  shield(2000);
  await update(vRef(),{owner:tuid,ownerName:tname,timestamp:now(),isSyncing:false});
  await push(ref(db,`chat/${ROOM}`),{
    type:"sys",text:`→ ${tname} にホストを譲渡しました`,time:now(),fromUid:uid,fallbackName:curN});
  E.ul.classList.remove("open"); E.chv.classList.remove("open");
};

/* ══ チャット ══ */
function addMsg(m,key){
  if(document.getElementById("m"+key))return;
  const me=m.fromUid===uid||m.uid===uid;
  const time=m.time?fmtCk(m.time):"";
  const div=document.createElement("div");
  div.id="m"+key;
  if(m.type==="sys"){
    div.className="sysmsg";
    const who=me?esc(curN):(m.fallbackName?esc(m.fallbackName):"");
    div.innerHTML=`${who}${esc(m.text)} <span style="color:var(--mu2);font-size:9px">${time}</span>`;
  }else{
    div.className=`msg${me?" me":""}`;
    const vid=exVid(m.text||"");
    const crown=amIOwner&&!me&&(m.uid||m.fromUid)
      ?`<button onclick="window.__ho('${esc(m.uid||m.fromUid)}','${esc(m.name)}')"
          style="font-size:9px;color:var(--am);background:var(--bg);border:1px solid var(--bd);
                 border-radius:4px;padding:1px 4px;cursor:pointer;font-family:inherit">譲</button>`:"";
    const embed=vid
      ?`<div class="ytcard">
          <img src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" alt="" loading="lazy">
          <button class="ytcard-btn" onclick="window.__sv('${vid}')">▶ この動画を共有再生</button>
        </div>`:"";
    div.innerHTML=`
      <div class="mmeta">
        <span class="mn${me?" me":""}">${esc(m.name||curN)}</span>
        ${!me?crown:""}
        <span style="font-family:sans-serif;font-size:9px;color:var(--mu2)">${time}</span>
      </div>
      <div class="mbub">${linkify(m.text||"")}${embed}</div>`;
  }
  E.tl.insertBefore(div,E.tl.firstChild);
  E.tl.scrollTop=0;
}

function bindChat(){
  if(chatUnsub){chatUnsub();chatUnsub=null;}
  E.tl.innerHTML="";
  const cref=query(ref(db,`chat/${ROOM}`),orderByChild("time"),limitToLast(CHAT_LIMIT));
  const fn=onChildAdded(cref,snap=>addMsg(snap.val(),snap.key));
  chatUnsub=()=>off(cref,"child_added",fn);
}

/* ══ 入室 ══ */
async function joinRoom(name,key="",isRestore=false){
  if(joined)return;
  joined=true;
  curN=name.slice(0,10)+tripHash(key);
  localStorage.setItem("or_name",name.slice(0,10));
  localStorage.setItem("or_joined","true");
  if(key) localStorage.setItem("or_key",key); else localStorage.removeItem("or_key");

  const ts=now(); lastActTs=ts;
  const pref=ref(db,`presence/${ROOM}/${uid}`);
  await set(pref,{name:curN,uid,joinedAt:ts,lastActive:ts});
  onDisconnect(pref).remove();

  // ログインフォームを完全に除去
  E.lf.classList.add("gone");
  E.xbtn.classList.add("show");
  E.cia.classList.add("show");
  E.cs.disabled=false;
  E.yphHint.textContent="YouTubeのURLを共有バーに貼り付けてください";

  bindChat();
  bindVideoState();

  // スライダー+時間更新 (333ms)
  if(slTmr) clearInterval(slTmr);
  slTmr=setInterval(()=>{
    if(!ytp?.getCurrentTime||isDrag)return;
    try{
      const cur=ytp.getCurrentTime(), dur=ytp.getDuration();
      if(dur>0){
        E.ms.max=String(Math.floor(dur));
        E.ms.value=String(Math.floor(cur));
        E.stime.textContent=`${fmtT(cur)} / ${fmtT(dur)}`;
        E.mt.textContent=fmtT(cur);
      }
      // ホストのみ再生ボタン更新
      if(amIOwner) E.mpp.textContent=ytp.getPlayerState()===1?"⏸":"▶";
    }catch{}
  },333);

  // Presence ハートビート
  if(hbTmr) clearInterval(hbTmr);
  hbTmr=setInterval(async()=>{
    try{await update(ref(db,`presence/${ROOM}/${uid}`),{lastActive:lastActTs});}catch{}
  },HB_MS);

  // 非アクティブチェック
  if(inTmr) clearInterval(inTmr);
  inTmr=setInterval(()=>{
    if(now()-lastActTs>INACTIVE_MS) leaveRoom(true);
  },30_000);

  if(!isRestore&&!sessionStorage.getItem("or_sess")){
    sessionStorage.setItem("or_sess","1");
    await push(ref(db,`chat/${ROOM}`),{
      type:"sys",text:"が入室しました",time:now(),fromUid:uid,fallbackName:curN});
  }
}

/* ══ 退室 ══ */
async function cleanRoom(){
  try{
    await remove(ref(db,`presence/${ROOM}/${uid}`));
    const s=await get(ref(db,`presence/${ROOM}`));
    if(!s.exists()||Object.keys(s.val()).length===0){
      await set(ref(db,`chat/${ROOM}`),null);
      await set(ref(db,`rooms/${ROOM}`),null);
    }
  }catch{}
}
async function leaveRoom(auto=false){
  if(slTmr) clearInterval(slTmr);
  if(hbTmr) clearInterval(hbTmr);
  if(inTmr) clearInterval(inTmr);
  if(chatUnsub) chatUnsub();
  ["or_joined","or_key"].forEach(k=>localStorage.removeItem(k));
  sessionStorage.removeItem("or_sess");
  if(!joined)return;
  try{
    await push(ref(db,`chat/${ROOM}`),{
      type:"sys",
      text:auto?"が30分無言のため自動退出しました":"が退出しました",
      time:now(),fromUid:uid,fallbackName:curN});
    await cleanRoom();
  }catch{}
  window.location.reload();
}

window.addEventListener("DOMContentLoaded",()=>{
  const sn=localStorage.getItem("or_name")||"";
  E.ni.value=sn||`ゲスト${100+Math.floor(Math.random()*900)}`;
  E.ki.value=localStorage.getItem("or_key")||"";
  updateTP(); updUI(); bindPresence();
  if(localStorage.getItem("or_joined")==="true"&&sn)
    joinRoom(sn,localStorage.getItem("or_key")||"",true);
});
</script>
